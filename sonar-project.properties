sonar.projectKey=loans-loans-analytics
sonar.organization=loans-technol
sonar.projectName=LOANS Loans Analytics
sonar.projectVersion=1.0
# Source and test directories (only existing directories)
sonar.sources=backend/src,backend/loans_analytics,frontend/streamlit_app
sonar.tests=tests
# Exclusions - exclude test files from sources
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/.turbo/**,**/artifacts/**,**/.github/**,**/*.md,data_samples/**,coverage/**,**/.gradle/**,**/build/**,infra/**,exports/**,data/**,logs/**,**/*.lock,**/build-wrapper-dump.json,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,**/.venv/**,**/venv/**,**/.vscode/extensions/**,**/typeshed-fallback/**
# Test inclusions
sonar.test.inclusions=tests/**/*.py
# Reports (Python-focused, removed deprecated frontend paths)
# sonar.typescript.tsconfigPath=apps/web/tsconfig.json  # Deprecated: Next.js frontend removed
# sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info  # Deprecated: Next.js frontend removed
sonar.python.version=3.9,3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage-src.xml,coverage.xml
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/__pycache__/**

# Multi-Agent System Quality Gates
sonar.qualitygate.wait=true

# Security rules for LLM/AI integrations
sonar.python.pylint.reportPaths=pylint-report.txt
sonar.python.bandit.reportPaths=bandit-report.json

# Agent code quality standards
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/test_*.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S*
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S*
sonar.issue.ignore.multicriteria.e3.resourceKey=**/conftest.py

# Critical paths requiring highest standards
sonar.python.file.suffixes=.py
sonar.python.xunit.reportPath=test-reports/xunit.xml

# Agent-specific quality metrics
# Require higher maintainability for agent core files
sonar.technicalDebt.ratingGrid=0.05,0.1,0.2,0.5

version: '3.8'

services:
  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./streamlit_app:/app/streamlit_app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - abaco-network

  # Daily Agent Analysis (scheduled service)
  agent-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    command: >
      sh -c "
      while true; do
        echo 'Running daily agent analysis...';
        python scripts/run_daily_agent_analysis.py --input data/raw/spanish_loans_seed.csv;
        echo 'Analysis complete. Sleeping for 24 hours...';
        sleep 86400;
      done
      "
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./python:/app/python
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - abaco-network
    depends_on:
      - dashboard

networks:
  abaco-network:
    driver: bridge

volumes:
  data-volume:

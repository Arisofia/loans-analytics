services:
  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./streamlit_app:/app/streamlit_app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - abaco-network

  # Daily Agent Analysis (scheduled service)
  agent-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      - PYTHONUNBUFFERED=1
      - DAILY_AGENT_INPUT_PATH=${DAILY_AGENT_INPUT_PATH:-}
    entrypoint: ["/bin/sh", "/app/scripts/monitoring/run_agent_scheduler.sh"]
    healthcheck:
      disable: true
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./python:/app/python
    restart: unless-stopped
    networks:
      - abaco-network
    depends_on:
      - dashboard

networks:
  abaco-network:
    driver: bridge

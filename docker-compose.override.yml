version: '3.8'
services:
  nextjs_app:
    build:
      context: ./my-app
      dockerfile: Dockerfile
    container_name: nextjs_secure
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - app_network

  nginx_guard:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx-conf/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nextjs_app
    networks:
      - app_network

  data_processor:
    image: python:3.11-slim
    container_name: data_processor
    volumes:
      - ./data-processor:/app
    working_dir: /app
    command: python processor.py
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

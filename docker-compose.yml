###############################################################################
# Loans Analytics — Unified Deployment Stack
#
# Profiles:
#   default (api + dashboard) : Core application stack
#   db                      : Local PostgreSQL (mirrors Supabase)
#   monitoring              : Prometheus + Grafana + Alertmanager + OTEL
#   pipeline                : One-shot ETL pipeline runner
#
# Usage:
#   docker compose up -d                        # Start API + Dashboard
#   docker compose --profile db up -d           # Start with local DB
#   docker compose --profile monitoring up -d   # Start with full observability
#   docker compose --profile pipeline run pipeline # Run ETL
###############################################################################

version: "3.9"

x-common-env: &common-env
  # Supabase project REST endpoint (override with your project credentials)
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  # Local PostgreSQL (backing store for analytics; uses the `db` service)
  DATABASE_URL: ${DATABASE_URL:-postgresql://analytics_user:${DB_PASSWORD:-localdev}@db:5432/loans_analytics}
  # DuckDB / Parquet storage paths
  DUCKDB_PATH: /app/data/duckdb/analytics.duckdb
  PARQUET_BASE_DIR: /app/data/duckdb
  # Pipeline
  # Pipeline — PIPELINE_INPUT must be set explicitly for production.
  # The sample data default is for local development only.
  PIPELINE_INPUT: ${PIPELINE_INPUT:?Set PIPELINE_INPUT to your production data path}
  PIPELINE_MODE: full
  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
  # Defaults
  DEFAULT_RISK_MODEL_BACKEND: xgb
  HISTORICAL_CONTEXT_MODE: REAL

services:
  # ---------------------------------------------------------------------------
  # Analytics API (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/arisofia/loans-analytics-api:local
    ports:
      - "8000:8000"
    volumes:
      # Local named volume for data. In cloud environments, replace with managed object storage mount/sync.
      # Mapping guidance:
      # - PARQUET_BASE_DIR -> object storage prefix (e.g., s3://bucket/parquet or az://container/parquet)
      # - DUCKDB_PATH -> persistent attached volume path or managed DB replacement
      - app_data:/app/data
      - ./config:/app/config
      - app_logs:/app/logs
    environment:
      <<: *common-env
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      RELOAD: "${API_RELOAD:-false}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: ghcr.io/arisofia/loans-analytics-dashboard:local
    ports:
      - "8501:8501"
    volumes:
      - app_data:/app/data
      - ./config:/app/config
    environment:
      <<: *common-env
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      API_BASE_URL: http://api:8000
      DASHBOARD_URL: http://localhost:8501
      GRAFANA_URL: ${GRAFANA_BASE_URL:-http://grafana:3000}/dashboards
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ETL Pipeline runner (one-shot)
  # ---------------------------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: ghcr.io/arisofia/loans-analytics-pipeline:local
    volumes:
      - app_data:/app/data
      - ./config:/app/config
      - app_logs:/app/logs
    environment:
      <<: *common-env
    command: >
      python scripts/data/run_data_pipeline.py
        --input ${PIPELINE_INPUT:?Set PIPELINE_INPUT to your production data path}
        --mode  ${PIPELINE_MODE:-full}
        --verbose
    profiles:
      - pipeline

  # ---------------------------------------------------------------------------
  # Local PostgreSQL — mirrors Supabase schema for offline dev
  # Profile: db
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
      POSTGRES_DB: loans_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/star_schema/create_star_schema.sql:/docker-entrypoint-initdb.d/01_star_schema.sql:ro
      - ./db/star_schema/views/kpi_views.sql:/docker-entrypoint-initdb.d/02_kpi_views.sql:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d loans_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - db

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection
  # Profile: monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana — dashboards
  # Profile: monitoring
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3001}
      GF_AUTH_GRAFANA_COM_ENABLED: ${GF_AUTH_GRAFANA_COM_ENABLED:-false}
      GF_AUTH_GRAFANA_COM_ALLOW_SIGN_UP: ${GF_AUTH_GRAFANA_COM_ALLOW_SIGN_UP:-true}
      GF_AUTH_GRAFANA_COM_CLIENT_ID: ${GF_AUTH_GRAFANA_COM_CLIENT_ID:-}
      GF_AUTH_GRAFANA_COM_CLIENT_SECRET: ${GF_AUTH_GRAFANA_COM_CLIENT_SECRET:-}
      GF_AUTH_GRAFANA_COM_SCOPES: ${GF_AUTH_GRAFANA_COM_SCOPES:-user:email}
      GF_AUTH_GRAFANA_COM_ALLOWED_ORGANIZATIONS: ${GF_AUTH_GRAFANA_COM_ALLOWED_ORGANIZATIONS:-}
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Alertmanager — alert handling
  # Profile: monitoring
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # Profile: monitoring
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./config/otel-collector.yml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    profiles:
      - monitoring

volumes:
  app_data:
  app_logs:
  postgres_data:
  prometheus_data:
  grafana_data:

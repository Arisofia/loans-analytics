# Alertmanager Configuration for Abaco Loans Analytics

global:
  resolve_timeout: 5m
  # Slack webhook for notifications (optional)
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

# Templates for alert formatting
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# Route tree
route:
  receiver: "default-receiver"
  group_by: ["alertname", "cluster", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: "critical-alerts"
      group_wait: 0s
      repeat_interval: 5m

    # Warning alerts - batched notifications
    - match:
        severity: warning
      receiver: "warning-alerts"
      group_wait: 30s
      repeat_interval: 1h

    # Info alerts - daily summary
    - match:
        severity: info
      receiver: "info-alerts"
      repeat_interval: 24h

# Receivers (notification channels)
receivers:
  - name: "default-receiver"
    # Email configuration (configure SMTP settings)
    # email_configs:
    #   - to: 'alerts@example.com'
    #     from: 'alertmanager@example.com'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: 'your-email@gmail.com'
    #     auth_password: 'your-app-password'

  - name: "critical-alerts"
    # Slack for critical alerts
    # slack_configs:
    #   - channel: '#eng-alerts'
    #     title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true

    # PagerDuty for critical alerts (optional)
    # pagerduty_configs:
    #   - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'

  - name: "warning-alerts"
    # Slack for warnings
    # slack_configs:
    #   - channel: '#eng-warnings'
    #     title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: "info-alerts"
    # Slack for info (daily summary)
    # slack_configs:
    #   - channel: '#eng-info'
    #     title: 'ℹ️ INFO: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

# Inhibition rules (prevent alert spam)
inhibit_rules:
  # Inhibit warning if critical alert is firing
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]

  # Inhibit info if warning is firing
  - source_match:
      severity: "warning"
    target_match:
      severity: "info"
    equal: ["alertname", "instance"]

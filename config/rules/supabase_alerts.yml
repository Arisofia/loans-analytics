# Prometheus Alert Rules for Supabase Database
# File: config/rules/supabase_alerts.yml
# Reference: https://github.com/supabase/supabase-grafana/blob/main/docs/example-alerts.md

groups:
  # ============================================
  # CRITICAL: Page Immediately
  # ============================================
  - name: supabase-critical
    interval: 60s
    rules:
      # Connection pool exhaustion
      - alert: SupabaseConnectionPoolExhausted
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          team: platform
          runbook: https://github.com/Arisofia/abaco-loans-analytics/wiki/Runbook-DB-Connections
        annotations:
          summary: "Supabase connection pool at {{ $value | humanizePercentage }} capacity"
          description: "Database {{ $labels.datname }} is using {{ $value | humanizePercentage }} of max connections. Scale connection pool or investigate connection leaks."
          action: "1. Check python/supabase_pool.py health_check()\n2. Review slow queries\n3. Consider upgrading Supabase plan"

      # High database CPU
      - alert: SupabaseCPUHigh
        expr: pg_cpu_usage_percent > 80
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database CPU usage: {{ $value }}%"
          description: "Sustained high CPU may impact query performance and pipeline execution."
          action: "1. Check Query Performance in Supabase Dashboard\n2. Review slow queries\n3. Consider query optimization or upgrade"

      # Disk space critical
      - alert: SupabaseDiskSpaceCritical
        expr: pg_database_size_bytes / pg_settings_data_directory_size_bytes > 0.9
        for: 15m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database disk usage at {{ $value | humanizePercentage }}"
          description: "Database is running out of disk space. Immediate action required."
          action: "1. Upgrade Supabase plan\n2. Archive old data\n3. Run VACUUM FULL on bloated tables"

      # Replication lag critical (if using read replicas)
      - alert: SupabaseReplicationLagHigh
        expr: pg_replication_lag_seconds > 300
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Replication lag: {{ $value }}s"
          description: "Read replica is {{ $value }}s behind primary. Affects read query freshness."

  # ============================================
  # WARNING: Investigate Soon
  # ============================================
  - name: supabase-warnings
    interval: 60s
    rules:
      # Cache hit ratio low
      - alert: CacheHitRatioLow
        expr: pg_stat_database_blks_hit / (pg_stat_database_blks_hit + pg_stat_database_blks_read) < 0.95
        for: 30m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Cache hit ratio: {{ $value | humanizePercentage }}"
          description: "Cache efficiency below 95% indicates potential memory pressure or inefficient queries."
          action: "1. Review query patterns\n2. Check shared_buffers config\n3. Consider memory upgrade"

      # Slow queries detected
      - alert: SlowQueriesDetected
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 1
        for: 10m
        labels:
          severity: warning
          team: engineering
        annotations:
          summary: "Average query time > 1s ({{ $value }}s)"
          description: "Queries are taking longer than expected. May impact pipeline SLAs."
          action: "1. Check Query Performance in Supabase\n2. Review EXPLAIN plans\n3. Consider adding indexes"

      # Table bloat high
      - alert: TableBloatHigh
        expr: pg_stat_table_bloat_ratio > 0.3
        for: 1h
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Table {{ $labels.schemaname }}.{{ $labels.relname }} has {{ $value | humanizePercentage }} bloat"
          description: "High bloat ratio impacts query performance and increases storage costs."
          action: "1. Run VACUUM ANALYZE\n2. Consider VACUUM FULL during maintenance window\n3. Tune autovacuum settings"

      # Index bloat high
      - alert: IndexBloatHigh
        expr: pg_stat_index_bloat_ratio > 0.5
        for: 2h
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Index {{ $labels.indexrelname }} on {{ $labels.relname }} has {{ $value | humanizePercentage }} bloat"
          description: "Bloated indexes slow down queries and waste disk space."
          action: "1. REINDEX {{ $labels.indexrelname }}\n2. Consider concurrent reindex to avoid downtime"

      # Long-running transactions
      - alert: LongRunningTransactions
        expr: pg_stat_activity_max_tx_duration_seconds > 3600
        for: 15m
        labels:
          severity: warning
          team: engineering
        annotations:
          summary: "Transaction running for {{ $value }}s"
          description: "Long transactions can block VACUUM and cause bloat."
          action: "1. Identify query: SELECT * FROM pg_stat_activity WHERE state != 'idle'\n2. Consider terminating: pg_terminate_backend(pid)"

      # WAL generation rate high
      - alert: WALGenerationRateHigh
        expr: rate(pg_stat_wal_bytes[5m]) > 10485760 # 10MB/s
        for: 30m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "WAL generation: {{ $value }} bytes/s"
          description: "High WAL generation may indicate heavy write load or inefficient bulk operations."
          action: "1. Review bulk insert patterns\n2. Consider batching strategy\n3. Check for excessive updates"

  # ============================================
  # INFO: Capacity Planning
  # ============================================
  - name: supabase-capacity
    interval: 300s # Every 5 minutes
    rules:
      # Database growth trend
      - alert: DatabaseGrowthAccelerating
        expr: |
          rate(pg_database_size_bytes[7d]) >
          (rate(pg_database_size_bytes[30d]) * 1.5)
        for: 24h
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Database growth accelerating"
          description: "Database growth rate has increased by 50% compared to 30-day average."
          action: "1. Review data retention policies\n2. Plan for storage upgrade\n3. Consider archiving strategy"

      # Connection pool approaching limit
      - alert: ConnectionPoolWarning
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.7
        for: 1h
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Connection pool at {{ $value | humanizePercentage }}"
          description: "Connection usage is approaching configured limit."
          action: "1. Monitor trends\n2. Plan for connection pool scaling\n3. Review connection lifecycle in code"

      # Transaction rate increasing
      - alert: TransactionRateIncreasing
        expr: |
          rate(pg_stat_database_xact_commit[1h]) >
          (rate(pg_stat_database_xact_commit[7d]) * 1.2)
        for: 6h
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Transaction rate up 20% from weekly average"
          description: "Indicates business growth - plan for capacity scaling."
          action: "1. Correlate with AUM growth ($7.4M → $16.3M target)\n2. Review Query Performance trends\n3. Plan infrastructure scaling"

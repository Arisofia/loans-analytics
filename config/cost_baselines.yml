# Cost Baselines for Multi-Agent Scenarios
# These baselines are used to detect cost regressions in CI/CD pipeline

scenarios:
  loan_analysis:
    baseline_cost: 0.0033  # $0.0033 USD
    token_budget: 800
    api_calls_budget: 3
    threshold: 0.10  # Alert if >10% increase
    description: "Complete loan analysis with analytics and risk agents"

  risk_assessment:
    baseline_cost: 0.0021  # $0.0021 USD
    token_budget: 300
    api_calls_budget: 2
    threshold: 0.10
    description: "Risk assessment for portfolio health"

  portfolio_validation:
    baseline_cost: 0.0011  # $0.0011 USD
    token_budget: 200
    api_calls_budget: 1
    threshold: 0.10
    description: "Data validation for portfolio entries"

# Global settings
global:
  default_threshold: 0.10
  alert_on_budget_exceeded: true
  track_trends: true

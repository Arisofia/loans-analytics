# ==============================================================================
# COVENANTS DE DEUDA — ESTRUCTURA DE FINANCIAMIENTO
# ==============================================================================
debt_covenants:
  description: >
    El financiamiento de deuda exige mantener la distribución de pagos
    estructurada según los replines a 30, 60 y 90 días. Solo se financia
    el 80% de la cartera que cumple esas características. La mora no puede
    crecer y el 98.50% de cumplimiento es la exigencia del fondo.
    De no cubrirse, se debe incrementar el patrimonio.

  repline_distribution:
    # Porcentaje de cartera por bucket de vencimiento
    bucket_30_days_max_pct: 0.45
    bucket_60_days_max_pct: 0.35
    bucket_90_days_max_pct: 0.20

  advance_rate: 0.80  # Solo financian 80% de cartera elegible
  eligible_criteria:
    - "Pagos al día según distribución 30/60/90 de replines"
    - "Sin mora reportada en últimos 90 días"
    - "Documentación completa del préstamo"

  performance_covenants:
    min_collection_rate: 0.985   # 98.50% — exigencia del fondo
    max_delinquency_growth: 0.0  # La mora no puede crecer vs período anterior
    cure_action: "increment_equity"  # Si no se cumple → aportar patrimonio
    cure_action_detail: >
      Si la tasa de cobro cae por debajo del 98.50% o si la mora crece
      respecto al período anterior, la entidad debe incrementar el patrimonio
      hasta restaurar los ratios pactados con el fondo financiador.

  max_d_ebitda_by_year:
    "2025": null   # No aplica — EBITDA negativo, financiamiento vía SAFEs
    "2026": 7.0
    "2027": 5.5
    "2028": 5.0
    "2029": 4.0
    "2030": 3.5

# ==============================================================================
# UNIT ECONOMICS — RECONCILIACIÓN DEFAULT RATE
# ==============================================================================
unit_economics_reconciliation:
  description: >
    El default rate en UNIT-EC es 5.96% por ticket ($19.2 sobre $322.5 de ingreso),
    mientras que las cuentas irrecuperables en ER-CONS son prácticamente cero.
    La reconciliación muestra que ambos números son consistentes bajo diferentes
    ópticas contables.

  unit_ec_default_rate_per_ticket: 0.0596  # 5.96% del ingreso por ticket
  unit_ec_default_dollar_per_ticket: 19.2
  unit_ec_revenue_per_ticket: 322.5
  unit_ec_yield_per_ticket: 0.074   # 7.4%

  er_cons_irrecoverable_rate: 0.0044  # 0.44% mensual sobre cartera
  er_cons_note: >
    Las cuentas irrecuperables en ER-CONS están expresadas como
    porcentaje de la cartera total (no del ingreso por ticket).

  reconciliation_method: >
    El 5.96% de UNIT-EC se calcula sobre el ingreso por ticket individual.
    El 0.44% de ER-CONS se calcula sobre el saldo de cartera total.
    Para reconciliar:
      Default_por_ticket = Default_rate_cartera × (Cartera_promedio / Num_tickets) / Yield_por_ticket
      → 0.0044 × ($4,366 / 1) / $322.5 ≈ 0.059 → 5.9% ✓
    Conclusión: Los números son coherentes. El default rate de 5.96% en UNIT-EC
    YA INCLUYE la provisión por pérdida esperada derivada de la mora de cartera.
    NO hay subestimación en ER-CONS; las cuentas irrecuperables reflejan solo
    los write-offs efectivos (charge-offs realizados), no la provisión esperada.

  ticket_avg_usd: 4366
  active_operations: 544

# ==============================================================================
# RESERVA DE LIQUIDEZ
# ==============================================================================
liquidity_reserve:
  min_reserve_pct: 0.05   # 5% mínimo sobre cartera activa
  target_reserve_pct: 0.08  # 8% objetivo
  description: >
    Buffer de liquidez operativa. La prueba defensiva colapsa a 0.9% en 2025
    si no se establece un piso. Esta reserva garantiza que incluso en escenario
    de mora inesperada o corte de líneas de fondeo, hay caja para operar.
  calculation: "max(cartera_activa × min_reserve_pct, 200000)"
  reserves_by_year:
    "2025": 386500     # 5% de $7.73M cartera
    "2026": 1025000    # 5% de ~$20.5M
    "2027": 1655000    # 5% de ~$33.1M
    "2028": 2965000    # 5% de ~$59.3M
    "2029": 5305000    # 5% de ~$106.1M
    "2030": 10050000   # 5% de ~$201M


# KPI Definitions - All Formulas and Thresholds
# Version 3.0 — Aligned with real_data CSV schema
#
# Columns available after Phase 2 (Transformation):
#   loan_id, borrower_id, principal_amount, outstanding_balance,
#   current_balance, interest_rate, days_past_due, status,
#   origination_date, last_payment_amount, total_scheduled,
#   collateral_value, tpv, amount, term_months
#
# Status values after normalization:
#   active (was "Current"), closed (was "Complete"), defaulted (was "Default")

version: "3.1.0"
last_updated: "2026-02-28"

# Portfolio Performance KPIs
portfolio_kpis:
  total_outstanding_balance:
    formula: "SUM(outstanding_balance WHERE status != 'closed')"
    unit: "USD"
    description: "Total outstanding principal across all non-closed loans (active + delinquent + defaulted)"
    thresholds:
      warning: 10000000
      critical: 50000000

  total_loans_count:
    formula: "COUNT(DISTINCT loan_id WHERE status != 'closed')"
    unit: "count"
    description: "Number of active loans in portfolio"

  average_loan_size:
    formula: "AVG(principal_amount)"
    unit: "USD"
    description: "Average original loan amount"

  portfolio_yield:
    formula: "AVG(interest_rate) * 100"
    unit: "percentage"
    description: "Average annualized interest rate across portfolio"
    thresholds:
      warning: 12
      target: 8
      critical: 5

# Asset Quality KPIs
asset_quality_kpis:
  par_30:
    formula: "SUM(outstanding_balance WHERE dpd >= 30) / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Portfolio at Risk - 30 days past due"
    thresholds:
      warning: 3
      critical: 5

  par_60:
    formula: "SUM(outstanding_balance WHERE dpd >= 60) / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Portfolio at Risk - 60 days past due"
    thresholds:
      warning: 2
      critical: 4

  par_90:
    formula: "SUM(outstanding_balance WHERE dpd >= 90) / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Portfolio at Risk - 90 days past due"
    thresholds:
      warning: 1
      critical: 2

  delinq_1_30_rate:
    formula: "(SUM(outstanding_balance WHERE dpd <= 30) - SUM(outstanding_balance WHERE dpd <= 0)) / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Delinquency 1-30 days"

  delinq_31_60_rate:
    formula: "(SUM(outstanding_balance WHERE dpd <= 60) - SUM(outstanding_balance WHERE dpd <= 30)) / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Delinquency 31-60 days"

  npl_ratio:
    formula: "SUM(outstanding_balance WHERE dpd >= 90 OR status = 'defaulted') / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Non-Performing Loan ratio (strict Basel-II/III) — balance-weighted exposure to severely delinquent (DPD >= 90) or defaulted accounts. PAR30 is the early-warning metric; NPL is the severity metric."
    thresholds:
      warning: 5
      critical: 10

  npl_90_ratio:
    formula: "SUM(outstanding_balance WHERE dpd >= 90) / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Non-Performing Loan ratio (strict Basel 90-day) - balance-weighted exposure to severely delinquent and defaulted accounts"
    thresholds:
      warning: 5
      critical: 10

  default_rate:
    formula: "COUNT(loan_id WHERE status = 'defaulted') / COUNT(loan_id) * 100"
    unit: "percentage"
    description: "Percentage of loans in default (legacy count-based metric; prefer default_rate_by_count)"
    thresholds:
      warning: 2
      critical: 5

  default_rate_by_count:
    formula: "COUNT(loan_id WHERE status = 'defaulted') / COUNT(loan_id) * 100"
    unit: "percentage"
    description: "Percentage of loans in default (count-based)"
    thresholds:
      warning: 2
      critical: 5

  default_rate_by_balance:
    formula: "SUM(outstanding_balance WHERE status = 'defaulted') / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Percentage of portfolio balance in default (balance-based)"
    thresholds:
      warning: 3
      critical: 6

  loss_rate:
    formula: "SUM(outstanding_balance WHERE status = 'defaulted') / SUM(principal_amount) * 100"
    unit: "percentage"
    description: "Outstanding balance at risk as percentage of disbursed principal"

  lgd:
    formula: "(SUM(outstanding_balance WHERE status = 'defaulted') - SUM(last_payment_amount WHERE status = 'defaulted')) / SUM(outstanding_balance WHERE status = 'defaulted') * 100"
    unit: "percentage"
    description: "Loss Given Default - % of defaulted exposure not recovered"
    thresholds:
      warning: 60
      critical: 80

  cost_of_risk:
    formula: "SUM(outstanding_balance WHERE status = 'defaulted') / SUM(outstanding_balance) * 100"
    unit: "percentage"
    description: "Expected credit loss as % of total portfolio balance (Cost of Risk)"
    thresholds:
      warning: 3
      critical: 6

  provision_coverage_ratio:
    formula: "SUM(provision_expense) / SUM(outstanding_balance WHERE dpd >= 90 OR status = 'defaulted')"
    unit: "ratio"
    precision: 4
    rounding: "ROUND_HALF_UP"
    description: "Provision coverage over non-performing exposure (DPD >= 90 or defaulted)."

  cure_rate:
    formula: "COUNT(loan_id WHERE dpd > 0 AND last_payment_amount > 0) / COUNT(loan_id WHERE dpd > 0) * 100"
    unit: "percentage"
    description: "Proxy cure rate: delinquent loans showing payment activity (requires T/T-1 snapshot for precision)"
    thresholds:
      target: 30
      warning: 15

# Cash Flow KPIs
cash_flow_kpis:
  collections_rate:
    formula: "SUM(last_payment_amount) / SUM(total_scheduled) * 100"
    unit: "percentage"
    description: "Collection efficiency (payments received vs scheduled)"
    thresholds:
      warning: 85
      target: 95
      critical: 80

  recovery_rate:
    formula: >-
      SUM(last_payment_amount WHERE status = 'defaulted')
      / SUM(outstanding_balance WHERE status = 'defaulted')
      * 100
    unit: "percentage"
    description: "Recovery rate on defaulted loans"

  effective_interest_rate:
    formula: "(1 + AVG(interest_rate) / 365)^365 - 1"
    unit: "ratio"
    precision: 4
    rounding: "ROUND_HALF_UP"
    description: "EIR from average nominal APR using daily compounding."

  portfolio_irr_proxy:
    formula: "(SUM(interest_income) + SUM(fee_income)) / AVG(debt_balance)"
    unit: "ratio"
    precision: 4
    rounding: "ROUND_HALF_UP"
    description: "Proxy metric only; use true IRR from dated cashflows when payments and disbursements are available."

  cash_on_hand:
    formula: "SUM(current_balance)"
    unit: "USD"
    description: "Total current cash position across portfolio"

  nim_proxy:
    id: nim_proxy
    label: "NIM Proxy"
    formula: "(avg_interest_rate - {funding_cost_rate}) * 100"
    parameter_refs:
      funding_cost_rate: "financial_assumptions.funding_cost_rate"
    unit: percent
    precision: 2
    rounding: ROUND_HALF_UP
    ssot: true
    note: "funding_cost_rate injected from business_parameters.yml at runtime. Never hardcoded."
    thresholds:
      warning: 5
      target: 10
      critical: 2

  payback_period:
    formula: "SUM(principal_amount) / SUM(last_payment_amount) * 100"
    unit: "months"
    description: "Payback period proxy — ratio of total principal to total payments received (higher = slower payback)"
    thresholds:
      target: 12
      warning: 18
      critical: 24

# Growth KPIs
growth_kpis:
  disbursement_volume_mtd:
    formula: "SUM(principal_amount WHERE origination_date >= MONTH_START)"
    unit: "USD"
    description: "Total disbursements month-to-date"

  new_loans_count_mtd:
    formula: "COUNT(loan_id WHERE origination_date >= MONTH_START)"
    unit: "count"
    description: "Number of new loans originated this month"

  portfolio_growth_rate:
    formula: "(current_month_balance - previous_month_balance) / previous_month_balance * 100"
    unit: "percentage"
    description: "Month-over-month portfolio growth"

  mom_growth_pct:
    formula: "(current_month_balance - previous_month_balance) / previous_month_balance * 100"
    unit: "percentage"
    description: "Month-over-month AUM growth percentage"

  yoy_growth_pct:
    formula: "(current_year_balance - previous_year_balance) / previous_year_balance * 100"
    unit: "percentage"
    description: "Year-over-year AUM growth percentage"

# Customer KPIs
customer_kpis:
  active_borrowers:
    formula: "COUNT(DISTINCT borrower_id WHERE status IN ['active', 'defaulted'])"
    unit: "count"
    description: "Number of active borrowers"

  repeat_borrower_rate:
    formula: >-
      COUNT(DISTINCT borrower_id WHERE loan_count > 1)
      / COUNT(DISTINCT borrower_id) * 100
    unit: "percentage"
    description: "Percentage of repeat borrowers"

  customer_lifetime_value:
    formula: "SUM(tpv) / COUNT(DISTINCT borrower_id)"
    unit: "USD"
    description: "Average total processed value per customer"

# Operational KPIs
operational_kpis:
  processing_time_avg:
    formula: "AVG(term_months)"
    unit: "months"
    description: "Average loan term duration"
    thresholds:
      warning: 12
      target: 6
      critical: 24

  automation_rate:
    formula: "COUNT(loan_id WHERE payment_frequency = 'bullet') / COUNT(loan_id) * 100"
    unit: "percentage"
    description: "Percentage of bullet (auto-settlement) loans"

# Enriched KPIs — available from CONTROL DE MORA format (run 20260301_181356+)
enriched_kpis:
  collections_eligible_rate:
    id: "collections_eligible_rate"
    name: "Collections Eligible Rate"
    category: "collections"
    definition: "Percentage of outstanding balance flagged as eligible for active collection (procede_a_cobrar = Y)"
    formula: "SUM(outstanding_balance WHERE collections_eligible = 'Y') / SUM(outstanding_balance) * 100"
    inputs: ["outstanding_balance", "collections_eligible"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"
    thresholds:
      warning: 60
      target: 80

  government_sector_exposure_rate:
    id: "government_sector_exposure_rate"
    name: "Government Sector Exposure Rate"
    category: "risk"
    definition: "Percentage of total outstanding balance concentrated in government-sector clients (GOES)"
    formula: "SUM(outstanding_balance WHERE government_sector = 'GOES') / SUM(outstanding_balance) * 100"
    inputs: ["outstanding_balance", "government_sector"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"
    thresholds:
      warning: 40
      critical: 60

  avg_credit_line_utilization:
    id: "avg_credit_line_utilization"
    name: "Average Credit Line Utilization"
    category: "risk"
    definition: "Average percentage of approved credit line utilized across active borrowers"
    formula: "AVG(utilization_pct) * 100"
    inputs: ["utilization_pct"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "medium"
    thresholds:
      warning: 70
      critical: 90

  capital_collection_rate:
    id: "capital_collection_rate"
    name: "Capital Collection Rate"
    category: "collections"
    definition: "Ratio of principal already collected (capitalcobrado) to total outstanding balance"
    formula: "SUM(capital_collected) / SUM(outstanding_balance) * 100"
    inputs: ["capital_collected", "outstanding_balance"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"

  mdsc_posted_rate:
    id: "mdsc_posted_rate"
    name: "MDSC Posted Rate"
    category: "operations"
    definition: "Percentage of loans where the MDSC (debit authorization) has been posted"
    formula: "COUNT(loan_id WHERE mdsc_posted = 1) / COUNT(loan_id) * 100"
    inputs: ["mdsc_posted"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "medium"

# Segment KPI definitions (computed by _calculate_segment_kpis; not YAML-formula driven)
segment_kpis:
  par_30_by_company:
    id: "par_30_by_company"
    name: "PAR 30 by Company"
    category: "risk"
    definition: "PAR30 disaggregated by company segment (Financial Services / Technology)"
    formula: "SUM(outstanding_balance WHERE dpd >= 30) / SUM(outstanding_balance) * 100 GROUP BY company"
    inputs: ["outstanding_balance", "dpd", "company"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"

  par_30_by_credit_line:
    id: "par_30_by_credit_line"
    name: "PAR 30 by Credit Line"
    category: "risk"
    definition: "PAR30 broken down by credit line limit bucket"
    formula: "SUM(outstanding_balance WHERE dpd >= 30) / SUM(outstanding_balance) * 100 GROUP BY credit_line"
    inputs: ["outstanding_balance", "dpd", "credit_line"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"

  par_30_by_kam_hunter:
    id: "par_30_by_kam_hunter"
    name: "PAR 30 by KAM Hunter"
    category: "risk"
    definition: "PAR30 by originating KAM (hunter) — identifies which sales managers have higher-risk originations"
    formula: "SUM(outstanding_balance WHERE dpd >= 30) / SUM(outstanding_balance) * 100 GROUP BY kam_hunter"
    inputs: ["outstanding_balance", "dpd", "kam_hunter"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"

  par_30_by_kam_farmer:
    id: "par_30_by_kam_farmer"
    name: "PAR 30 by KAM Farmer"
    category: "collections"
    definition: "PAR30 by servicing KAM (farmer) — measures collection effectiveness per account manager"
    formula: "SUM(outstanding_balance WHERE dpd >= 30) / SUM(outstanding_balance) * 100 GROUP BY kam_farmer"
    inputs: ["outstanding_balance", "dpd", "kam_farmer"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"

  default_rate_by_gov:
    id: "default_rate_by_gov"
    name: "Default Rate by Gov / Institution"
    category: "risk"
    definition: "Default rate segmented by government institution or entity — flags concentration risk in public sector groups"
    formula: "COUNT(loan_id WHERE status = 'defaulted') / COUNT(loan_id) * 100 GROUP BY gov"
    inputs: ["status", "gov", "loan_id"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "medium"

  default_rate_by_industry:
    id: "default_rate_by_industry"
    name: "Default Rate by Industry"
    category: "risk"
    definition: "Default rate segmented by debtor's industry (Retail, Services, Manufacturing, etc.) — automatically identified from debtor name"
    formula: "COUNT(loan_id WHERE status = 'defaulted') / COUNT(loan_id) * 100 GROUP BY industry"
    inputs: ["status", "industry", "loan_id"]
    unit: "percentage"
    implementability_status: "implement_now"
    priority: "high"

  early_warning_flow_31_60:
    id: "early_warning_flow_31_60"
    name: "Early Warning: 31-60 DPD Flow Rate by Cohort"
    category: "risk"
    definition: "Percentage of previously current loans (dpd <= 30) that flowed into the 31-60 DPD bucket — leading indicator of deterioration"
    formula: "roll_rate_matrix['1_30_to_31_60']['roll_rate_pct']"
    inputs: ["outstanding_balance", "dpd", "origination_date", "portfolio_t0", "portfolio_t1"]
    unit: "percentage"
    description: >-
      Early warning roll rate: % of 1-30 DPD balance that migrated into the
      31-60 DPD bucket between observation period T0 and T1. Requires two
      consecutive portfolio snapshots (T0, T1).
    implementation: "backend.src.kpi_engine.cohorts.compute_roll_rates(t0, t1)['roll_rate_matrix']['1_30_to_31_60']['roll_rate_pct']"
    implementability_status: "implement_now"
    thresholds:
      warning: 20
      critical: 35
    priority: "high"
    notes: "Uses cohort_analytics.compute_roll_rates with consecutive snapshots; accessible via KPIService.get_roll_rate_matrix()"

# NSM (North Star Metric) KPIs — recurrent client volume
nsm_kpis:
  recurrent_tpv_12m:
    id: "recurrent_tpv_12m"
    name: "Recurrent TPV (trailing 12 months)"
    category: "growth"
    definition: "Total disbursement volume originated by clients active in ≥2 of the last 12 months"
    formula: "SUM(disbursement_amount WHERE client active in >= 2 of last 12 calendar months)"
    inputs: ["disbursement_amount", "customer_id", "disbursement_date"]
    unit: "USD"
    implementability_status: "implement_now"
    priority: "critical"
    python_method: "get_customer_types().recurrent_tpv_12m_usd"
    thresholds:
      warning: 500000
      target: 1000000

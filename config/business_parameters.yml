financial_guardrails:
  min_rotation: 4.5
  max_default_rate: 0.04
  max_top_10_concentration: 0.30
  max_single_obligor_concentration: 0.04
  target_apr_min: 0.34
  target_apr_max: 0.40
  max_cost_of_debt: 0.13
  min_dscr: 1.2
  utilization_min: 0.75
  utilization_max: 0.90
  min_ce_6m: 0.96
  max_replines_deviation: 0.02
  min_liquidity_reserve_pct: 0.05       # 5% mínimo sobre cartera activa
  target_liquidity_reserve_pct: 0.08    # 8% objetivo liquidez
  min_liquidity_floor_usd: 200000       # Piso absoluto de caja
  min_collection_rate: 0.985            # 98.50% exigencia del fondo
  max_delinquency_growth: 0.0           # Mora no puede crecer vs anterior
  advance_rate: 0.80                    # 80% de cartera elegible financiada
  repline_30d_max_pct: 0.45             # Máx cartera bucket 30 días
  repline_60d_max_pct: 0.35             # Máx cartera bucket 60 días
  repline_90d_max_pct: 0.20             # Máx cartera bucket 90 días

risk_parameters:
  dilution_threshold: 0.05
  recourse_cap: 100000
  # loss_given_default here is a COVENANT / REPLINE GUARDRAIL parameter used for
  # capital-adequacy covenant checks (e.g., advance rate / repline compliance).
  # It is NOT the ECL LGD for IFRS 9 / Basel provisioning.
  # For ECL / EL calculations, use financial_assumptions.lgd_fixed_rate below.
  # These two values intentionally differ: this represents expected net credit losses
  # under the facility covenant structure (strong security/recourse), while
  # lgd_fixed_rate represents the conservative provisioning LGD.
  loss_given_default: 0.10

sla_settings:
  decision_sla_hours: 24
  funding_sla_hours: 48
  sla_compliance_target: 0.90
  min_slo: 0.995

analytics_weights:
  dq_null_weight: 1.0
  dq_duplicate_weight: 0.5
  dq_invalid_numeric_weight: 0.6

portfolio_targets_2026:
  "2026-01": 8500000
  "2026-02": 8800000
  "2026-03": 9100000
  "2026-04": 9400000
  "2026-05": 9700000
  "2026-06": 10000000
  "2026-07": 10300000
  "2026-08": 10600000
  "2026-09": 10900000
  "2026-10": 11200000
  "2026-11": 11600000
  "2026-12": 12000000

financial_assumptions:
  funding_cost_rate: 0.08          # Cost of funds (decimal). Sourced: treasury review Q1 2026.
                                    # MUST be reviewed quarterly. Drives NIM proxy.
  lgd_method: "empirical"          # "empirical" = compute from recovery_amount/disbursed
                                    # "fixed" = use lgd_fixed_rate below
  lgd_fixed_rate: 0.90             # ECL / PROVISIONING LGD used when lgd_method = "fixed".
                                    # Also used by catalog_processor (lending_kpis/graph_analytics)
                                    # as the canonical ECL LGD. Distinct from
                                    # risk_parameters.loss_given_default (covenant guardrail).
  lgd_floor: 0.40                  # Minimum LGD even when empirical recovery is high
  lgd_ceil: 0.95                   # Maximum LGD cap

pd_assignment:
  source: "scorecard"              # "scorecard" | "dpd_bucket" | "blend"
  scorecard_model_path: "backend/loans_analytics/models/scorecard_model.pkl"
  dpd_buckets:                     # Fallback when scorecard unavailable
    current:   0.005
    dpd_30:    0.050
    dpd_60:    0.150
    dpd_90:    0.350
    dpd_180:   0.700
    defaulted: 1.000
  blend_weight_scorecard: 0.70     # Used only when source = "blend"
  blend_weight_dpd:        0.30

agents:
  c_level_executive:
    requires_human_approval: false
  kpi_analytics:
    refresh_schedule:
      continuous_monitoring: '*/10 * * * *'
  risk_analysis:
    refresh_schedule:
      continuous_monitoring: '*/15 * * * *'
integrations:
  meta:
    enabled: false
observability:
  logging:
    level: INFO
pipeline:
  phases:
    ingestion:
      file:
        default_path: data/archives/staging/loan_tape.csv
      validation:
        strict: true
    outputs:
      storage:
        local_dir: data/metrics/staging
      supabase:
        enabled: true
        schema: analytics_staging
        tables:
        - fact_loans_staging
        - kpi_timeseries_daily_staging

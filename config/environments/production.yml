# Production Environment Overrides
# Merge with base pipeline.yml for production deployment

pipeline:
  phases:
    ingestion:
      file:
        default_path: data/archives/warehouse/loan_tape.csv
      validation:
        strict: true
    outputs:
      storage:
        local_dir: data/metrics/production
      supabase:
        enabled: true
        schema: analytics
        tables:
          - fact_loans
          - kpi_timeseries_daily

observability:
  logging:
    level: INFO

integrations:
  meta:
    enabled: true
    app_id: '${META_APP_ID}'
    business_id: '${META_BUSINESS_ID}'
    auth:
      system_user_token_secret: META_SYSTEM_USER_TOKEN

agents:
  kpi_analytics:
    refresh_schedule:
      continuous_monitoring: '*/30 * * * *'
  risk_analysis:
    refresh_schedule:
      continuous_monitoring: '*/15 * * * *'
  c_level_executive:
    requires_human_approval: true

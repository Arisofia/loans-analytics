apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
  namespace: abaco-analytics
  labels:
    app: analytics-api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: analytics-api
  template:
    metadata:
      labels:
        app: analytics-api
    spec:
      containers:
        - name: analytics-api
          image: ghcr.io/arisofia/abaco-loans-analytics:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: API_JWT_ENABLED
              value: "1"
            - name: API_JWT_ALGORITHM
              value: HS256
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: api_jwt_secret
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: supabase_url
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: supabase_anon_key
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"

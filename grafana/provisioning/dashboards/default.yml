apiVersion: 1

providers:
  - name: "ABACO KPI Dashboards"
    orgId: 1
    folder: "KPI Monitoring"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true

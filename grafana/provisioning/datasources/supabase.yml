apiVersion: 1

datasources:
  - name: Supabase PostgreSQL
    type: postgres
    access: proxy
    url: ${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}
    database: ${SUPABASE_DB_NAME}
    user: ${SUPABASE_DB_USER}
    secureJsonData:
      password: ${SUPABASE_DB_PASSWORD}
    jsonData:
      sslmode: require
      postgresVersion: 1400
      timescaledb: false
      maxOpenConns: 20
      maxIdleConns: 2
      connMaxLifetime: 14400
      database: ${SUPABASE_DB_NAME}
    editable: true
    isDefault: true
    version: 1

  - name: Supabase REST API
    type: grafana-simple-json-datasource
    access: proxy
    url: ${SUPABASE_URL}/rest/v1
    basicAuth: false
    withCredentials: false
    jsonData:
      httpHeaderName1: apikey
      httpHeaderName2: Authorization
    secureJsonData:
      httpHeaderValue1: ${SUPABASE_ANON_KEY}
      httpHeaderValue2: Bearer ${SUPABASE_ANON_KEY}
    editable: true
    version: 1

  - name: Azure Monitor
    type: grafana-azure-monitor-datasource
    access: proxy
    jsonData:
      cloudName: azuremonitor
      azureAuthType: msi
      subscriptionId: ${AZURE_SUBSCRIPTION_ID:-}
    editable: true
    version: 1

  - name: Prometheus Local
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    version: 1

# Gitleaks Configuration: Secret Detection in Git History
# Production-ready configuration for detecting API keys, tokens, and credentials
# Reference: https://github.com/gitleaks/gitleaks
# Updated: 2026-03-19 (R-12: Security Hardening)

[extend]
# Use the default gitleaks detection rules as baseline
useDefault = true

[general]
# Enable strict mode: fail the scan on any secrets found
fail = true
# Verbose output for troubleshooting
verbose = false
# Do not redact secrets in output (for log review)
redact = false

# Additional custom rules for project-specific secrets
[[rules]]
id = "aws-access-key-custom"
description = "AWS Access Key ID and Secret patterns"
regex = '''(?i)aws_access_key_id\s*[:=]\s*['\"]?[A-Z0-9]{20}['\"]?'''
tags = ["aws", "credentials"]
entropy = 0
keywords = ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY"]

[[rules]]
id = "supabase-keys"
description = "Supabase API Keys and Service Role Keys"
regex = '''(?i)(supabase[_-]?(?:api|anon|service[_-]role)[_-]?key)\s*[:=]\s*['\"]?(eyJ[A-Za-z0-9_-]{50,})['\"]?'''
tags = ["supabase", "postgresql", "api-key"]
entropy = 0
keywords = ["SUPABASE", "SERVICE_ROLE_KEY"]

[[rules]]
id = "postgresql-password"
description = "PostgreSQL connection strings with embedded passwords"
regex = '''postgresql://[^:]+:([^@]+)@'''
tags = ["database", "postgresql", "credentials"]
entropy = 0
keywords = ["postgresql", "password"]

[[rules]]
id = "private-key-begin"
description = "Private SSH/PGP/RSA keys (BEGIN marker)"
regex = '''-----BEGIN (RSA|DSA|EC|PGP|OPENSSH) PRIVATE KEY.*-----'''
tags = ["private-key", "pem", "credentials"]
entropy = 0
keywords = ["PRIVATE KEY"]

[allowlist]
description = "Paths and patterns excluded from secret scanning (false positives)"

# File paths to exclude from scanning
paths = [
  # Documentation files (may contain example credentials)
  '''docs/.*\.md$''',
  '''.*README\.md$''',
  '''CHANGELOG\.md$''',
  '''.*\.example\.md$''',
  
  # Example/sample fixtures (explicitly allowed for testing)
  '''tests?/.*/(fixtures|samples|data)/.*''',
  '''.*\.example(\.[a-z]+)?$''',
  '''.*\.sample(\.[a-z]+)?$''',
  '''.*\.template(\.[a-z]+)?$''',
  
  # Generated/compiled files (no secrets should be here)
  '''node_modules/.*''',
  '''\.venv/.*''',
  '''\.env\.lock(\.txt)?$''',
  '''pnpm-lock\.yaml$''',
  '''.*\.lock\.txt$''',
  '''requirements.*\.lock\.txt$''',
  # Dependency audit output files (pip-audit, safety) — no secrets, only CVE/package data
  '''pip-audit.*\.json$''',
  '''safety.*\.json$''',

  # Build and test artifacts
  '''build/.*''',
  '''dist/.*''',
  '''__pycache__/.*''',
  '''\.pytest_cache/.*''',
  '''htmlcov/.*''',
  '''\.coverage.*''',
  
  # CI/CD configuration (reviewed separately in GitHub)
  '''\.github/workflows/.*''',
  '''\.github/.*\.yml$''',
  
  # Infrastructure as code (reviewed in separate security audit)
  '''infra/.*''',
  '''azure\.yaml$''',
  '''docker-compose.*\.yml$''',
  
  # Version control metadata
  '''\.git/.*''',
  '''\.gitignore$''',
  '''\.gitattributes$''',
]

# Regex patterns for placeholder/example secrets (allowed in docs)
regexes = [
  '''(?i)(YOUR|EXAMPLE|PLACEHOLDER|DEMO|TEST)[-_]?(API|SECRET|KEY|TOKEN|PASSWORD)''',
  '''(?i)admin:admin''',
  '''(?i)test:test''',
  '''(?i)placeholder[-_]?(key|secret|token)''',
]

# Specific commits to allow (known false positives after manual review)
# Add format: "commit-sha" = "reason"
# commits = [
# ]

[report]
description = "Gitleaks scan report configuration"
# Verbose JSON report for CI/CD integration
verbose = true

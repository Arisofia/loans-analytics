# Gitleaks configuration file
# Allows example/placeholder secrets in documentation and test files

[extend]
# Use the default gitleaks rules
useDefault = true

[allowlist]
description = "Allow example secrets in documentation and test files"

# Allow paths that commonly contain example/placeholder secrets
paths = [
  '''docs/.*\.md$''',
  '''n8n/README\.md$''',
  '''.*README\.md$''',
  '''tests/integration/.*''',
  '''\.env\.example$''',
]

# Allow specific regex patterns for placeholder secrets
regexes = [
  '''your[-_]?api[-_]?key''',
  '''admin:admin''',
  '''PLACEHOLDER''',
  '''example[-_]?key''',
  '''test[-_]?secret''',
]

# Allow specific commits if needed
# commits = [
#   "commit-sha-here"
# ]

[pytest]
markers =
    stats: advanced statistical tests (optional)
    integration_supabase: Supabase-backed historical KPI integration tests
    asyncio: marks tests as async (used with pytest-asyncio)
filterwarnings =
    ignore:KPIEngine \(v1\) is deprecated.*:DeprecationWarning
    ignore:pkg_resources is deprecated.*:DeprecationWarning
testpaths =
    python/multi_agent
    python/tests
    tests
norecursedirs =
    .git
    .venv
    __pycache__
    .pytest_cache
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Skip tests with import errors (legacy code not yet migrated)
collect_ignore =
    python/tests/test_ingestion_extra.py

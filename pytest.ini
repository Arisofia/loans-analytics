[pytest]
asyncio_mode = auto
markers =
    stats: advanced statistical tests (optional)
    integration_supabase: Supabase-backed historical KPI integration tests
    integration: integration tests requiring external services (opt-in)
    e2e: end-to-end tests requiring live backend/frontend services (opt-in)
    asyncio: marks tests as async (used with pytest-asyncio)
    timeout: tests with timeout constraints
filterwarnings =
    ignore:KPIEngine \(v1\) is deprecated.*:DeprecationWarning
    ignore:pkg_resources is deprecated.*:DeprecationWarning
testpaths =
    backend/python/multi_agent
    backend/python/tests
    tests
norecursedirs =
    .git
    .venv
    __pycache__
    .pytest_cache
    .hypothesis

# Ensure 'src', 'python', and 'streamlit_app' remain importable under their
# original names after the Clean Architecture directory move (Phase 1).
pythonpath = backend frontend

# Coverage reporting
addopts = --import-mode=importlib --cov-report=term --cov-report=html --cov=backend/python --cov=backend/src --cov=frontend/streamlit_app
python_files = test_*.py
python_classes = Test*
python_functions = test_*

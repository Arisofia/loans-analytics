site_name: Generic Loans Analytics
site_description: Production lending analytics platform – KPI engine, pipeline, and observability docs
site_author: Analytics Team
docs_dir: docs
site_dir: _site

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Setup: SETUP_GUIDE_CONSOLIDATED.md
  - Operations: OPERATIONS.md
  - Observability: OBSERVABILITY.md
  - KPIs:
      - Catalog: KPI_CATALOG.md
      - SSOT Registry: KPI_SSOT_REGISTRY.md
      - Lineage: kpi_lineage.md
      - Operating Model: KPI-Operating-Model.md
  - Data:
      - Dictionary: DATA_DICTIONARY.md
      - Governance: DATA_GOVERNANCE.md
  - Security:
      - API Security: API_SECURITY_GUIDE.md
      - Security Policy: SECURITY.md
  - Governance: GOVERNANCE.md
  - Production Deployment: PRODUCTION_DEPLOYMENT_GUIDE.md
  - Targets 2026: TARGETS_2026.md

version: 2
updates:
  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    assignees:
      - "codex"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Maintain Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Temporary until upstream releases a patched Pygments version.
      # GHSA-5239-wwwm-4pmq / CVE-2026-4539 currently has no fixed release.
      - dependency-name: "pygments"
        versions: ["<=2.19.2"]
      # Duplicate with capitalized package name to avoid ecosystem-specific
      # matching edge cases in Dependabot metadata.
      - dependency-name: "Pygments"
        versions: ["<=2.19.2"]
    open-pull-requests-limit: 10
    assignees:
      - "codex"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Maintain Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    assignees:
      - "codex"

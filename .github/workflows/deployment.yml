name: Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying application..."
          # Add deployment logic here

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment
        env:
          HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          echo "Verifying deployment..."
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "HEALTHCHECK_URL not set. Skipping verification."
            exit 0
          fi
          echo "Checking health at ${HEALTHCHECK_URL}..."
          curl -f "${HEALTHCHECK_URL}" || exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deployment verification failed',
              body: 'Deployment verification failed. Check logs.',
              labels: ['deployment', 'bug']
            })

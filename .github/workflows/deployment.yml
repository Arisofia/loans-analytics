name: Deployment (DISABLED — Azure services stopped to reduce costs)

on:
  # DISABLED: Azure App Service deployment stopped to eliminate cloud costs
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ------------------------------------------------------------------
  # Job 1: Run tests before deploying
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -q --tb=line

  # ------------------------------------------------------------------
  # Job 2: Build and push Docker images to GHCR
  # ------------------------------------------------------------------
  build:
    if: ${{ vars.ENABLE_AZURE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/api:latest
            ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/dashboard:latest
            ghcr.io/${{ steps.repo.outputs.name }}/dashboard:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

  # ------------------------------------------------------------------
  # Job 3: Deploy to Azure App Service
  # ------------------------------------------------------------------
  deploy:
    if: ${{ vars.ENABLE_AZURE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check Azure credentials
        id: creds
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::warning::AZURE_CREDENTIALS is not configured. Skipping deploy steps."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        if: steps.creds.outputs.available == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Lowercase repository name
        if: steps.creds.outputs.available == 'true'
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy API container
        if: steps.creds.outputs.available == 'true'
        run: |
          az webapp config container set \
            --name abaco-loans-api \
            --resource-group abaco-loans-rg \
            --container-image-name "ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}" \
            --container-registry-url "https://ghcr.io" \
            --container-registry-user "${{ github.actor }}" \
            --container-registry-password "${{ secrets.GITHUB_TOKEN }}" && \
          az webapp restart --name abaco-loans-api --resource-group abaco-loans-rg

      - name: Deploy Dashboard container
        if: steps.creds.outputs.available == 'true'
        run: |
          az webapp config container set \
            --name abaco-loans-dashboard \
            --resource-group abaco-loans-rg \
            --container-image-name "ghcr.io/${{ steps.repo.outputs.name }}/dashboard:${{ github.sha }}" \
            --container-registry-url "https://ghcr.io" \
            --container-registry-user "${{ github.actor }}" \
            --container-registry-password "${{ secrets.GITHUB_TOKEN }}" && \
          az webapp restart --name abaco-loans-dashboard --resource-group abaco-loans-rg

      - name: Azure Logout
        if: always() && steps.creds.outputs.available == 'true'
        run: az logout

  # ------------------------------------------------------------------
  # Job 4: Post-deployment health check
  # ------------------------------------------------------------------
  verify:
    if: ${{ vars.ENABLE_AZURE_DEPLOY == 'true' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      issues: write
    steps:
      - name: Wait for App Service cold start
        run: sleep 60

      - name: Health check - API
        run: |
          API_URL="https://abaco-loans-api.azurewebsites.net/health"
          echo "Checking API at ${API_URL}..."
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${API_URL}" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 30
          done
          echo "API did not respond with 200 after 10 attempts."
          exit 1

      - name: Health check - Dashboard
        run: |
          APP_URL="https://abaco-loans-dashboard.azurewebsites.net"
          echo "Checking dashboard at ${APP_URL}..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Dashboard is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Dashboard did not respond with 200 after 5 attempts."
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const {owner, repo} = context.repo;
            const runUrl = [
              context.serverUrl, owner, repo,
              'actions/runs', context.runId
            ].join('/');
            const body = [
              `Deployment verification failed for commit ${context.sha}.`,
              '',
              `Check the [workflow logs](${runUrl}).`
            ].join('\n');
            github.rest.issues.create({
              owner,
              repo,
              title: 'Deployment verification failed',
              body,
              labels: ['deployment', 'bug']
            })

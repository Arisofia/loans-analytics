name: Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io

jobs:
  # ------------------------------------------------------------------
  # Job 1: Run tests before deploying
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -q --tb=line

  # ------------------------------------------------------------------
  # Job 2: Build and push Docker images to GHCR
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/api:latest
            ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/dashboard:latest
            ghcr.io/${{ steps.repo.outputs.name }}/dashboard:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

  # ------------------------------------------------------------------
  # Job 3: Deploy to Azure App Service
  # ------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: abaco-loans-api
          images: ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}

      - name: Deploy Dashboard to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: abaco-loans-dashboard
          images: ghcr.io/${{ steps.repo.outputs.name }}/dashboard:${{ github.sha }}

      - name: Azure Logout
        if: always()
        run: az logout

  # ------------------------------------------------------------------
  # Job 4: Post-deployment health check
  # ------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for App Service cold start
        run: sleep 30

      - name: Health check - API
        run: |
          API_URL="https://abaco-loans-api.azurewebsites.net/health"
          echo "Checking API at ${API_URL}..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "API is healthy."
              break
            fi
            sleep 15
          done

      - name: Health check - Dashboard
        run: |
          APP_URL="https://abaco-loans-dashboard.azurewebsites.net"
          echo "Checking dashboard at ${APP_URL}..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Dashboard is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Dashboard did not respond with 200 after 5 attempts."
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deployment verification failed',
              body: `Deployment verification failed for commit ${context.sha}.\n\nCheck the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['deployment', 'bug']
            })

name: KPI Parity

"on":
  push:
    branches: [main, develop]
    paths:
      - "src/analytics/**"
      - "supabase/migrations/**"
      - "tests/test_kpi_parity.py"
      - "requirements*.txt"
      - ".github/workflows/kpi-parity.yml"
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  kpi-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install system dependencies (psql client)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -r requirements-dev.txt
          # Install additional heavy data deps if needed for this job
          pip install psycopg[binary] pandas scipy numpy

      - name: Check database availability
        id: db_check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "db_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "db_available=false" >> "$GITHUB_OUTPUT"
          fi

      # NOTE: Legacy analytics script removed in Phase B (Data Integrity)
      # KPI generation modernization deferred to separate initiative
      - name: Skip Legacy KPI Generation (Deprecated)
        env:
          PYTHONPATH: .
        run: |
          mkdir -p exports
          echo "Legacy run_complete_analytics.py removed in Phase B"
          echo "KPI generation modernization tracked separately"
          # Create empty placeholder to satisfy downstream steps
          echo '{}' > exports/complete_kpi_dashboard.json

      - name: Apply SQL migrations (analytics views)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
        if: steps.db_check.outputs.db_available == true
        run: |
          echo "Applying analytics views migration to $DATABASE_URL"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/20260101_analytics_kpi_views.sql

      - name: Run KPI parity tests (Python vs SQL)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
          RUN_KPI_PARITY_TESTS: "1"
        if: steps.db_check.outputs.db_available == true
        run: |
          pytest -q tests/test_kpi_parity.py

      - name: Skip KPI parity tests (no database configured)
        if: steps.db_check.outputs.db_available != 'true'
        run: |
          echo "::warning::DATABASE_URL secret not configured - skipping KPI parity tests"
          echo "To enable these tests, add DATABASE_URL to repository secrets"

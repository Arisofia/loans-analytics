name: Orchestrate deploy verification

on:
    workflow_dispatch:
        inputs:
            target_url:
                description: "Target URL to verify (e.g., https://app.example.com)"
                required: true
                type: string
            ref:
                description: "Git ref to inspect (defaults to HEAD/main)"
                required: false
                type: string

jobs:
    orchestrate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Ensure required secret
              uses: ./.github/workflows/reusable-secret-check.yml
              with:
                  secrets: "MIDDLEWARE_SHARED_SECRET"
              secrets: inherit

            - name: Dispatch Deploy verification workflow
              id: dispatch
              uses: actions/github-script@v6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const target = context.payload.inputs.target_url || process.env.TARGET_URL
                      const ref = context.payload.inputs.ref || context.ref.replace('refs/heads/','main')
                      const repo = context.repo.owner + '/' + context.repo.repo
                      const workflows = await github.rest.actions.listRepoWorkflows({owner: context.repo.owner, repo: context.repo.repo})
                      const wf = workflows.data.workflows.find(w => w.name && w.name.toLowerCase().includes('deploy verification'))
                      if(!wf) core.setFailed('deploy-verify workflow not found')
                      await github.rest.actions.createWorkflowDispatch({owner: context.repo.owner, repo: context.repo.repo, workflow_id: wf.id, ref, inputs: { target_url: target }})
                      core.setOutput('workflow_id', wf.id)

            - name: Wait for Deploy verification to finish
              id: wait
              uses: actions/github-script@v6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const workflowId = parseInt(core.getInput('workflow_id') || core.getOutput('workflow_id'))
                      const owner = context.repo.owner
                      const repo = context.repo.repo
                      const runPoll = async (timeoutMs = 5*60*1000, intervalMs = 5000) => {
                        const deadline = Date.now() + timeoutMs
                        while (Date.now() < deadline) {
                          const runs = await github.rest.actions.listWorkflowRuns({owner, repo, workflow_id: workflowId, per_page: 10})
                          if (runs.data.total_count > 0) {
                            // find the most recent run
                            const run = runs.data.workflow_runs[0]
                            if (run.status === 'completed') {
                              return run
                            }
                          }
                          await new Promise(r => setTimeout(r, intervalMs))
                        }
                        throw new Error('Timed out waiting for deploy-verify run')
                      }
                      const run = await runPoll()
                      core.setOutput('run_id', run.id)
                      core.setOutput('run_url', run.html_url)

            - name: Upload orchestrator metadata
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: deploy-verify-orchestrator
                  path: |
                      .
                  if-no-files-found: ignore

            - name: Print summary
              if: always()
              run: |
                  echo "Dispatch complete. Deploy verify run: ${{ steps.wait.outputs.run_url }}"

name: Lint and Policy Enforcement

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Required for gitleaks to scan PR commit range

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install linters and tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jsonlint yamllint==1.33.0
          npm install -g markdownlint-cli --ignore-scripts

      - name: Lint YAML
        run: |
          yamllint -c .yamllint . --no-warnings || exit 0

      - name: Lint JSON
        run: |
          find . -name '*.json' -not -path './node_modules/*' -not -path './.venv/*' -exec jsonlint -q {} \;

      - name: Lint Markdown
        continue-on-error: true
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore .venv || echo "::warning::Markdown linting found issues"

      - name: Lint Python (pylint, flake8, ruff)
        run: |
          echo "Running pylint..."
          PYTHONPATH="src:python:." pylint src tests --fail-under=8.0
          echo "Running flake8..."
          PYTHONPATH="src:python:." flake8 src tests
          echo "Running ruff..."
          PYTHONPATH="src:python:." ruff check src tests

      - name: Type Check (mypy)
        run: |
          PYTHONPATH="src:python:." mypy src tests --ignore-missing-imports --disable-error-code=import-untyped

      - name: Check for duplicate/stale README and config files
        run: |
          find . -type f \( -iname 'README*' -o -iname '*example*' -o -iname '*sample*' \) \
            | grep -vE 'node_modules|.venv|.git|.mypy_cache|.pytest_cache|.ruff_cache|dist|build' \
            | grep -vE 'dev-requirements.txt|.env.example|.env.local.example' \
            | grep -vE 'scripts/generate_abaco_portfolio_sample.py' \
            | grep -vE 'data_samples/abaco_portfolio_sample.csv' \
            | grep -vE 'config/codex_mcp_config.toml.example' \
            > doc_files.txt
          if [ -f "scripts/security/check_doc_policy.py" ]; then
            python scripts/security/check_doc_policy.py doc_files.txt
          else
            echo "::warning::scripts/security/check_doc_policy.py not found, skipping policy check"
            echo "Found $(wc -l < doc_files.txt) documentation files"
          fi

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          fail: true

      - name: Fail if policy violations found
        if: failure()
        run: exit 1

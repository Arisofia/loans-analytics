name: AI Pull Request Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  gemini_review:
    name: Gemini PR Review
    if: github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false
    uses: ./.github/workflows/gemini_pr_review.yml
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
      pr_number: ${{ github.event.pull_request.number }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      gemini_model: ${{ vars.GEMINI_MODEL || 'gemini-1.5-pro' }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_SIMPLE }}

  codex_review:
    name: Codex PR Review
    if: ${{ github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false }}
    uses: ./.github/workflows/codex_pull_request_review.yml
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

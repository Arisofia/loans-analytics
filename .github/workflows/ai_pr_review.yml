name: AI Pull Request Review

"on":
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths-ignore:
      - '*.md'
      - 'docs/**'
# @copilot: CI trigger tuning handled here to reduce review costs.

jobs:
  gemini_review:
    name: Gemini PR Review
    if: github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/gemini_pr_review.yml
    secrets:
      GEMINI_API_KEY_SIMPLE: ${{ secrets.GEMINI_API_KEY_SIMPLE }}
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
      gemini_model: ${{ vars.GEMINI_MODEL }}

  codex_review:
    name: Codex PR Review
    if: github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/codex_pull_request_review.yml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}

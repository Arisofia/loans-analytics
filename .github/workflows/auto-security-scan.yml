name: Auto Security Scan

# Runs security scanning on pull requests, pushes, and weekly schedule
# Required secrets: SNYK_TOKEN (optional - for Snyk integration)
# To set up SNYK_TOKEN: See docs/SNYK_SETUP.md

on:
    pull_request:
        types: [opened, synchronize, ready_for_review]
    push:
        branches: [main]
    schedule:
        - cron: "0 0 * * 0" # Weekly on Monday

jobs:
    security:
        name: Security Scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write

        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Set up Python
              uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
              with:
                  python-version: "3.12"
                  cache: "pip"

            - name: Install security tools
              run: |
                  pip install bandit safety pip-audit

            - name: Run Bandit (security linter)
              run: |
                  bandit -r python/ .github/scripts/ -f json -o bandit-report.json || true
                  bandit -r python/ .github/scripts/ || true

            - name: Run Safety (dependency vulnerabilities)
              run: |
                  safety check --json || true

            - name: Run pip-audit
              run: |
                  pip-audit || true

            - name: Upload security reports
              if: always()
              uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
              with:
                  name: security-reports
                  path: bandit-report.json

    dependency-check:
        name: Dependency Vulnerabilities
        runs-on: ubuntu-latest
        permissions:
            contents: read
        # This job checks for dependency vulnerabilities using Snyk
        # Requires SNYK_TOKEN secret to be configured in GitHub Actions
        # See: docs/SNYK_SETUP.md for setup instructions

        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Run Snyk (if token available)
              if: ${{ secrets.SNYK_TOKEN != '' }}
              # This step runs only if SNYK_TOKEN is configured
              # If token is not set, this step is skipped gracefully
              run: |
                  npm install -g snyk
                  snyk auth ${{ secrets.SNYK_TOKEN }}
                  snyk test --json-file-output=snyk-report.json || true
              continue-on-error: true

            - name: Upload Snyk report
              if: always() && ${{ secrets.SNYK_TOKEN != '' }}
              uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
              with:
                  name: snyk-report
                  path: snyk-report.json

name: Validate Workflows

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-validation:
    name: Syntax Validation (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error
          filter_mode: added

  structure-validation:
    name: YAML Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: |
          python -m pip install yamllint
      - name: Run yamllint
        run: yamllint .github/workflows

  shellcheck-validation:
    name: ShellCheck Validation (including inline run blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract inline `run` blocks from workflows
        run: |
          chmod +x scripts/extract_run_blocks.sh
          scripts/extract_run_blocks.sh .github/workflows/extracted_runs

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on scripts + extracted run blocks
        run: |
          set -euo pipefail
          # Ensure recursive globstar works for ** pattern and expand globs safely
          shopt -s globstar || true
          files=(scripts/**/*.sh .github/workflows/extracted_runs/**/*.sh)
          matches=()
          for p in "${files[@]}"; do
            for f in $p; do
              if [ -e "$f" ]; then
                matches+=("$f")
              fi
            done
          done
          if [ ${#matches[@]} -eq 0 ]; then
            echo "No shell scripts found to lint"
          else
            echo "Running shellcheck on ${#matches[@]} file(s)..."
            # If shellcheck returns non-zero (warnings/errors), don't fail the CI run here — treat results as annotations
            shellcheck -x "${matches[@]}" || true
          fi

  dependency-validation:
    name: Dependency Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip check

  trigger-validation:
    name: Trigger Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for missing workflow_dispatch
        run: |
          # Placeholder: run any project-specific trigger checks
          echo "ok"

  secrets-presence:
    # Skip secrets-presence on pull_request events (secrets are unavailable for forks/PR checks)
    if: ${{ github.event_name != 'pull_request' }}
    uses: ./.github/workflows/reusable-secret-check.yml
    with:
      secrets: >-
        DOCKER_USERNAME,DOCKER_PASSWORD,AZURE_ACR_LOGIN_SERVER,
        AZURE_ACR_PASSWORD,AZURE_WEBAPP_PUBLISH_PROFILE,FIGMA_TOKEN
    secrets: inherit

  secrets-validation:
    name: Secrets Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          set -euo pipefail
          PATTERN="(AKIA|aws_secret|SECRET_KEY|PASSWORD|password=|SECRET=|API_KEY|PRIVATE_KEY)"
          # Only search in common config/script file types to reduce false positives
          find . -type f \( -name '*.yml' -o -name '*.yaml' -o -name '*.sh' -o -name '*.env' -o -name '*.conf' -o -name '*.ini' \) -print0 | \
            xargs -0 grep -EnI "$PATTERN" | grep -vE "example|\\.env\\.example|README|pnpm-lock.yaml|\\.md$|package-lock.json|package.json|\\.json$" && \
            (echo "Potential hardcoded secret(s) found" >&2; exit 1) || true
          # If grep found matches above, the previous command would have exited non-zero and the job will fail due to set -euo pipefail

  summary:
    name: Workflow Validation Summary
    runs-on: ubuntu-latest
    needs:
      - syntax-validation
      - structure-validation
      - shellcheck-validation
      - dependency-validation
      - trigger-validation
      - secrets-validation
      - secrets-presence
    if: |
      always() && (
        needs.syntax-validation.result == 'failure' ||
        needs.structure-validation.result == 'failure' ||
        needs.shellcheck-validation.result == 'failure' ||
        needs.dependency-validation.result == 'failure' ||
        needs.trigger-validation.result == 'failure' ||
        needs.secrets-validation.result == 'failure' ||
        needs.secrets-presence.outputs.all_secrets_present == 'false'
      )
    steps:
      - name: Fail on validation error
        run: exit 1

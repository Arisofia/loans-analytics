name: Validate Workflows

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-validation:
    name: Syntax Validation (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error
          filter_mode: added

  structure-validation:
    name: YAML Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: |
          python -m pip install yamllint
      - name: Run yamllint
        run: yamllint .github/workflows

  shellcheck-validation:
    name: ShellCheck Validation (including inline run blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract inline `run` blocks from workflows
        run: |
          chmod +x scripts/extract_run_blocks.sh
          scripts/extract_run_blocks.sh .github/workflows/extracted_runs

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on scripts + extracted run blocks
        run: |
          set -euo pipefail
          # shellcheck -x for sourced scripts; expand globs
          shellcheck -x scripts/**/*.sh .github/workflows/extracted_runs/**/*.sh

  dependency-validation:
    name: Dependency Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip check

  trigger-validation:
    name: Trigger Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for missing workflow_dispatch
        run: |
          # Placeholder: run any project-specific trigger checks
          echo "ok"

  secrets-presence:
    uses: ./.github/workflows/reusable-secret-check.yml
    with:
      secrets: >-
        DOCKER_USERNAME,DOCKER_PASSWORD,AZURE_ACR_LOGIN_SERVER,
        AZURE_ACR_PASSWORD,AZURE_WEBAPP_PUBLISH_PROFILE,FIGMA_TOKEN
    secrets: inherit

  secrets-validation:
    name: Secrets Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          set -euo pipefail
          PATTERN="(AKIA|aws_secret|SECRET_KEY|PASSWORD|password=|SECRET=|API_KEY|PRIVATE_KEY)"
          if grep -rEin --include='*.yml' --include='*.yaml' --include='*.sh' --include='*.env' --include='*.conf' --include='*.ini' --exclude-dir=.git --exclude-dir=tests --exclude-dir=infra --exclude-dir=node_modules --exclude-dir=.venv . |
             grep -vE "example|\\.env\\.example|README|pnpm-lock.yaml|\\.md$|package-lock.json|package.json|\\.json$"; then
            echo "Potential hardcoded secret(s) found" >&2
            exit 1
          fi

  summary:
    name: Workflow Validation Summary
    runs-on: ubuntu-latest
    needs:
      - syntax-validation
      - structure-validation
      - shellcheck-validation
      - dependency-validation
      - trigger-validation
      - secrets-validation
      - secrets-presence
    if: |
      always() && (
        needs.syntax-validation.result == 'failure' ||
        needs.structure-validation.result == 'failure' ||
        needs.shellcheck-validation.result == 'failure' ||
        needs.dependency-validation.result == 'failure' ||
        needs.trigger-validation.result == 'failure' ||
        needs.secrets-validation.result == 'failure' ||
        needs.secrets-presence.outputs.all_secrets_present == 'false'
      )
    steps:
      - name: Fail on validation error
        run: exit 1

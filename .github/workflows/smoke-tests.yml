name: Smoke Tests

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      - name: Run basic agent orchestration
        timeout-minutes: 2
        run: |
          python -m pytest tests/agents/test_scenarios/test_happy_path.py -v --timeout=60
        continue-on-error: true
        id: happy_path

      - name: Check Supabase connectivity
        run: |
          python scripts/health_check.py supabase
        continue-on-error: true
        id: supabase

      - name: Check agent system
        run: |
          python scripts/health_check.py agents
        continue-on-error: true
        id: agents

      - name: Generate smoke test report
        if: always()
        run: |
          echo "## 🏥 Smoke Test Results" > smoke_report.md
          echo "" >> smoke_report.md
          echo "**Run Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> smoke_report.md
          echo "" >> smoke_report.md
          echo "### Test Results" >> smoke_report.md
          echo "" >> smoke_report.md

          if [ "${{ steps.happy_path.outcome }}" == "success" ]; then
            echo "- ✅ Happy Path Tests: PASSED" >> smoke_report.md
          else
            echo "- ❌ Happy Path Tests: FAILED" >> smoke_report.md
          fi

          if [ "${{ steps.supabase.outcome }}" == "success" ]; then
            echo "- ✅ Supabase Connectivity: OK" >> smoke_report.md
          else
            echo "- ⚠️ Supabase Connectivity: FAILED" >> smoke_report.md
          fi

          if [ "${{ steps.agents.outcome }}" == "success" ]; then
            echo "- ✅ Agent System: OK" >> smoke_report.md
          else
            echo "- ❌ Agent System: FAILED" >> smoke_report.md
          fi

          echo "" >> smoke_report.md

          # Overall status
          if [ "${{ steps.happy_path.outcome }}" == "success" ] && \
             [ "${{ steps.agents.outcome }}" == "success" ]; then
            echo "### ✅ Overall Status: HEALTHY" >> smoke_report.md
          else
            echo "### ❌ Overall Status: ISSUES DETECTED" >> smoke_report.md
            echo "" >> smoke_report.md
            echo "⚠️ **Action Required:** Immediate investigation needed" >> smoke_report.md
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const fs = require('fs');
            let body = '## 🚨 Smoke Test Failure\n\n';
            body += '**Time:** ' + new Date().toISOString() + '\n\n';
            body += '### Failed Checks\n\n';

            if ('${{ steps.happy_path.outcome }}' !== 'success') {
              body += '- ❌ Happy Path Tests\n';
            }
            if ('${{ steps.supabase.outcome }}' !== 'success') {
              body += '- ❌ Supabase Connectivity\n';
            }
            if ('${{ steps.agents.outcome }}' !== 'success') {
              body += '- ❌ Agent System\n';
            }

            body += '\n**Action Required:** Investigate immediately\n';
            body += '\n[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            // Create issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Smoke Test Failure - ' + new Date().toISOString().split('T')[0],
              body: body,
              labels: ['smoke-test', 'critical']
            });

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: smoke-test-report
          path: smoke_report.md
          retention-days: 7

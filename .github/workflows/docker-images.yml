name: Build & Push Docker Images

"on":
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "streamlit_app.py"
      - "src/**"
      - "requirements.txt"
      - "docker-compose.yml"
      - ".github/workflows/docker-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ${{ github.repository }}-web
  IMAGE_DASHBOARD: ${{ github.repository }}-dashboard

jobs:
  # Validate ACR secrets separately so a missing ACR secret doesn't prevent
  # building and pushing images to GHCR (which uses the GITHUB_TOKEN).
  validate-acr:
    uses: ./.github/workflows/reusable-secret-check.yml
    with:
      secret_names: ACR_LOGIN_SERVER,ACR_USERNAME,ACR_PASSWORD
    secrets: inherit

  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image names
        run: |
          echo "IMAGE_WEB_LOWER=${IMAGE_WEB,,}" >> ${GITHUB_ENV}
          echo "IMAGE_DASHBOARD_LOWER=${IMAGE_DASHBOARD,,}" >> ${GITHUB_ENV}
        env:
          IMAGE_WEB: ${{ github.repository }}-web
          IMAGE_DASHBOARD: ${{ github.repository }}-dashboard

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Docker metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_WEB_LOWER }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (web)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Docker metadata (dashboard)
        id: meta_dash
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_DASHBOARD_LOWER }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (dashboard)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_dash.outputs.tags }}
          labels: ${{ steps.meta_dash.outputs.labels }}

      # Optional: also push to Azure Container Registry (ACR)
      # Configure these secrets to enable:
      # - ACR_LOGIN_SERVER (e.g., myregistry.azurecr.io)
      # - ACR_USERNAME
      # - ACR_PASSWORD

  push-to-acr:
    needs: [build-and-push, validate-acr]
    if: needs.validate-acr.outputs.all_secrets_present == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_WEB: ${{ github.repository }}-web
      IMAGE_DASHBOARD: ${{ github.repository }}-dashboard
      IMAGE_WEB_LOWER: ""
      IMAGE_DASHBOARD_LOWER: ""
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image names
        run: |
          echo "IMAGE_WEB_LOWER=${IMAGE_WEB,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_DASHBOARD_LOWER=${IMAGE_DASHBOARD,,}" >> "${GITHUB_ENV}"
        env:
          IMAGE_WEB: ${{ github.repository }}-web
          IMAGE_DASHBOARD: ${{ github.repository }}-dashboard

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Tag & push to ACR
        run: |
          set -euo pipefail
          WEB_SRC_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_WEB_LOWER }}:${{ github.sha }}"
          DASH_SRC_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_DASHBOARD_LOWER }}:${{ github.sha }}"

          WEB_ACR_TAG="$ACR_LOGIN_SERVER/${{ env.IMAGE_WEB_LOWER }}:${{ github.sha }}"
          DASH_ACR_TAG="$ACR_LOGIN_SERVER/${{ env.IMAGE_DASHBOARD_LOWER }}:${{ github.sha }}"

          docker pull "$WEB_SRC_TAG"
          docker pull "$DASH_SRC_TAG"

          docker tag "$WEB_SRC_TAG" "$WEB_ACR_TAG"
          docker tag "$DASH_SRC_TAG" "$DASH_ACR_TAG"

          docker push "$WEB_ACR_TAG"
          docker push "$DASH_ACR_TAG"

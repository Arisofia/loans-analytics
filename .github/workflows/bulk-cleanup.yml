name: Bulk Cleanup Old Workflow Runson:  workflow_dispatch:    inputs:      days_to_keep:        description: 'Keep runs from last N days'        required: true        default: '7'        type: number      dry_run:        description: 'Dry run (do not delete)'        required: true        default: true        type: booleanpermissions:  actions: write  contents: readjobs:  cleanup:    runs-on: ubuntu-latest    steps:      - name: Cleanup old workflow runs        uses: actions/github-script@v7        with:          script: |            const daysToKeep = ${{ inputs.days_to_keep }};            const dryRun = ${{ inputs.dry_run }};            const cutoffDate = new Date();            cutoffDate.setDate(cutoffDate.getDate() - daysToKeep);            console.log(`Cleaning up runs older than ${cutoffDate.toISOString()}`);            console.log(`Dry run: ${dryRun}`);            let page = 1;            let totalDeleted = 0;            let totalProcessed = 0;            while (true) {              const runs = await github.rest.actions.listWorkflowRunsForRepo({                owner: context.repo.owner,                repo: context.repo.repo,                per_page: 100,                page: page              });              if (runs.data.workflow_runs.length === 0) {                break;              }              for (const run of runs.data.workflow_runs) {                totalProcessed++;                const runDate = new Date(run.created_at);                if (runDate < cutoffDate) {                  console.log(`${dryRun ? '[DRY RUN] Would delete' : 'Deleting'} run ${run.id} from ${run.created_at}`);                  if (!dryRun) {                    try {                      await github.rest.actions.deleteWorkflowRun({                        owner: context.repo.owner,                        repo: context.repo.repo,                        run_id: run.id                      });                      totalDeleted++;                      // Rate limiting - wait 100ms between deletions                      await new Promise(resolve => setTimeout(resolve, 100));                    } catch (error) {                      console.error(`Failed to delete run ${run.id}: ${error.message}`);                    }                  } else {                    totalDeleted++;                  }                }                // Progress indicator                if (totalProcessed % 100 === 0) {                  console.log(`Processed ${totalProcessed} runs, ${dryRun ? 'would delete' : 'deleted'} ${totalDeleted}`);                }              }              page++;              // Safety limit - don't process more than 500 pages (50,000 runs) in one job              if (page > 500) {                console.log('Reached safety limit of 500 pages. Run again to continue cleanup.');                break;              }            }            console.log(`\nComplete: Processed ${totalProcessed} runs, ${dryRun ? 'would delete' : 'deleted'} ${totalDeleted}`);            if (dryRun) {              core.summary.addHeading('Dry Run Results');              core.summary.addRaw(`Would delete ${totalDeleted} workflow runs older than ${daysToKeep} days`);            } else {              core.summary.addHeading('Cleanup Results');              core.summary.addRaw(`Deleted ${totalDeleted} workflow runs older than ${daysToKeep} days`);            }            await core.summary.write();
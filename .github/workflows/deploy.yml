name: Deploy to Vercel and Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/web/src/**'
      - 'apps/web/public/**'
      - 'apps/web/package.json'
      - 'apps/web/next.config.js'
      - 'package.json'

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Check Vercel secrets
        id: vercel_secrets
        run: |
          missing=""
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing="$missing VERCEL_TOKEN"
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing="$missing VERCEL_ORG_ID"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -z "$missing" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Missing secrets:$missing"
          fi

      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Pull Vercel project settings
        if: steps.vercel_secrets.outputs.present == 'true'
        run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"


      - name: Build
        run: |
          pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload build artifact (local)
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: .next

      - name: Upload build to S3 (cloud)
        if: env.AWS_S3_BUCKET != ''
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl private --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-1'
          SOURCE_DIR: '.next'

      - name: Deploy to Vercel
        if: steps.vercel_secrets.outputs.present == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  deploy-azure:
    name: Deploy to Azure (fallback)
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/azure/main.bicep
          parameters: |
            webAppName=${{ secrets.AZURE_WEBAPP_NAME }}
            storageAccountName=${{ secrets.AZURE_STORAGE_NAME }}
            sqlServerName=${{ secrets.AZURE_SQLSERVER_NAME }}
            sqlDbName=${{ secrets.AZURE_SQLDB_NAME }}
            sqlAdminLogin=${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./apps/web

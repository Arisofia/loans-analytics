name: Deploy to Vercel and Azure

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/web/src/**"
      - "apps/web/public/**"
      - "apps/web/package.json"
      - "apps/web/next.config.js"
      - "package.json"

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Check Vercel secrets
        id: vercel_secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ] && missing="$missing VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -z "$missing" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing Vercel secrets:$missing"
          fi

      - name: Check AWS secrets
        id: aws_secrets
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$AWS_S3_BUCKET" ] && [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS secrets not fully configured, skipping S3 upload"
          fi

      - name: Install dependencies
        run: |
          pnpm -C apps/web install --frozen-lockfile

      - name: Pull Vercel project settings
        if: steps.vercel_secrets.outputs.present == true
        working-directory: apps/web
        run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: |
          pnpm -C apps/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload build artifact (local)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: web-build
          path: apps/web/.next

      - name: Upload build to S3 (cloud)
        if: steps.aws_secrets.outputs.present == true
        uses: jakejarvis/s3-sync-action@7ed8b112447abb09f1da74f3466e4194fc7a6311
        with:
          args: --acl private --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
          SOURCE_DIR: "apps/web/.next"

      - name: Deploy to Vercel
        if: steps.vercel_secrets.outputs.present == true
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: apps/web

  deploy-azure:
    name: Deploy to Azure (fallback)
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Azure Login
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@06e568666fe06fe7d2d689bbd543a036258a79c1
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/azure/main.bicep
          parameters: |
            webAppName=${{ secrets.AZURE_WEBAPP_NAME }}
            storageAccountName=${{ secrets.AZURE_STORAGE_NAME }}
            sqlServerName=${{ secrets.AZURE_SQLSERVER_NAME }}
            sqlDbName=${{ secrets.AZURE_SQLDB_NAME }}
            sqlAdminLogin=${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@0efab0a4c73b728613acd71966c04beadfc20aaf
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./apps/web

name: Model Evaluation Pipeline (DISABLED — cloud services stopped to reduce costs)

# Workflow-level permissions removed — granting permissions only to jobs that need them.
on:
  # DISABLED: All automatic triggers stopped to eliminate cloud costs
  # pull_request:
  #   types: [opened, synchronize, reopened]
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate-models:
    name: Evaluate ML Models
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write # Required for creating comments on PRs via the issues API
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run evaluation tests
        run: |
          mkdir -p reports
          # Assumes pytest-json-report and pytest-html are installed
          pytest tests/evaluation/ \
            --html=reports/evaluation-report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/evaluation-metrics.json

      - name: Generate metrics visualization
        if: always()
        run: |
          mkdir -p reports/visualizations
          if [ -f "scripts/evaluation/generate_visualizations.py" ]; then
            python3 scripts/evaluation/generate_visualizations.py \
              --metrics-file reports/evaluation-metrics.json \
              --output-dir reports/visualizations/
          else
            echo "::warning::scripts/evaluation/generate_visualizations.py not found, skipping visualization generation"
          fi

      - name: Check evaluation thresholds
        if: always()
        id: threshold-check
        continue-on-error: true
        run: |
          mkdir -p config

          # Check if we have real evaluation tests (not just placeholders)
          # Use python3 explicitly for consistency
          REAL_TESTS=$(python3 - << 'PY'
          import json
          import os
          import sys

          report_path = os.path.join("reports", "evaluation-metrics.json")
          if not os.path.exists(report_path):
              print(0)
              sys.exit(0)

          try:
              with open(report_path, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception:
              print(0)
              sys.exit(0)

          # Count tests that were not skipped
          tests = data.get("tests", [])
          real_tests = [t for t in tests if t.get("outcome") != "skipped"]
          print(len(real_tests))
          PY
          )

          if [ "$REAL_TESTS" -eq 0 ]; then
            echo "::warning::Skipping threshold check - only placeholder tests exist"
            echo '{"passed": true, "message": "Threshold check skipped", "skipped": true}' > threshold-results.json
          elif [ -f "scripts/evaluation/check_thresholds.py" ]; then
            python3 scripts/evaluation/check_thresholds.py \
              --metrics-file reports/evaluation-metrics.json \
              --config config/evaluation-thresholds.yml \
              --output threshold-results.json || {
              echo "::warning::Threshold check reported failures - marked as informational"
              # Exit 0 to prevent job failure during transition
              exit 0
            }
          else
            echo "::warning::scripts/evaluation/check_thresholds.py not found, skipping threshold check"
            echo '{"passed": false, "message": "Script not found"}' > threshold-results.json
          fi

      - name: Upload evaluation reports
        if: always()
        # Hash corresponds to v4.6.0
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: evaluation-reports
          path: |
            reports/
            threshold-results.json
          retention-days: 15
          if-no-files-found: ignore

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        # Hash corresponds to v7.0.1
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7.0.1
        with:
          script: |
            const fs = require('fs');
            let body = '## 📊 Model Evaluation Results\n\n';

            try {
              if (fs.existsSync('reports/evaluation-metrics.json')) {
                try {
                  const metricsContent = fs.readFileSync('reports/evaluation-metrics.json', 'utf8');
                  const metrics = JSON.parse(metricsContent);
                  
                  // ⚠️ NOTE: This assumes 'evaluation-metrics.json' has flat keys for accuracy/precision.
                  // Standard pytest-json-report output does NOT have this structure by default.
                  body += '### Metrics Summary\n' +
                    `- **Accuracy**: ${metrics.accuracy || 'N/A'}\n` +
                    `- **Precision**: ${metrics.precision || 'N/A'}\n` +
                    `- **Recall**: ${metrics.recall || 'N/A'}\n` +
                    `- **F1 Score**: ${metrics.f1_score || 'N/A'}\n\n`;
                } catch (parseError) {
                  body += '### Metrics Summary\nFailed to parse metrics file.\n\n';
                  console.error('JSON parse error:', parseError.message);
                }
              } else {
                body += '### Metrics Summary\nNo metrics generated in this run.\n\n';
              }

              if (fs.existsSync('threshold-results.json')) {
                try {
                  const thresholdContent = fs.readFileSync('threshold-results.json', 'utf8');
                  const thresholds = JSON.parse(thresholdContent);
                  body += '### Threshold Status\n' +
                    `${thresholds.passed ? '✅ All thresholds passed' : '❌ Some thresholds failed'}\n\n`;
                } catch (parseError) {
                  console.error('Threshold parse error:', parseError.message);
                }
              }

              // Split string to satisfy linter line length limit
              body += `[View detailed report]`;
              body += `(https://github.com/${{github.repository}}/actions/runs/${{github.run_id}})`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.error('Comment creation error:', error.message);
            }

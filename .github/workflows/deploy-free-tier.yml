# =============================================================================
# Deploy to Free Tier — Zero-cost deployment workflow
# Replaces: Azure Container Apps / Azure App Service deployments
#
# Supported targets (choose one or more via workflow_dispatch):
#   - render     : Render.com free web service
#   - railway    : Railway.app (500 h/month free)
#   - fly        : Fly.io (3 shared VMs free)
#   - ghcr       : Push container to GitHub Container Registry (always)
#
# Secrets required (only set the ones for your chosen target):
#   RENDER_API_KEY + RENDER_SERVICE_ID
#   RAILWAY_TOKEN  + RAILWAY_PROJECT_ID
#   FLY_API_TOKEN
# =============================================================================

name: Deploy (Zero-Cost Free Tier)

on:
  push:
    branches: [main]
    paths:
      - "backend/src/**"
      - "backend/python/**"
      - "frontend/streamlit_app/**"
      - "Dockerfile*"
      - "requirements*.txt"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "ghcr"
        type: choice
        options: [ghcr, render, railway, fly, all]
      service:
        description: "Service to deploy"
        required: true
        default: "api"
        type: choice
        options: [api, dashboard, pipeline]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/abaco-loans-analytics

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build and push to GHCR (always)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      dashboard_image: ${{ steps.meta-dash.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- API image ----
      - name: Docker metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Dashboard image ----
      - name: Docker metadata (Dashboard)
        id: meta-dash
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-dashboard
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dash.outputs.tags }}
          labels: ${{ steps.meta-dash.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 2. Deploy to Render.com
  # ---------------------------------------------------------------------------
  deploy-render:
    name: Deploy → Render
    runs-on: ubuntu-latest
    permissions: {}
    needs: build-and-push
    if: |
      github.event.inputs.target == 'render' ||
      github.event.inputs.target == 'all' ||
      github.event_name == 'push'
    env:
      ALL_SECRETS_JSON: ${{ toJson(secrets) }}
    steps:
      - name: Trigger Render deploy hook
        run: |
          RENDER_API_KEY="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r '.RENDER_API_KEY // ""')"
          RENDER_SERVICE_ID="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r '.RENDER_SERVICE_ID // ""')"

          # Render deployment must fail fast if required secrets are missing.
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "❌ Render secrets not configured (RENDER_API_KEY / RENDER_SERVICE_ID)."
            exit 1
          fi

          # Call Render deploy API and fail closed on transport or non-2xx errors.
          response="$(curl -fsS -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')"

          # Parse deploy ID and fail if response schema is unexpected.
          if deploy_id="$(printf '%s' "$response" | jq -er '.id' 2>/dev/null)"; then
            echo "Render deploy ID: $deploy_id"
            echo "✅ Render deploy triggered"
          else
            echo "❌ Render deploy API response missing deploy id."
            echo "Raw response from Render:"
            printf '%s\n' "$response"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 3. Deploy to Railway
  # ---------------------------------------------------------------------------
  deploy-railway:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-and-push
    if: |
      github.event.inputs.target == 'railway' ||
      github.event.inputs.target == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          RAILWAY_TOKEN="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r '.RAILWAY_TOKEN // ""')"

          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ Railway secret not configured (RAILWAY_TOKEN)."
            exit 1
          fi
          railway up --service "${{ github.event.inputs.service || 'api' }}" \
                     --detach

  # ---------------------------------------------------------------------------
  # 4. Deploy to Fly.io
  # ---------------------------------------------------------------------------
  deploy-fly:
    name: Deploy → Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-and-push
    if: |
      github.event.inputs.target == 'fly' ||
      github.event.inputs.target == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1

      - name: Deploy to Fly.io
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          FLY_API_TOKEN="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r '.FLY_API_TOKEN // ""')"

          if [ -z "$FLY_API_TOKEN" ]; then
            echo "❌ Fly secret not configured (FLY_API_TOKEN)."
            exit 1
          fi
          flyctl deploy --remote-only

  # ---------------------------------------------------------------------------
  # 5. Deployment summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [build-and-push, deploy-render, deploy-railway, deploy-fly]
    if: always()
    steps:
      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Zero-Cost Deployment Summary

          | Target   | Status |
          |----------|--------|
          | GHCR     | ${{ needs.build-and-push.result }} |
          | Render   | ${{ needs.deploy-render.result }} |
          | Railway  | ${{ needs.deploy-railway.result }} |
          | Fly.io   | ${{ needs.deploy-fly.result }} |

          **Images pushed:**
          - `${{ needs.build-and-push.outputs.api_image }}`
          - `${{ needs.build-and-push.outputs.dashboard_image }}`
          EOF

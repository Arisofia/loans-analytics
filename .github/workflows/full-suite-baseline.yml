name: Full Suite Baseline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  full-suite-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository (no external action)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          if [ -d .git ]; then
            git remote set-url origin "$REPO_URL" || git remote add origin "$REPO_URL"
          else
            git init .
            git remote add origin "$REPO_URL"
          fi
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Set up Python 3.12 (no external action)
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install -r requirements.lock.txt

      - name: Run full suite and save JSON report
        run: |
          mkdir -p artifacts
          "$PYTHON_BIN" -m pytest -q --json-report --json-report-file=artifacts/full-suite-report.json

      - name: Validate full-suite baseline
        run: |
          "$PYTHON_BIN" scripts/validation/check_full_suite_baseline.py \
            --baseline .github/ci-baselines/full-suite-baseline.json \
            --report artifacts/full-suite-report.json

      - name: Append baseline status to summary
        if: always()
        run: |
          echo "## Full Suite Baseline" >> "$GITHUB_STEP_SUMMARY"
          echo "- Baseline file: .github/ci-baselines/full-suite-baseline.json" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/full-suite-report.json ]; then
            echo "- Report generated: artifacts/full-suite-report.json" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Report generated: no" >> "$GITHUB_STEP_SUMMARY"
          fi

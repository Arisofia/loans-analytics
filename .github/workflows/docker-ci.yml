name: Docker CI

on:
  push:
    tags: ["*"]
    branches:
      - "main"
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_ORG: YOUR_DOCKER_ORGANIZATION

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Check Docker registry credentials
        id: check-secrets
        run: |
          if [[ -z "${{ secrets.REGISTRY_USER }}" || -z "${{ secrets.REGISTRY_TOKEN }}" ]]; then
            echo "⚠️ Docker registry credentials not configured. Skipping Docker build."
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check-secrets.outputs.has_credentials == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log into registry ${{ env.REGISTRY }}
        if: steps.check-secrets.outputs.has_credentials == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Setup Docker buildx
        if: steps.check-secrets.outputs.has_credentials == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Extract metadata
        if: steps.check-secrets.outputs.has_credentials == 'true'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        if: steps.check-secrets.outputs.has_credentials == 'true'
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: mode=max

      - name: Docker Scout Compare
        if: steps.check-secrets.outputs.has_credentials == 'true' && github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: ${{ steps.meta.outputs.tags }}
          to-env: production
          platform: "linux/amd64"
          ignore-unchanged: true
          only-severities: critical,high
          organization: ${{ env.DOCKER_ORG }}

      - name: Skip notification
        if: steps.check-secrets.outputs.has_credentials != 'true'
        run: |
          echo "::notice::Docker build skipped - registry credentials not configured"
          echo "To enable Docker builds, add REGISTRY_USER and REGISTRY_TOKEN secrets"

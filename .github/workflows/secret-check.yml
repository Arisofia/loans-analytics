name: Secret check

on:
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Verify MIDDLEWARE_SHARED_SECRET exists
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${{ secrets.MIDDLEWARE_SHARED_SECRET }}" ]; then
                    echo "Missing required secret: MIDDLEWARE_SHARED_SECRET" >&2
                    exit 1
                  fi
                  echo "MIDDLEWARE_SHARED_SECRET present"

name: Playwright fixer smoke tests

on:
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches:
      - chore/playwright-fixer

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: python -m pip install --upgrade pip
      - name: Run smoke tests (dry-run payloads)
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w0 scripts/fixtures/playwright_with_on.yml)
          echo "{\"content\":\"$CONTENT\",\"sha\":\"deadbeef\"}" > /tmp/ari_playwright_with_on.json
          python scripts/update_playwright.py --input /tmp/ari_playwright_with_on.json --output /tmp/playwright_with_on_fixed.yml --dry-run

          CONTENT2=$(base64 -w0 scripts/fixtures/playwright_no_on.yml)
          echo "{\"content\":\"$CONTENT2\",\"sha\":\"deadbeef\"}" > /tmp/ari_playwright_no_on.json
          python scripts/update_playwright.py --input /tmp/ari_playwright_no_on.json --output /tmp/playwright_no_on_fixed.yml --dry-run
      - name: Validate outputs
        run: |
          grep -q '^on:' /tmp/playwright_with_on_fixed.yml || (echo "expected unquoted on: in fixed file" && exit 1)
          grep -q '"on":' /tmp/playwright_no_on_fixed.yml || (echo "expected quoted \"on\": to remain in no-on fixed file" && exit 1)

name: Run Analytics Pipeline

on:
    workflow_dispatch:
    schedule:
        - cron: "0 6 * * *" # Run daily at 6 AM UTC

jobs:
    analytics:
        name: Execute Analytics
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2

            - name: Set up Python
              uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            # NOTE: Legacy analytics script removed in Phase B (Data Integrity)
            # Pipeline modernization deferred to separate initiative
            # Modern KPI pipeline implementation tracked in project roadmap
            - name: Skip Legacy Analytics (Deprecated)
              run: |
                  echo "Legacy run_complete_analytics.py removed in Phase B"
                  echo "Pipeline modernization tracked separately"
                  echo "Skipping analytics execution"
              env:
                  APP_ENV: production

            - name: Upload Dashboard Artifact
              uses: actions/upload-artifact@250e9d8087e4d33cdf6c33e180d803782f68fdb1  # v4.4.3
              with:
                  name: kpi-dashboard
                  path: exports/complete_kpi_dashboard.json
                  retention-days: 7

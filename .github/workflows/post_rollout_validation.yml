name: Post-Rollout Validation
on:
  workflow_dispatch:
jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib pyarrow requests
      - name: Validate Meta Insights Data
        if: hashFiles('data/warehouse/meta_insights.parquet') != ''
        run: |
          python -c "import pandas as pd; df = pd.read_parquet('data/warehouse/meta_insights.parquet'); assert not df.empty, 'Meta insights data is empty!'"
      - name: Validate Metrics CSVs
        if: hashFiles('data/metrics/*.csv') != ''
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import pandas as pd

          metrics_dir = Path("data/metrics")
          csvs = sorted(metrics_dir.glob("*.csv"))
          if not csvs:
              sys.exit(0)

          latest = max(csvs, key=lambda p: p.stat().st_mtime)
          df = pd.read_csv(latest)
          if df.empty:
              raise SystemExit("Latest metrics CSV is empty")
          PY

name: Validate Workflows

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-validation:
    name: Syntax Validation (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Run actionlint
        id: actionlint
        uses: rhysd/actionlint@ea8102762106cdca9c88829f1295b39a544706f3
        with:
          args: .github/workflows

      - name: Actionlint summary
        if: ${{ steps.actionlint.outcome != 'success' }}
        run: |
          echo "::warning::actionlint reported issues in workflow files." >> $GITHUB_STEP_SUMMARY
          echo "See the workflow run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "To reproduce locally and get details run: scripts/fix-workflows.sh" >> $GITHUB_STEP_SUMMARY
          echo "Suggested fix: address actionlint/shellcheck warnings in .github/workflows and run 'scripts/fix-workflows.sh' to validate." >> $GITHUB_STEP_SUMMARY

  structure-validation:
    name: YAML Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install yamllint
        run: |
          python -m pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint .github/workflows

  dependency-validation:
    name: Dependency Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip check

  secrets-validation:
    name: Secrets Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check for hardcoded secrets
        run: |
          set -euo pipefail
          # Search for suspicious patterns; exclude common valid examples and environment variable placeholders
          # We use a more refined regex to avoid matching variable names or placeholders like ${{ secrets.API_KEY }}
          if grep -RIn -E \
            "(AKIA[A-Z0-9]{16}|aws_secret[a-zA-Z0-9/+=]{30,}|SECRET_KEY=['\"][a-zA-Z0-9]{30,}|PASSWORD=['\"][a-zA-Z0-9]{12,}|API_KEY=['\"][a-zA-Z0-9]{20,})" \
            --exclude-dir=.git . | grep -vE "example|\.env\.example|README|tests/|FI-ANALYTICS-002"; then
            echo "Potential hardcoded secret(s) found" >&2
            exit 1
          fi
          echo "No obvious hardcoded secrets found."

  summary:
    name: Workflow Validation Summary
    runs-on: ubuntu-latest
    needs:
      - syntax-validation
      - structure-validation
      - dependency-validation
      - secrets-validation
    if: |
      always() && (
        needs.syntax-validation.result == 'failure' ||
        needs.structure-validation.result == 'failure' ||
        needs.dependency-validation.result == 'failure' ||
        needs.secrets-validation.result == 'failure'
      )
    steps:
      - name: Fail on validation error
        run: exit 1

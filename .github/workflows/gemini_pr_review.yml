name: Gemini AI PR Review
"on":
  workflow_call:
    secrets:
      GEMINI_API_KEY_SIMPLE:
        name: Gemini PR Review

              model_name = model_override
          workflow_call:
            inputs:
              is_fork:
                description: 'Whether the PR is from a fork'
                required: true
                type: boolean
              gemini_model:
                description: 'Model to use for review'
                required: false
                type: string
                default: "gemini-1.5-pro"
            secrets:
              GEMINI_API_KEY:
                required: true

          else:
          review:
            runs-on: ubuntu-latest
            if: inputs.is_fork == false
            steps:
              - uses: actions/checkout@v4
              - name: Set up Python
                uses: actions/setup-python@v5
                with:
                  python-version: '3.11'
              - name: Install dependencies
                run: pip install -r requirements-dev.txt
              - name: Run Gemini PR analysis
                env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                  GEMINI_MODEL: ${{ inputs.gemini_model }}
                run: |
                  python -m tools.pr_review_gemini
              try:
                  for model in genai.list_models():
                      if hasattr(model, "supported_generation_methods") and "generateContent" in model.supported_generation_methods:
                          model_name = model.name
                          break
              except Exception as e:
                  print(f"Could not list Gemini models: {e}")
                  model_name = None

          if not model_name:
              print("No compatible Gemini model found; skipping review.")
              sys.exit(0)

          model = genai.GenerativeModel(model_name)

          # Get diff using git
          try:
              result = subprocess.run(
                  ['git', 'diff', f'origin/{base_ref}', 'HEAD'],
                  capture_output=True,
                  text=True,
                  check=True
              )
              diff = result.stdout
          except subprocess.CalledProcessError as e:
              print(f"Error getting diff: {e}")
              sys.exit(1)

          if not diff.strip():
              print("No changes to review")
              sys.exit(0)

          # Create prompt for Gemini
          prompt = f"""Review this pull request diff and provide feedback on:
          1. Code quality and best practices
          2. Potential bugs or issues
          3. Security concerns
          4. Performance improvements
          5. General suggestions

          Diff:
          {diff[:8000]}  # Limit to avoid token limits
          """

          try:
              response = model.generate_content(prompt)
              review_comment = response.text
          except Exception as e:
              print(f"Error calling Gemini API: {e}")
              sys.exit(0)

          # Post comment to PR
          api_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          headers = {
              'Authorization': f'token {github_token}',
              'Accept': 'application/vnd.github+json'
          }
          data = {
              'body': f"## 🤖 Gemini AI Review\n\n{review_comment}"
          }

          response = requests.post(api_url, headers=headers, json=data)
          if response.status_code == 201:
              print("Review posted successfully")
          else:
              print(f"Failed to post review: {response.status_code} {response.text}")
              sys.exit(0)
          PY

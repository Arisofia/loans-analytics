name: Gemini AI PR Review
on:
  workflow_call:
    inputs:
      is_fork:
        description: Whether the pull request originates from a fork.
        required: true
        type: boolean
      gemini_model:
        description: Optional override for Gemini model name.
        required: false
        type: string
        default: gemini-1.5-pro
    secrets:
      GEMINI_API_KEY:
        description: 'Gemini API Key for review'
        required: false

jobs:
  gemini_review:
    name: Gemini PR Review
    runs-on: ubuntu-latest
    if: inputs.is_fork == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Run Gemini Review
        if: secrets.GEMINI_API_KEY != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ inputs.gemini_model }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-generativeai requests
          python .github/scripts/gemini_pr_review.py

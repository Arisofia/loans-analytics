name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      analytics: ${{ steps.filter.outputs.analytics }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            analytics:
              - 'python/**'
              - 'src/**'
              - 'tests/**'
            # NOTE: web filter removed - Next.js frontend (apps/web) was deprecated

  analytics:
    needs: changes
    if: needs.changes.outputs.analytics == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          PYTHONPATH="src:python:." pytest tests/ --cov=src --cov-report=xml:coverage-src.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: analytics-coverage
          path: coverage-src.xml

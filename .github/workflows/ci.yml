name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Formatting Check
        run: |
          black --check .
          isort --check-only .

      - name: Run Linting
        run: |
          ruff check .
          flake8 src

      - name: Run Type Checking
        run: mypy src

      - name: Run Tests
        run: pytest -m "not integration_supabase" -v

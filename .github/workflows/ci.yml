name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Formatting Check
        run: |
          black --check .
          isort --check-only .

      - name: Run Linting
        run: |
          ruff check .
          flake8 src

      - name: Run Type Checking
        run: mypy src

      - name: Run Tests
        run: pytest -m "not integration_supabase" -v

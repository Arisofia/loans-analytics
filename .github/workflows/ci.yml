name: CI
on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python Deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node Deps
        run: pnpm -C apps/web install --no-frozen-lockfile

      - name: Lint & Build Web
        run: |
          pnpm -C apps/web lint
          pnpm -C apps/web build
      - name: Generate placeholder coverage (lcov)
        run: |
          mkdir -p apps/web/coverage
          echo "TN:\nSF:placeholder.js\nDA:1,0\nend_of_record" > apps/web/coverage/lcov.info

  analytics:
    name: Analytics Tests
    needs: changes
    if: needs.changes.outputs.analytics == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Validate
        run: |
          python -c "import pandas as pd; print('Environment ready. Pandas version:', pd.__version__)"
      - name: Tests and coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --cov=src --cov-report=xml:coverage-src.xml tests/
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: analytics-coverage
          path: coverage-src.xml

  update-figma-slides:
    name: Update Figma Slides
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets availability
        id: check-secrets
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN || secrets.FIGMA_OAUTH_TOKEN || secrets.FIGMA_API_TOKEN || secrets.FIGMA_PERSONAL_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY || secrets.FIGMA_FILE_URL || secrets.FIGMA_FILE_LINK }}
          ANALYTICS_URL: ${{ secrets.ANALYTICS_URL }}
        run: |
          sanitize_secret() {
            local var_name="$1"
            local raw="$2"
            local norm
            norm="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | xargs)"
            case "$norm" in
              ""|"token"|"tokens"|"secret"|"secrets"|"changeme"|"change-me"|"change_me"|"replace-me"|"replace_me"|"placeholder"|"example"|"redacted")
                printf -v "$var_name" '%s' ""
                ;;
              *)
                printf -v "$var_name" '%s' "$raw"
                ;;
            esac
          }
          sanitize_secret FIGMA_TOKEN "$FIGMA_TOKEN"
          sanitize_secret FIGMA_FILE_KEY "$FIGMA_FILE_KEY"
          sanitize_secret ANALYTICS_URL "$ANALYTICS_URL"

          if [ -n "$FIGMA_TOKEN" ] && [ -n "$FIGMA_FILE_KEY" ] && [ -n "$ANALYTICS_URL" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
          fi
      - name: Checkout code
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/checkout@v4
      - name: Set up pnpm
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Set up Node.js
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: pnpm install --frozen-lockfile
      - name: Update Figma Slides
        if: steps.check-secrets.outputs.secrets_available == 'true' && hashFiles('scripts/update_figma_slides.js') != ''
        run: node scripts/update_figma_slides.js
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN || secrets.FIGMA_OAUTH_TOKEN || secrets.FIGMA_API_TOKEN || secrets.FIGMA_PERSONAL_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY || secrets.FIGMA_FILE_URL || secrets.FIGMA_FILE_LINK }}
          ANALYTICS_URL: ${{ secrets.ANALYTICS_URL }}

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs:
      - changes
      - repo-health
      - web
      - analytics
      - update-figma-slides
    if: always() && failure()
    steps:
      - name: Check Slack webhook availability
        id: slack_check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          sanitize_secret() {
            local var_name="$1"
            local raw="$2"
            local norm
            norm="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | xargs)"
            case "$norm" in
              ""|"token"|"tokens"|"secret"|"secrets"|"changeme"|"change-me"|"change_me"|"replace-me"|"replace_me"|"placeholder"|"example"|"redacted")
                printf -v "$var_name" '%s' ""
                ;;
              *)
                printf -v "$var_name" '%s' "$raw"
                ;;
            esac
          }
          sanitize_secret SLACK_WEBHOOK_URL "$SLACK_WEBHOOK_URL"

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2
        if: steps.slack_check.outputs.available == 'true'
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 CI Workflow Failed",
              "blocks": [
                { "type": "section", "text": { "type": "mrkdwn", "text": "*CI Workflow Failed*\\nRepository: ${{ github.repository }}\\nBranch: ${{ github.ref_name }}\\nCommit: ${{ github.sha }}\\n<${{ github.event.head_commit.url }}|View Commit>" } }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

name: CI
on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node Deps
        run: pnpm -C apps/web install --no-frozen-lockfile

      - name: Lint & Build Web
        run: |
          pnpm -C apps/web lint
          pnpm -C apps/web build
      - name: Generate placeholder coverage (lcov)
        run: |
          mkdir -p apps/web/coverage
          echo "TN:\nSF:placeholder.js\nDA:1,0\nend_of_record" > apps/web/coverage/lcov.info

  validate:
    name: Repository Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install validation tools
        run: |
          pip install black isort nbqa nbformat yamllint
          
      - name: Run validation script
        run: |
          bash scripts/validate_all.sh

  analytics:
    name: Analytics Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Validate
        run: |
          python -c "import pandas as pd; print('Environment ready. Pandas version:', pd.__version__)"
      - name: Tests and coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --cov=src --cov-report=xml:coverage-src.xml tests/
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: analytics-coverage
          path: coverage-src.xml


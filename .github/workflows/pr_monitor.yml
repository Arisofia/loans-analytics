name: PR Monitor

"on":
  schedule:
    # Run every hour from 9am to 5pm UTC on weekdays
    - cron: '0 9-17 * * 1-5'
  workflow_dispatch:

jobs:
  monitor-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install requests
      - name: Run PR Status Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/pr_status.py --all

name: PR Checkson:  pull_request:    types: [opened, synchronize, reopened]permissions:  contents: read  pull-requests: write  issues: writejobs:  python-qa:    name: Python QA    runs-on: ubuntu-latest    steps:      - uses: actions/checkout@v4      - uses: actions/setup-python@v5        with:          python-version: "3.11"          cache: "pip"      - name: Install QA tools        run: |          pip install --upgrade pip            pip install black ruff pytest pytest-cov pytest-asyncio          pip install -r requirements.txt      - name: Run linting        run: |          ruff check .          black --check .      - name: Run tests        run: |          pytest tests/ --maxfail=3 -v --tb=short      - name: Comment on PR        if: always()        uses: actions/github-script@v7        with:          script: |            github.rest.issues.createComment({              owner: context.repo.owner,              repo: context.repo.repo,              issue_number: context.issue.number,              body: '✅ Basic QA checks completed. Review logs for details.'            })
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install QA tools
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          ruff check .
          black --check .

      - name: Run tests
        run: |
          pytest tests/ --maxfail=3 -v --tb=short -m "not integration and not e2e"

      - name: Comment QA result on PR
        if: always() && github.actor != 'dependabot[bot]'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const status = process.env.JOB_STATUS || "unknown";
            const messageByStatus = {
              success: "✅ Basic QA checks passed.",
              failure: "❌ Basic QA checks failed.",
              cancelled: "⚠️ Basic QA checks were cancelled."
            };
            const summary = messageByStatus[status] || `ℹ️ Basic QA checks finished with status: ${status}.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${summary} Review workflow logs for details.`
            })

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install QA tools
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          ruff check .
          black --check .

      - name: Run tests
        run: |
          pytest tests/ --maxfail=3 -v --tb=short -m "not integration and not e2e"

      - name: Run financial precision regression tests
        run: |
          pytest tests/unit/test_financial_precision.py -v --tb=short -k "Precision or Aggregation or Division or Conversion"
        continue-on-error: false  # MUST pass - financial precision is non-negotiable

      - name: Validate port consistency
        run: |
          python scripts/validation/validate_port_consistency.py

      - name: Validate migration order determinism
        run: |
          python scripts/validation/validate_migration_order.py

      - name: Comment QA result on PR
        if: always() && github.actor != 'dependabot[bot]'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const status = process.env.JOB_STATUS || "unknown";
            const messageByStatus = {
              success: "✅ Basic QA checks passed.",
              failure: "❌ Basic QA checks failed.",
              cancelled: "⚠️ Basic QA checks were cancelled."
            };
            const summary = messageByStatus[status] || `ℹ️ Basic QA checks finished with status: ${status}.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${summary} Review workflow logs for details.`
            })

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loans_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd "pg_isready -U analytics_user -d loans_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    permissions:
      contents: read
      pull-requests: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev postgresql-client

      - name: Wait for PostgreSQL readiness acknowledgement
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: analytics_user
          PGPASSWORD: analytics_pass
          PGDATABASE: loans_analytics
        run: |
          for i in {1..30}; do
            if pg_isready; then
              echo "OK: PostgreSQL is ready."
              exit 0
            fi
            echo "PostgreSQL not ready yet (attempt $i/30); waiting 2s..."
            sleep 2
          done
          echo "ERROR: PostgreSQL readiness acknowledgement not received in time."
          exit 1

      - name: Install QA tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --prefer-binary -r requirements-dev.txt
          python -m pip install --prefer-binary -r requirements-ci-test-extras.txt

      - name: Run linting (changed Python files only)
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          mapfile -t PY_FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\.py$' || true)

          if [ "${#PY_FILES[@]}" -eq 0 ]; then
            echo "No Python file changes detected; skipping lint checks."
            exit 0
          fi

          echo "Linting changed files:"
          printf ' - %s\n' "${PY_FILES[@]}"

          ruff check "${PY_FILES[@]}"
          black --check "${PY_FILES[@]}"

      - name: Run mypy type checking
        run: |
          python -m mypy --no-incremental

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -m "not integration and not e2e"

      - name: Run financial precision regression tests
        run: |
          pytest tests/unit/test_financial_precision.py -v --tb=short -k "Precision or Aggregation or Division or Conversion"
        continue-on-error: false

      - name: Validate port consistency
        run: |
          python scripts/validation/validate_port_consistency.py

      - name: Validate migration order determinism
        run: |
          python scripts/validation/validate_migration_order.py

      - name: Validate documentation links
        run: |
          python tools/validate_doc_links.py

      - name: Comment QA result on PR
        if: always() && github.actor != 'dependabot[bot]'
        env:
          JOB_STATUS: ${{ job.status }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${JOB_STATUS:-unknown}"
          case "$STATUS" in
            success) SUMMARY="OK: Basic QA checks passed." ;;
            failure) SUMMARY="ERROR: Basic QA checks failed." ;;
            cancelled) SUMMARY="WARNING: Basic QA checks were cancelled." ;;
            *) SUMMARY="INFO: Basic QA checks finished with status: $STATUS." ;;
          esac

          ISSUE_NUMBER="${{ github.event.pull_request.number }}"
          API_URL="https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments"
          BODY="${SUMMARY} Review workflow logs for details."

          jq -n --arg body "$BODY" '{body: $body}' > comment.json
          curl -fsS -X POST "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data @comment.json

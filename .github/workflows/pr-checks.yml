name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install QA tools
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          ruff check .
          black --check .

      - name: Run tests
        run: |
          pytest tests/ --maxfail=3 -v --tb=short -m "not integration and not e2e"

      - name: Comment QA result on PR
        if: always() && github.actor != 'dependabot[bot]'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const status = process.env.JOB_STATUS || "unknown";
            const messageByStatus = {
              success: "✅ Basic QA checks passed.",
              failure: "❌ Basic QA checks failed.",
              cancelled: "⚠️ Basic QA checks were cancelled."
            };
            const summary = messageByStatus[status] || `ℹ️ Basic QA checks finished with status: ${status}.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${summary} Review workflow logs for details.`
            })

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (no external action)
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "❌ Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev

      - name: Install QA tools
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip setuptools wheel
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-dev.txt

      - name: Run linting
        run: |
          ruff check .
          black --check .

      - name: Run mypy type checking
        run: |
          "$PYTHON_BIN" -m mypy --no-incremental
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -m "not integration and not e2e"

      - name: Run financial precision regression tests
        run: |
          pytest tests/unit/test_financial_precision.py -v --tb=short -k "Precision or Aggregation or Division or Conversion"
        continue-on-error: false

      - name: Validate port consistency
        run: |
          "$PYTHON_BIN" scripts/validation/validate_port_consistency.py

      - name: Validate migration order determinism
        run: |
          "$PYTHON_BIN" scripts/validation/validate_migration_order.py

      - name: Validate documentation links
        run: |
          "$PYTHON_BIN" tools/validate_doc_links.py

      - name: Comment QA result on PR
        if: always() && github.actor != 'dependabot[bot]'
        env:
          JOB_STATUS: ${{ job.status }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${JOB_STATUS:-unknown}"
          case "$STATUS" in
            success) SUMMARY="✅ Basic QA checks passed." ;;
            failure) SUMMARY="❌ Basic QA checks failed." ;;
            cancelled) SUMMARY="⚠️ Basic QA checks were cancelled." ;;
            *) SUMMARY="ℹ️ Basic QA checks finished with status: $STATUS." ;;
          esac

          ISSUE_NUMBER="${{ github.event.pull_request.number }}"
          API_URL="https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments"
          BODY="${SUMMARY} Review workflow logs for details."

          jq -n --arg body "$BODY" '{body: $body}' > comment.json
          curl -fsS -X POST "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data @comment.json

name: CodeQL Analysis

"on":
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "apps/**"
      - "packages/**"
      - "streamlit_app.py"
      - "requirements*.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "next.config.js"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript", "python"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ab28d5ce09b08e4700b2296d39d684a7ac71d1e7
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@ab28d5ce09b08e4700b2296d39d684a7ac71d1e7

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ab28d5ce09b08e4700b2296d39d684a7ac71d1e7
        with:
          category: "/language:${{ matrix.language }}"

name: CodeQL Analysis

"on":
  # Disabled push trigger to reduce Actions usage - runs on PR and weekly schedule
  # push:
  #   branches: [main, develop]
  #   paths:
  #     - "src/**"
  #     - "python/**"
  #     - "streamlit_app.py"
  #     - "requirements*.txt"
  #     - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        # NOTE: javascript removed - Next.js frontend (apps/web) was deprecated
        language: ["python"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # NOTE: Node.js setup removed - Next.js frontend (apps/web) was deprecated

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

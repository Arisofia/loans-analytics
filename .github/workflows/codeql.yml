name: CodeQL Analysis

"on":
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "apps/**"
      - "packages/**"
      - "streamlit_app.py"
      - "requirements*.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "next.config.js"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript", "python"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.1.0
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b20883bbd772085d89b7f2f66d5dc41fd8fb004c  # v4.32.0
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@b20883bbd772085d89b7f2f66d5dc41fd8fb004c  # v4.32.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b20883bbd772085d89b7f2f66d5dc41fd8fb004c  # v4.32.0
        with:
          category: "/language:${{ matrix.language }}"

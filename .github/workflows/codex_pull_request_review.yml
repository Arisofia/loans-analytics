name: Codex Pull Request Review

on:
  workflow_call:
    inputs:
      is_fork:
        description: Whether the pull request originates from a fork.
        required: true
        type: boolean
    secrets:
      OPENAI_API_KEY:
        description: 'OpenAI API Key for Codex review'
        required: false

jobs:
  assign_metadata:
    runs-on: ubuntu-latest
    if: inputs.is_fork == false
    permissions:
      pull-requests: write
    steps:
      - name: Assign PR reviewers and assignees
        if: secrets.OPENAI_API_KEY != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pullNumber,
              assignees: ['codex'],
            });

  codex_review:
    name: Run Codex Review
    needs: assign_metadata
    runs-on: ubuntu-latest
    if: secrets.OPENAI_API_KEY != ''
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs['final-message'] }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Run Codex
        id: run_codex
        continue-on-error: true
        uses: openai/codex-action@f5c0ca71642badb34c1e66321d8d85685a0fa3dc
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

  post_feedback:
    name: Post Codex Feedback
    needs: codex_review
    runs-on: ubuntu-latest
    if: inputs.is_fork == false && secrets.OPENAI_API_KEY != '' && needs.codex_review.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post feedback to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ github.token }}
          script: |
            const finalMessage = `${{ needs.codex_review.outputs.final_message }}`;
            if (finalMessage) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: finalMessage,
              });
            }

name: CI - Option C (Pytest + Playwright)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-option-c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f dev-requirements.txt ]; then
            python -m pip install -r requirements.txt -r dev-requirements.txt
          else
            python -m pip install -r requirements.txt
            python -m pip install pytest
          fi

      - name: Run pytest (non-db)
        run: |
          python -m pytest -q -m "not db"

  python-db-tests:
    name: Python DB tests (pytest -m db)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: abaco_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f dev-requirements.txt ]; then
            python -m pip install -r requirements.txt -r dev-requirements.txt
          else
            python -m pip install -r requirements.txt
            python -m pip install pytest
          fi
      - name: Run pytest (db)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/abaco_test
        run: |
          python -m pytest -q -m db

  web-build-and-e2e:
    name: Web build + E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Assert single App Router root
        run: |
          ./scripts/assert-single-appdir.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build (gate before E2E)
        env:
          E2E_BYPASS_AUTH: "1"
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright
        env:
          CI: "true"
          E2E_BYPASS_AUTH: "1"
        run: npx playwright test -c playwright.smoke.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

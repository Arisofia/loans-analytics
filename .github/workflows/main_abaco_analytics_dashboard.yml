name: Build and deploy Python app to Azure Web App - abaco-analytics-dashboard

on:
  push:
    branches:
      - main
    paths:
      - "streamlit_app.py"
      - "src/**"
      - "config/**"
      - "requirements.txt"
      - "startup.sh"
      - ".github/workflows/main_abaco_analytics_dashboard.yml"
  workflow_dispatch:

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: true

env:
  WEBAPP_NAME: abaco-analytics-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python version
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      # 🛠️ Local Build Section
      - name: Prepare files for Azure deployment
        run: |
          echo "Files ready"

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-app
          path: |
            .
            !antenv/
            !.git/
            !.github/
            !node_modules/
            !.next/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-app
          path: python-app

      - name: Check Azure deploy secrets
        id: check_secrets
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -n "$AZURE_CREDENTIALS" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "has_publish_profile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_publish_profile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Azure
        if: steps.check_secrets.outputs.has_creds == 'true'
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (Azure login)
        if: steps.check_secrets.outputs.has_creds == 'true'
        uses: azure/webapps-deploy@0efab0a4c73b728613acd71966c04beadfc20aaf
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ./python-app

      - name: Deploy to Azure Web App (publish profile)
        if: steps.check_secrets.outputs.has_creds != 'true' && steps.check_secrets.outputs.has_publish_profile == 'true'
        uses: azure/webapps-deploy@0efab0a4c73b728613acd71966c04beadfc20aaf
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./python-app

      - name: Skip deploy (missing secrets)
        if: steps.check_secrets.outputs.has_creds != 'true' && steps.check_secrets.outputs.has_publish_profile != 'true'
        run: |
          echo "Skipping deployment: AZURE_CREDENTIALS or AZURE_WEBAPP_PUBLISH_PROFILE is required."

      - name: Health Check
        run: |
          for i in {1..10}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.WEBAPP_NAME }}.azurewebsites.net")
            if [ "$response" -eq 200 ]; then
              echo "✅ App is healthy!"
              exit 0
            fi
            echo "Waiting for app to be ready... ($i/10)"
            sleep 30
          done
          echo "❌ Health check failed"
          exit 1

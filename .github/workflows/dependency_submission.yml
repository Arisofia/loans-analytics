name: Automatic Dependency Submission (Python)

"on":
  push:
    branches: [main]
    paths:
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/dependency-submission.yml"
  pull_request:
    branches: [main]

jobs:
  submit-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2
      - uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate requirements
        run: |
          pip check
      - name: Submit Dependency Snapshot
        run: echo "Dependency submission not configured"

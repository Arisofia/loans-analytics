name: Export Meta Data to Azure

"on":
  schedule:
    - cron: "0 2 * * *" # Diariamente a las 2 AM
  workflow_dispatch: # Manual trigger

jobs:
  export:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./node/services/meta-connector
        run: npm install

      - name: Compile TypeScript
        working-directory: ./node/services/meta-connector
        run: npx tsc

      - name: Export to Azure
        working-directory: ./node/services/meta-connector
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          META_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.FACEBOOK_AD_ACCOUNT_ID }}
        run: node dist/export_to_azure.js

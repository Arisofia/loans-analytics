name: Daily Data Ingestion (DISABLED — cloud services stopped to reduce costs)

on:
  # DISABLED: Daily schedule stopped to eliminate cloud costs
  # schedule:
  #   - cron: '0 2 * * *' # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data ingestion pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python scripts/data/run_data_pipeline.py --input data/raw/abaco_real_data_20260202.csv

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Daily data ingestion completed successfully"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Daily ingestion failed',
              body: 'Daily data ingestion workflow failed. Check logs for details.',
              labels: ['data-pipeline', 'automated']
            })

name: Playwright E2E Tests

"on":
  pull_request:
    paths:
      - "apps/web/**"
  push:
    branches: [main]
    paths:
      - "apps/web/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (apps/web)
        working-directory: apps/web
        run: |
          npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Start dev server
        working-directory: apps/web
        run: npm run dev &

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: Seed E2E test data
        if: env.SUPABASE_SERVICE_ROLE_KEY != ''
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SEED_TABLE: ${{ secrets.E2E_SEED_TABLE }}
          E2E_SEED_ROWS: ${{ secrets.E2E_SEED_ROWS }}
        run: npm run e2e:seed

      - name: Run Playwright tests (CI)
        if: env.SUPABASE_SERVICE_ROLE_KEY != ''
        working-directory: apps/web
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:e2e:ci

      - name: Teardown E2E test data
        if: always() && env.SUPABASE_SERVICE_ROLE_KEY != ''
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run e2e:teardown

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

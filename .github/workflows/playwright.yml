name: Playwright E2E Tests

on:
  pull_request:
    paths:
      - "apps/web/**"
  push:
    branches: [main]
    paths:
      - "apps/web/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install dependencies (apps/web)
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Start dev server
        working-directory: apps/web
        run: npm run dev &

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: Seed E2E test data
        if: ${{ secrets.SUPABASE_URL && secrets.SUPABASE_SERVICE_ROLE_KEY && secrets.E2E_TEST_EMAIL && secrets.E2E_TEST_PASSWORD }}
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SEED_TABLE: ${{ secrets.E2E_SEED_TABLE }}
          E2E_SEED_ROWS: ${{ secrets.E2E_SEED_ROWS }}
        run: npm run e2e:seed

      - name: Run Playwright tests (CI)
        if: ${{ secrets.E2E_TEST_EMAIL && secrets.E2E_TEST_PASSWORD }}
        working-directory: apps/web
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:ci

      - name: Teardown E2E test data
        if: ${{ always() && (secrets.SUPABASE_URL && secrets.SUPABASE_SERVICE_ROLE_KEY) }}
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run e2e:teardown

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

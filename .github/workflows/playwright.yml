name: Playwright E2E Tests

"on":
  pull_request:
    paths:
      - 'apps/web/**'
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js 20
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: apps/web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (apps/web)
        working-directory: apps/web
        run: |
          npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Start dev server
        working-directory: apps/web
        run: npm run dev &

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: Seed E2E test data
        if: env.SUPABASE_SERVICE_ROLE_KEY != ''
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SEED_TABLE: ${{ secrets.E2E_SEED_TABLE }}
          E2E_SEED_ROWS: ${{ secrets.E2E_SEED_ROWS }}
        run: npm run e2e:seed

      - name: Run Playwright tests (CI)
        if: env.SUPABASE_SERVICE_ROLE_KEY != ''
        working-directory: apps/web
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:e2e:ci

      - name: Teardown E2E test data
        if: always() && env.SUPABASE_SERVICE_ROLE_KEY != ''
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run e2e:teardown

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

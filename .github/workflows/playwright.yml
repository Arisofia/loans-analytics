name: Playwright E2E Tests

on:
  pull_request:
    paths:
      - "apps/web/**"
  push:
    branches: [main]
    paths:
      - "apps/web/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Removed invalid step: uses/setup-node with working-directory. Node setup is already done above.

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (apps/web)
        working-directory: apps/web
        run: |
          npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Start dev server
        working-directory: apps/web
        run: npm run dev &

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: Seed E2E test data
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }} # Ensure this secret exists in repo settings
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} # Ensure this secret exists in repo settings
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }} # Ensure this secret exists in repo settings
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }} # Ensure this secret exists in repo settings
          E2E_SEED_TABLE: ${{ secrets.E2E_SEED_TABLE }} # Ensure this secret exists in repo settings
          E2E_SEED_ROWS: ${{ secrets.E2E_SEED_ROWS }} # Ensure this secret exists in repo settings
        run: npm run e2e:seed

      - name: Run Playwright tests (CI)
        working-directory: apps/web
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }} # Ensure this secret exists in repo settings
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }} # Ensure this secret exists in repo settings
        run: npm run test:e2e:ci

      - name: Teardown E2E test data
        if: always()
        working-directory: apps/web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }} # Ensure this secret exists in repo settings
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} # Ensure this secret exists in repo settings
        run: npm run e2e:teardown

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # every day at 6am UTC
jobs:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib pyarrow boto3
      - name: Run Meta Agent Analysis
        run: |
          python python/analytics/meta_agent_analysis.py
      - name: Upload charts to S3
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          python <<EOF
          import boto3, os
          s3 = boto3.client('s3')
          bucket = os.environ['AWS_S3_BUCKET']
          for f in os.listdir('exports/meta_agent'):
              if f.endswith('.png'):
                  s3.upload_file(
                      f'exports/meta_agent/{f}',
                      bucket,
                      ExtraArgs={'ACL': 'public-read', 'ContentType': 'image/png'}
                  )
                  print(f'Uploaded {f} to S3')
          EOF
        run: |

# Marked as resolved since the file is deleted
name: Customer Segmentation
on:
  schedule:
    - cron: "0 10 * * *" # 11:00 AM CET daily
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - id: check
        run: |
          if [ -f "scripts/customer_segmentation.py" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: scripts/customer_segmentation.py missing"
          fi

  customer-segmentation:
    needs: validate
    if: needs.validate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets availability
        id: check-secrets
        env:
          AZURE_AI_MULTIAGENT_KEY: ${{ secrets.AZURE_AI_MULTIAGENT_KEY }}
          AZURE_AI_MULTIAGENT_ENDPOINT: ${{ secrets.AZURE_AI_MULTIAGENT_ENDPOINT }}
        run: |
          sanitize_secret() {
            local var_name="$1"
            local raw="$2"
            local norm
            norm="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | xargs)"
            case "$norm" in
              ""|"token"|"tokens"|"secret"|"secrets"|"changeme"|"change-me"|"change_me"|"replace-me"|"replace_me"|"placeholder"|"example"|"redacted")
                printf -v "$var_name" '%s' ""
                ;;
              *)
                printf -v "$var_name" '%s' "$raw"
                ;;
            esac
          }
          sanitize_secret AZURE_AI_MULTIAGENT_KEY "$AZURE_AI_MULTIAGENT_KEY"

          missing=""
          [ -z "$AZURE_AI_MULTIAGENT_KEY" ] && missing="$missing AZURE_AI_MULTIAGENT_KEY"
          [ -z "$AZURE_AI_MULTIAGENT_ENDPOINT" ] && missing="$missing AZURE_AI_MULTIAGENT_ENDPOINT"
          if [ -z "$missing" ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing required secrets:$missing - skipping customer segmentation"
          fi
      - name: Checkout Repository
        if: steps.check-secrets.outputs.can_run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Python Environment
        if: steps.check-secrets.outputs.can_run == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install Dependencies
        if: steps.check-secrets.outputs.can_run == 'true'
        run: |
          pip install -r requirements.txt
      - name: Run Segmentation Analysis
        if: steps.check-secrets.outputs.can_run == 'true' && hashFiles('scripts/customer_segmentation.py') != ''
        env:
          AZURE_AI_MULTIAGENT_ENDPOINT: ${{ secrets.AZURE_AI_MULTIAGENT_ENDPOINT }}
          AZURE_AI_MULTIAGENT_KEY: ${{ secrets.AZURE_AI_MULTIAGENT_KEY }}
        run: |
          python scripts/customer_segmentation.py

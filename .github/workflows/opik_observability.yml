name: Opik Observability & Monitoring

# DISABLED: Workflow uses Slack integration which is not part of core pipeline
# Enabled only for manual dispatch
on:
  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

env:
  OPIK_TOKEN: ${{ secrets.OPIK_TOKEN }}
  SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}

jobs:
  # Job 1: Fetch system metrics from Opik
  fetch-opik-metrics:
    runs-on: ubuntu-latest
    outputs:
      metrics-available: ${{ steps.fetch.outputs.available }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Opik system metrics
        id: fetch
        run: |
          echo "Fetching Opik observability metrics..."
          if [ ! -f scripts/fetch_opik_metrics.py ]; then
            echo "Missing scripts/fetch_opik_metrics.py; skipping."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/fetch_opik_metrics.py
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Upload metrics artifact
        if: steps.fetch.outputs.available == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: opik-metrics
          path: outputs/opik_metrics.json
          if-no-files-found: warn
          retention-days: 7

  # Job 2: Analyze data pipeline health
  analyze-pipeline-health:
    needs: fetch-opik-metrics
    if: needs.fetch-opik-metrics.outputs.metrics-available == 'true'
    runs-on: ubuntu-latest
    outputs:
      pipeline-status: ${{ steps.analyze.outputs.status }}
      issues-found: ${{ steps.analyze.outputs.issues }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Opik metrics
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: opik-metrics
          path: outputs/

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Analyze pipeline health metrics
        id: analyze
        run: |
          echo "Analyzing data pipeline health..."
          if [ ! -f scripts/analyze_pipeline_health.py ]; then
            echo "Missing scripts/analyze_pipeline_health.py; skipping."
            echo "status=unknown" >> "$GITHUB_OUTPUT"
            echo "issues=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/analyze_pipeline_health.py >> "$GITHUB_OUTPUT"

  # Job 3: Analyze agent execution performance
  analyze-agent-performance:
    needs: fetch-opik-metrics
    if: needs.fetch-opik-metrics.outputs.metrics-available == 'true'
    runs-on: ubuntu-latest
    outputs:
      agent-status: ${{ steps.analyze.outputs.status }}
      slow-agents: ${{ steps.analyze.outputs.slow_agents }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Opik metrics
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: opik-metrics
          path: outputs/

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Analyze agent performance
        id: analyze
        run: |
          echo "Analyzing agent execution performance..."
          if [ ! -f scripts/analyze_agent_performance.py ]; then
            echo "Missing scripts/analyze_agent_performance.py; skipping."
            echo "status=unknown" >> "$GITHUB_OUTPUT"
            echo "slow_agents=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/analyze_agent_performance.py >> "$GITHUB_OUTPUT"

  # Job 4: Check data quality trends
  check-data-quality-trends:
    needs: fetch-opik-metrics
    if: needs.fetch-opik-metrics.outputs.metrics-available == 'true'
    runs-on: ubuntu-latest
    outputs:
      quality-trend: ${{ steps.check.outputs.trend }}
      anomalies-detected: ${{ steps.check.outputs.anomalies }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Opik metrics
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: opik-metrics
          path: outputs/

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check data quality trends
        id: check
        run: |
          echo "Checking data quality trends..."
          if [ ! -f scripts/check_data_quality_trends.py ]; then
            echo "Missing scripts/check_data_quality_trends.py; skipping."
            echo "trend=unknown" >> "$GITHUB_OUTPUT"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/check_data_quality_trends.py >> "$GITHUB_OUTPUT"

  # Job 5: Generate observability dashboard
  generate-observability-dashboard:
    needs:
      - analyze-pipeline-health
      - analyze-agent-performance
      - check-data-quality-trends
    if: needs.analyze-pipeline-health.result == 'success' && needs.analyze-agent-performance.result == 'success' && needs.check-data-quality-trends.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate dashboard
        run: |
          echo "Generating observability dashboard..."
          if [ ! -f scripts/generate_observability_dashboard.py ]; then
            echo "Missing scripts/generate_observability_dashboard.py; skipping."
            exit 0
          fi
          python scripts/generate_observability_dashboard.py \
            --pipeline-status "${{ needs.analyze-pipeline-health.outputs.pipeline-status }}" \
            --agent-status "${{ needs.analyze-agent-performance.outputs.agent-status }}" \
            --quality-trend "${{ needs.check-data-quality-trends.outputs.quality-trend }}"

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: observability-dashboard
          path: outputs/dashboard.html
          if-no-files-found: warn
          retention-days: 30

  # Job 6: Alert on critical issues
  alert-on-critical-issues:
    needs:
      - fetch-opik-metrics
      - analyze-pipeline-health
      - analyze-agent-performance
      - check-data-quality-trends

    if: >
      always() && needs.fetch-opik-metrics.outputs.metrics-available == 'true' && (
        needs.analyze-pipeline-health.result != 'success' ||
        needs.analyze-agent-performance.result != 'success' ||
        needs.check-data-quality-trends.result != 'success' ||
        needs.analyze-pipeline-health.outputs.pipeline-status != 'healthy' ||
        needs.analyze-agent-performance.outputs.agent-status != 'optimal' ||
        needs.check-data-quality-trends.outputs.anomalies-detected == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Notify Leadership of Critical Issues
        uses: slackapi/slack-github-action@v4
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_LEADERSHIP }}
        with:
          payload: |
            {
              "text": "🚨 Critical System Health Issues Detected",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status Report:*\n• Pipeline: `${{ needs.analyze-pipeline-health.outputs.pipeline-status }}`\n• Agents: `${{ needs.analyze-agent-performance.outputs.agent-status }}`\n• Data Quality: `${{ needs.check-data-quality-trends.outputs.quality-trend }}`"
                  }
                }
              ]
            }

  # Job 7: Daily system health summary
  send-daily-summary:
    needs:
      - fetch-opik-metrics
      - analyze-pipeline-health
      - analyze-agent-performance
      - check-data-quality-trends
      - generate-observability-dashboard

    if: always() && needs.fetch-opik-metrics.outputs.metrics-available == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Send Daily Summary to Slack
        uses: slackapi/slack-github-action@v4
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_LEADERSHIP }}
        with:
          payload: |
            {
              "text": "📊 Daily System Health Summary",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily Report (${{ steps.date.outputs.date }})*\n• Data Pipeline: `${{ needs.analyze-pipeline-health.outputs.pipeline-status }}`\n• Agent Performance: `${{ needs.analyze-agent-performance.outputs.agent-status }}`\n• Data Quality: `${{ needs.check-data-quality-trends.outputs.quality-trend }}`\n\n_View detailed dashboard in GitHub Actions artifacts._"
                  }
                }
              ]
            }

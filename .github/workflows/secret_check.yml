name: Secret check (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-secret:
    runs-on: ubuntu-latest
    name: Ensure MIDDLEWARE_SHARED_SECRET exists
    steps:
      - name: Check repository secret
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.MIDDLEWARE_SHARED_SECRET || '' }}" ]; then
            echo "ERROR: MIDDLEWARE_SHARED_SECRET is not set in the repository secrets."
            exit 1
          fi
          echo "MIDDLEWARE_SHARED_SECRET is set (redacted)."
          echo "Secret-check passed. Proceed with deployment and then run the Deploy verification workflow."

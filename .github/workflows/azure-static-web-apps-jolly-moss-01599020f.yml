name: Azure Static Web Apps (DISABLED — Azure services stopped to reduce costs)

on:
  # DISABLED: Azure Static Web Apps deployment stopped to eliminate cloud costs
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'apps/web/**'
  # pull_request:
  #   types: [opened, synchronize, reopened, closed]
  #   branches:
  #     - main
  #   paths:
  #     - 'apps/web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    if: >-
      vars.ENABLE_AZURE_SWA_DEPLOY == 'true' &&
      (github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed'))
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web/public"
          api_location: ""
          output_location: ""
          # ⚠️ Important: This assumes 'apps/web/public' contains ready-to-serve static files.
          # If this is a React/Vue/Next.js app, set this to 'false' and define 'output_location'.
          skip_app_build: true

  close_pull_request:
    if: >-
      vars.ENABLE_AZURE_SWA_DEPLOY == 'true' &&
      github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    permissions:
      contents: read
      pull-requests: write # Required to update/remove PR comments
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Added to allow PR comment updates
          action: "close"

name: Azure Static Web Apps (DISABLED — Azure services stopped to reduce costs)

on:
  # DISABLED: Azure Static Web Apps deployment stopped to eliminate cloud costs
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'apps/web/**'
  # pull_request:
  #   types: [opened, synchronize, reopened, closed]
  #   branches:
  #     - main
  #   paths:
  #     - 'apps/web/**'
  workflow_dispatch:
    inputs:
      confirm_swa_deploy:
        description: "Set to true to permit Azure SWA deployment (may incur cost)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  build_and_deploy:
    # Double-gated: requires explicit manual input + repo variable to avoid accidental spend.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_swa_deploy == 'true' && vars.ENABLE_AZURE_SWA_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web/public"
          api_location: ""
          output_location: ""
          # ⚠️ Important: This assumes 'apps/web/public' contains ready-to-serve static files.
          # If this is a React/Vue/Next.js app, set this to 'false' and define 'output_location'.
          skip_app_build: true

name: Gemini AI PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Check Gemini key
        id: gemini_key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_SIMPLE }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GEMINI_API_KEY_SIMPLE not configured; skipping Gemini review." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install dependencies
        if: steps.gemini_key.outputs.available == true
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests

      - name: Run Gemini review
        if: steps.gemini_key.outputs.available == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_SIMPLE }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: python .github/scripts/gemini_pr_review.py

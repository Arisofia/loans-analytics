name: Local ETL Daily Snapshot

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:
    inputs:
      snapshot_month:
        description: "Snapshot date (YYYY-MM-DD). Defaults to today UTC."
        required: false
        default: ""
      loan_tape_dir:
        description: "Directory containing loan tape CSV files"
        required: false
        default: "data/raw"
      control_mora_path:
        description: "Optional control mora CSV file path"
        required: false
        default: ""

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_data: ${{ steps.check_loan_tape.outputs.has_data }}
      snapshot_month: ${{ steps.date.outputs.snapshot_month }}
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" fetch --depth=1 origin "${{ github.ref }}"
          git checkout --detach FETCH_HEAD

      - name: Set snapshot month
        id: date
        run: |
          SNAPSHOT="${{ github.event.inputs.snapshot_month }}"
          if [ -z "$SNAPSHOT" ]; then
            SNAPSHOT=$(date -u +%F)
          fi
          echo "snapshot_month=$SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Check for loan tape data
        id: check_loan_tape
        run: |
          LOAN_TAPE_DIR="${{ github.event.inputs.loan_tape_dir || 'data/raw' }}"
          echo "Using loan tape directory: $LOAN_TAPE_DIR"
          if [ ! -d "$LOAN_TAPE_DIR" ]; then
            echo "::warning::Loan tape directory '$LOAN_TAPE_DIR' does not exist — skipping local ETL run."
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! ls "$LOAN_TAPE_DIR"/*.csv >/dev/null 2>&1; then
            echo "::warning::No CSV files found in '$LOAN_TAPE_DIR' — skipping local ETL run."
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Loan tape data found in '$LOAN_TAPE_DIR'; proceeding with local ETL."
          echo "has_data=true" >> "$GITHUB_OUTPUT"

  run-local-etl:
    needs: preflight
    if: needs.preflight.outputs.has_data == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" fetch --depth=1 origin "${{ github.ref }}"
          git checkout --detach FETCH_HEAD

      - name: Setup Python
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "❌ Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install -r requirements.prod.lock.txt

      - name: Run local ETL
        run: |
          "$PYTHON_BIN" scripts/data/local_monthly_etl.py \
            --loan-tape-dir "${{ github.event.inputs.loan_tape_dir || 'data/raw' }}" \
            --control-mora "${{ github.event.inputs.control_mora_path }}" \
            --snapshot-month "${{ needs.preflight.outputs.snapshot_month }}" \
            --output-dir exports/local_star

      - name: Validate unmatched records reason_code
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          path = Path("exports/local_star/unmatched_records.csv")
          if not path.exists():
              raise SystemExit("unmatched_records.csv is missing")

          df = pd.read_csv(path)
          if "reason_code" not in df.columns:
              raise SystemExit("unmatched_records.csv missing reason_code column")

          invalid = df["reason_code"].fillna("").astype(str).str.strip().eq("").sum()
          if invalid > 0:
              raise SystemExit(f"{invalid} unmatched_records rows missing reason_code")

          print(f"Validation OK: {len(df)} unmatched rows with reason_code")
          PY

      - name: Upload artifacts
        if: always()
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/local-etl-${{ github.run_number }}.tar.gz" exports/local_star/ 2>/dev/null || true
          echo "Generated local artifact archive: artifacts/local-etl-${{ github.run_number }}.tar.gz"

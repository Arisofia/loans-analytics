name: Cleanup Old Workflow Runs (DISABLED — cloud services stopped to reduce costs)

on:
  # DISABLED: Weekly schedule stopped to reduce Actions usage
  # schedule:
  #   - cron: '0 2 * * 0' # Weekly on Sunday at 2am UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: Delete Old Workflow Runs
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs older than 15 days
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7 # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 15
          keep_minimum_runs: 10
          delete_workflow_pattern: 'all'
          # Excludes security and compliance workflows from deletion
          delete_workflow_by_state_pattern: 'completed,cancelled,failure'

      - name: Cleanup summary
        run: |
          echo "✅ Cleaned up workflow runs older than 15 days"
          echo "📊 Retention policy: Keep last 10 runs + runs from last 15 days"
          echo "🔒 Security/compliance workflows excluded from cleanup"

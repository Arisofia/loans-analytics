name: SonarCloud
"on":
  push:
    branches:
      - main
      - codex/**
    paths:
      - "src/**"
      - "apps/**"
      - "dashboard/**"
      - "requirements*.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  sonarcloud:
    name: SonarCloud Scan
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_GITHUB }}
    steps:
      - name: Check secrets availability
        id: check-secrets
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "::warning::SONAR_TOKEN_GITHUB not configured - skipping SonarCloud scan"
          fi

      - name: Checkout repository
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Necessary for SonarCloud to analyze history
          fetch-depth: 0
      - name: Set up pnpm
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d
        with:
          version: 10
      - name: Setup Node
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Set up Python
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install dependencies
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          if [ -d "apps/web" ] && [ -f "apps/web/package.json" ]; then
            pnpm -C apps/web install --frozen-lockfile
            pnpm -C apps/web lint --version >/dev/null
          else
            echo "::warning::apps/web directory or package.json not found, skipping Node.js dependencies"
          fi
      - name: Analytics coverage (pytest)
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install opentelemetry-sdk==1.39.1
          python -m pip install -r requirements.txt pytest pytest-cov
          pytest --cov=src --cov-report=xml:coverage-src.xml tests/
      - name: Web coverage placeholder
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          mkdir -p apps/web/coverage
          printf "TN:\nSF:placeholder.js\nDA:1,0\nend_of_record\n" > apps/web/coverage/lcov.info
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        with:
          args: >
            -Dsonar.verbose=true
            -Dsonar.python.coverage.reportPaths=coverage-src.xml
            -Dsonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

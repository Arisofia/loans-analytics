name: SonarCloud
"on":
  push:
    branches:
      - main
      - codex/**
    paths:
      - "src/**"
      - "apps/**"
      - "dashboard/**"
      - "requirements*.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  sonarcloud:
    name: SonarCloud Scan
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check secrets availability
        id: check-secrets
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "::warning::SONAR_TOKEN_GITHUB not configured - skipping SonarCloud scan"
          fi

      - name: Checkout repository
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Necessary for SonarCloud to analyze history
          fetch-depth: 0
      - name: Setup Node
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          cd apps/web && npm ci
      - name: Analytics coverage (pytest)
        if: steps.check-secrets.outputs.secrets_available == 'true'
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install opentelemetry-sdk==1.39.1
          python -m pip install -r requirements.txt pytest pytest-cov pytest-asyncio
          pytest --cov=src --cov-report=xml:coverage-src.xml tests/ || true
      - name: Web coverage placeholder
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          mkdir -p apps/web/coverage
          printf "TN:\nSF:placeholder.js\nDA:1,0\nend_of_record\n" > apps/web/coverage/lcov.info
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          args: >
            -Dsonar.verbose=true
            -Dsonar.python.coverage.reportPaths=coverage-src.xml
            -Dsonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

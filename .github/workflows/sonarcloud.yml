name: SonarCloud
"on":
  push:
    branches:
      - main
      - codex/**
    paths:
      - "src/**"
      - "apps/**"
      - "dashboard/**"
      - "requirements*.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  sonarcloud:
    name: SonarCloud Scan
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_GITHUB }}
    steps:
      - name: Check secrets availability
        id: check-secrets
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "::warning::SONAR_TOKEN_GITHUB not configured - skipping SonarCloud scan"
          fi

      - name: Checkout repository
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Necessary for SonarCloud to analyze history
          fetch-depth: 0
      - name: Set up pnpm
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.0.0
        with:
          version: 10
      - name: Setup Node
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.1.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Set up Python
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          pnpm -C apps/web install --frozen-lockfile
          pnpm -C apps/web lint --version >/dev/null
      - name: Analytics coverage (pytest)
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install opentelemetry-sdk==1.39.1
          python -m pip install -r requirements.txt pytest pytest-cov
          pytest --cov=src --cov-report=xml:coverage-src.xml tests/
      - name: Web coverage placeholder
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: |
          mkdir -p apps/web/coverage
          printf "TN:\nSF:placeholder.js\nDA:1,0\nend_of_record\n" > apps/web/coverage/lcov.info
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v4
        with:
          args: >
            -Dsonar.verbose=true
            -Dsonar.python.coverage.reportPaths=coverage-src.xml
            -Dsonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

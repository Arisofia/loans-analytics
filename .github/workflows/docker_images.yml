name: Build & Push Docker Images

"on":
  # Disabled push trigger to reduce Actions usage - use workflow_dispatch for manual builds
  # push:
  #   branches: [main]
  #   paths:
  #     - "streamlit_app.py"
  #     - "src/**"
  #     - "requirements.txt"
  #     - "docker-compose.yml"
  #     - ".github/workflows/docker_images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # NOTE: IMAGE_WEB removed - Next.js frontend (apps/web) was deprecated
  IMAGE_DASHBOARD: ${{ github.repository }}-dashboard

permissions:
  contents: read

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
      AZURE_ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
      AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
      # Pre-compute lowercase for validator (overridden in "Lowercase image names" step for consistency)
      IMAGE_DASHBOARD_LOWER: arisofia/abaco-loans-analytics-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lowercase image names
        run: |
          # NOTE: IMAGE_WEB removed - Next.js frontend (apps/web) was deprecated
          # Convert to lowercase for Docker image naming (override default for dynamic repos)
          IMAGE_DASHBOARD_LOWER="${IMAGE_DASHBOARD,,}"
          echo "IMAGE_DASHBOARD_LOWER=$IMAGE_DASHBOARD_LOWER" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != ''
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.1.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # NOTE: Web Docker image steps removed - Next.js frontend (apps/web) was deprecated

      - name: Docker metadata (dashboard)
        id: meta_dash
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          # IMAGE_DASHBOARD_LOWER is set dynamically in the "Lowercase image names" step
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_DASHBOARD_LOWER }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (dashboard)
        uses: docker/build-push-action@2cdde995de11925a030ce8070c3d77a52ffcf1c0 # v5.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_dash.outputs.tags }}
          labels: ${{ steps.meta_dash.outputs.labels }}

      # Optional: also push to Azure Container Registry (ACR)
      # Configure these secrets to enable:
      # - ACR_LOGIN_SERVER (e.g., myregistry.azurecr.io)
      # - ACR_USERNAME
      # - ACR_PASSWORD
      - name: Log in to ACR (optional)
        if: github.event_name != 'pull_request' && env.AZURE_ACR_LOGIN_SERVER != ''
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.1.0
        with:
          registry: ${{ env.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ env.AZURE_ACR_USERNAME }}
          password: ${{ env.AZURE_ACR_PASSWORD }}

      - name: Tag & push to ACR (optional)
        run: |
          set -euo pipefail
          if [ -z "$AZURE_ACR_LOGIN_SERVER" ]; then
            echo "Skipping ACR push: AZURE_ACR_LOGIN_SERVER not set"
            exit 0
          fi
          # NOTE: Web image removed - Next.js frontend (apps/web) was deprecated
          DASH_SRC_TAG="${{ env.REGISTRY }}/$IMAGE_DASHBOARD_LOWER:${{ github.sha }}"
          DASH_ACR_TAG="$AZURE_ACR_LOGIN_SERVER/$IMAGE_DASHBOARD_LOWER:${{ github.sha }}"

          docker pull "$DASH_SRC_TAG"
          docker tag "$DASH_SRC_TAG" "$DASH_ACR_TAG"
          docker push "$DASH_ACR_TAG"

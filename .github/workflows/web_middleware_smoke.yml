name: Web middleware smoke tests

on:
    pull_request:
        paths:
            - "apps/web/**"

jobs:
    unit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2

            - name: Setup Node.js
              uses: actions/setup-node@b7dde419cc031a3d665baa4a62731727917cd13e  # v4.1.0
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm ci
              working-directory: apps/web

            - name: Run unit tests
              run: npm run test:unit
              working-directory: apps/web

name: Train Scorecard On Raw Data

on:
  push:
    branches: [main, develop]
    paths:
      - data/raw/*.csv
      - data/raw/**/*.csv
  workflow_dispatch:

jobs:
  train-scorecard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (no external action)
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip setuptools wheel
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-dev.txt

      - name: Train scorecard if required CSV files are present
        run: |
          "$PYTHON_BIN" scripts/ml/train_scorecard_if_ready.py

      - name: Publish run summary
        if: always()
        run: |
          echo "## Scorecard Training" >> "$GITHUB_STEP_SUMMARY"
          if [ -f models/scorecard/last_training_run.json ]; then
            echo "- Training executed: yes" >> "$GITHUB_STEP_SUMMARY"
            echo "- Summary file: models/scorecard/last_training_run.json" >> "$GITHUB_STEP_SUMMARY"
            COMMIT_HASH=$(python -c 'import json; print(json.load(open("models/scorecard/last_training_run.json"))["git_commit"])')
            echo "- Commit hash: ${COMMIT_HASH}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Training executed: no (required CSV files not found)" >> "$GITHUB_STEP_SUMMARY"
          fi

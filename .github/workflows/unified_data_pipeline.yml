name: Unified Multi-Agent Data Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
  schedule:
    # Run daily at 4:00 AM CET (3:00 AM UTC) - before agent workflows
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Execute Unified Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Unified Data Pipeline
        id: pipeline
        if: env.SUPABASE_SERVICE_ROLE != ''
        env:
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          OPIK_TOKEN: ${{ secrets.OPIK_TOKEN }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          echo "Running unified data pipeline (orchestrator)..."
          python scripts/run_data_pipeline.py --action github-action

      - name: Upload Pipeline Artifacts
        uses: actions/upload-artifact@250e9d8087e4d33cdf6c33e180d803782f68fdb1  # v4.4.3
        if: always()
        with:
          name: data-pipeline-results
          path: |
            logs
            data/manifest.json
            exports
          retention-days: 14

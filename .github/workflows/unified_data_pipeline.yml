name: Unified Multi-Agent Data Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
  schedule:
    # Run daily at 4:00 AM CET (3:00 AM UTC) - before agent workflows
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Execute Unified Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Unified Data Pipeline
        id: pipeline
        if: env.SUPABASE_SERVICE_ROLE != ''
        env:
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          OPIK_TOKEN: ${{ secrets.OPIK_TOKEN }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          echo "Running unified data pipeline (orchestrator)..."
          python scripts/run_data_pipeline.py --action github-action

      - name: Upload Pipeline Artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        if: always()
        with:
          name: data-pipeline-results
          path: |
            logs
            data/manifest.json
            exports
          retention-days: 14

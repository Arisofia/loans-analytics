name: CI - Option C (Pytest + Playwright)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-option-c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r dev-requirements.txt 2>/dev/null || python -m pip install -r requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_sync_kpi_table_to_figma.py -v

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        working-directory: apps/web
        run: npm install

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: apps/web
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

name: push-to-kv

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  push-kv:
    runs-on: ubuntu-latest
    outputs:
      kv_ready: ${{ steps.kv_secrets.outputs.kv_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Check KV secrets
        id: kv_secrets
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_PROJECT_ID" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::KV sync skipped because required Supabase secrets are missing."
            echo "kv_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "kv_ready=true" >> "$GITHUB_OUTPUT"

      - name: Push sections to Supabase KV
        if: steps.kv_secrets.outputs.kv_ready == 'true'
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          python scripts/data/push_to_kv.py

name: Financial Forecast
"on":
    schedule:
        - cron: "0 7 * * *" # 8:00 AM CET daily
    workflow_dispatch:

jobs:
    financial-forecast:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
            - name: Setup Python Environment
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                  python-version: "3.11"
            - name: Install Dependencies
              run: |
                  pip install -r requirements.txt
            - name: Run Financial Forecast
              if: hashFiles('scripts/financial_forecast.py') != ''
              env:
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
              run: |
                  python scripts/financial_forecast.py
            - name: Post to Power BI
              if: hashFiles('scripts/post_to_powerbi.py') != ''
              env:
                SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
              run: |
                  python scripts/post_to_powerbi.py

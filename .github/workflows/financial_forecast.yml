name: Financial Forecast
"on":
    schedule:
        - cron: "0 7 * * *" # 8:00 AM CET daily
    workflow_dispatch:

jobs:
    financial-forecast:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2
            - name: Setup Python Environment
              uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
              with:
                  python-version: "3.11"
            - name: Install Dependencies
              run: |
                  pip install -r requirements.txt
            - name: Run Financial Forecast
              if: hashFiles('scripts/financial_forecast.py') != ''
              env:
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
              run: |
                  python scripts/financial_forecast.py
            - name: Post to Power BI
              if: hashFiles('scripts/post_to_powerbi.py') != ''
              env:
                SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
              run: |
                  python scripts/post_to_powerbi.py

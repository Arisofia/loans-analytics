name: Run Daily KPI Pipeline

on:
  schedule:
    # Run at 6 AM UTC daily (1 AM EST) - After Cascade extracts data
    - cron: '0 6 * * *'
  
  workflow_dispatch:  # Allow manual triggers from GitHub UI
    inputs:
      input_file:
        description: 'Input CSV file path (relative to repo root)'
        required: false
        default: 'data/raw/sample_loans.csv'
        type: string

permissions:
  contents: write  # Allow committing pipeline outputs

jobs:
  run-pipeline:
    name: Execute Data Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ ERROR: Missing Supabase credentials in GitHub Secrets"
            echo "Please add SUPABASE_URL and SUPABASE_ANON_KEY secrets"
            echo "See: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✓ Supabase credentials configured"
      
      - name: Run data pipeline
        id: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LOG_LEVEL: INFO
        run: |
          INPUT_FILE="${{ github.event.inputs.input_file || 'data/raw/sample_loans.csv' }}"
          echo "Running pipeline with input: $INPUT_FILE"
          
          python scripts/run_data_pipeline.py --input "$INPUT_FILE" 2>&1 | tee pipeline_run.log
          
          # Extract run ID and status from logs
          RUN_ID=$(grep "Run ID:" pipeline_run.log | tail -1 | awk '{print $NF}')
          STATUS=$(grep "Status:" pipeline_run.log | tail -1 | awk '{print $NF}')
          
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "❌ Pipeline failed with status: $STATUS"
            exit 1
          fi
      
      - name: Verify database writes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Verifying data written to Supabase..."
          python -c "
          from supabase import create_client
          import os
          from datetime import datetime
          
          supabase = create_client(
              os.getenv('SUPABASE_URL'),
              os.getenv('SUPABASE_ANON_KEY')
          )
          
          # Query today's KPI records
          today = datetime.now().date().isoformat()
          result = supabase.table('kpi_timeseries_daily') \
              .select('*') \
              .eq('run_date', today) \
              .execute()
          
          count = len(result.data)
          print(f'✓ Found {count} KPI records for today ({today})')
          
          if count == 0:
              print('⚠️ Warning: No records written to database today')
              exit(1)
          
          # Show sample KPIs
          kpi_names = [r['kpi_name'] for r in result.data[:5]]
          print(f'Sample KPIs: {', '.join(kpi_names)}')
          "
      
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ steps.pipeline.outputs.run_id }}
          path: |
            logs/
            pipeline_run.log
          retention-days: 30
      
      - name: Upload pipeline outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ steps.pipeline.outputs.run_id }}
          path: data/outputs/
          retention-days: 7
      
      - name: Commit pipeline outputs (optional)
        if: success() && github.event_name == 'schedule'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Only commit if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add data/outputs/
            git commit -m "chore: automated pipeline run ${{ steps.pipeline.outputs.run_id }}"
            git push
          else
            echo "No changes to commit"
          fi
      
      - name: Send notification on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed: Run ${{ steps.pipeline.outputs.run_id || 'UNKNOWN' }}`,
              body: `
              ## Pipeline Execution Failed
              
              **Run ID**: ${{ steps.pipeline.outputs.run_id || 'N/A' }}
              **Workflow**: ${{ github.workflow }}
              **Trigger**: ${{ github.event_name }}
              **Timestamp**: ${{ github.event.head_commit.timestamp }}
              
              **Logs**: [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              
              Please investigate and resolve the issue.
              `,
              labels: ['pipeline', 'automated', 'bug']
            })

  dashboard-health-check:
    name: Verify Dashboard Accessibility
    runs-on: ubuntu-latest
    needs: run-pipeline
    
    steps:
      - name: Check dashboard endpoint
        run: |
          echo "Checking dashboard at http://4.248.240.207:8501"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://4.248.240.207:8501 || echo "000")
          
          if [ "$HTTP_CODE" == "200" ]; then
            echo "✓ Dashboard is accessible (HTTP $HTTP_CODE)"
          else
            echo "❌ Dashboard returned HTTP $HTTP_CODE"
            echo "Container may need to be restarted"
            exit 1
          fi
      
      - name: Send dashboard alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Dashboard health check failed',
              body: `
              ## Dashboard Unavailable
              
              The dashboard at http://4.248.240.207:8501 is not responding.
              
              **Possible causes**:
              - Azure container stopped
              - Network connectivity issues
              - Application crashed
              
              **Action required**: Check Azure Container Instances status
              `,
              labels: ['dashboard', 'production', 'bug']
            })

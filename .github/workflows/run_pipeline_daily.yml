name: Run Daily KPI Pipeline

on:
  schedule:
    # Run at 6 AM UTC daily (1 AM EST) - After Cascade extracts data
    - cron: '0 6 * * *'

  workflow_dispatch:  # Allow manual triggers from GitHub UI
    # CKV_GHA_7 compliance: No inputs allowed to prevent build manipulation

permissions:
  contents: write  # Allow committing pipeline outputs

jobs:
  run-pipeline:
    name: Execute Data Pipeline
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.pipeline.outputs.run_id }}
      status: ${{ steps.pipeline.outputs.status }}
      duration: ${{ steps.pipeline.outputs.duration }}
      performance_warning: ${{ steps.pipeline.outputs.performance_warning }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ ERROR: Missing Supabase credentials in GitHub Secrets"
            echo "Please add SUPABASE_URL and SUPABASE_ANON_KEY secrets"
            echo "See: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✓ Supabase credentials configured"

      - name: Run data pipeline with performance tracking
        id: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LOG_LEVEL: INFO
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          # Fixed input file path (no user parameters per CKV_GHA_7)
          INPUT_FILE="data/raw/sample_loans.csv"
          echo "🚀 Running optimized pipeline (43x faster transformation)"
          echo "Input: $INPUT_FILE"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }} via ${{ github.event_name }}"

          # Capture start time for benchmarking
          START_TIME=$(date +%s)

          python scripts/run_data_pipeline.py --input "$INPUT_FILE" 2>&1 | tee pipeline_run.log

          # Calculate execution time
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          # Extract run ID and status from logs
          RUN_ID=$(grep "Run ID:" pipeline_run.log | tail -1 | awk '{print $NF}')
          STATUS=$(grep "Status:" pipeline_run.log | tail -1 | awk '{print $NF}')

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT

          echo "✓ Pipeline completed in ${DURATION}s (Run ID: $RUN_ID)"

          # Performance check: Alert if pipeline is slower than expected (baseline: 4.5s for 10k records)
          if [ "$DURATION" -gt 10 ]; then
            echo "⚠️ Warning: Pipeline took ${DURATION}s (expected <10s)"
            echo "performance_warning=true" >> $GITHUB_OUTPUT
          fi

          if [ "$STATUS" != "SUCCESS" ]; then
            echo "❌ Pipeline failed with status: $STATUS"
            exit 1
          fi

      - name: Verify database writes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Verifying data written to Supabase..."
          python -c "
          from supabase import create_client
          import os
          from datetime import datetime

          supabase = create_client(
              os.getenv('SUPABASE_URL'),
              os.getenv('SUPABASE_ANON_KEY')
          )

          # Query today's KPI records
          today = datetime.now().date().isoformat()
          result = supabase.table('kpi_timeseries_daily') \
              .select('*') \
              .eq('run_date', today) \
              .execute()

          count = len(result.data)
          print(f'✓ Found {count} KPI records for today ({today})')

          if count == 0:
              print('⚠️ Warning: No records written to database today')
              exit(1)

          # Show sample KPIs
          kpi_names = [r['kpi_name'] for r in result.data[:5]]
          print(f'Sample KPIs: {', '.join(kpi_names)}')
          "

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ steps.pipeline.outputs.run_id }}
          path: |
            logs/
            pipeline_run.log
          retention-days: 30

      - name: Upload pipeline outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ steps.pipeline.outputs.run_id }}
          path: data/outputs/
          retention-days: 7

      - name: Commit pipeline outputs (optional)
        if: success() && github.event_name == 'schedule'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Only commit if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add data/outputs/
            git commit -m "chore: automated pipeline run ${{ steps.pipeline.outputs.run_id }}"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Send notification on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runDuration = '${{ steps.pipeline.outputs.duration }}' || 'N/A';
            const commitUrl = `https://github.com/${{ github.repository }}/commit/${{ github.sha }}`;
            const workflowUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Pipeline failed: Run ${{ steps.pipeline.outputs.run_id || 'UNKNOWN' }}`,
              body: `
              ## Pipeline Execution Failed

              **Run ID**: ${{ steps.pipeline.outputs.run_id || 'N/A' }}
              **Duration**: ${runDuration}s
              **Workflow**: ${{ github.workflow }}
              **Trigger**: ${{ github.event_name }}
              **Actor**: ${{ github.actor }}
              **Commit**: [${context.sha.slice(0, 7)}](${commitUrl})
              **Timestamp**: ${{ github.event.repository.updated_at }}

              ### Context
              - **Branch**: ${{ github.ref_name }}
              - **Repository**: ${{ github.repository }}
              - **Event**: \`${{ github.event_name }}\`

              ### Actions Required
              1. Review [workflow logs](${workflowUrl})
              2. Check Supabase credentials and connectivity
              3. Verify input data quality
              4. Review transformation logic changes

              ### Webhook Payload
              \`\`\`json
              ${JSON.stringify(context.payload, null, 2).slice(0, 500)}...
              \`\`\`
              `,
              labels: ['pipeline', 'automated', 'bug', 'priority:high']
            })

      - name: Report performance metrics
        if: success() && steps.pipeline.outputs.performance_warning == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const duration = '${{ steps.pipeline.outputs.duration }}';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Pipeline performance degradation detected`,
              body: `
              ## Performance Warning

              **Run ID**: ${{ steps.pipeline.outputs.run_id }}
              **Duration**: ${duration}s (expected: <10s)
              **Baseline**: 4.5s for 10,000 records
              **Slowdown**: ~${Math.round((duration / 4.5 - 1) * 100)}%

              ### Optimization Details
              Recent optimizations achieved:
              - ✅ Transformation phase: 43x faster (vectorized operations)
              - ✅ Full pipeline: 20% improvement
              - ✅ Memory: 30-40% reduction

              ### Possible Causes
              - Increased data volume beyond expected range
              - Network latency to Supabase
              - Resource contention on GitHub runner
              - Regression in transformation logic

              ### Recommended Actions
              1. Check input data size (expected: ~10k records)
              2. Review recent code changes for `.apply()` usage
              3. Run benchmark: \`pytest tests/pipeline/ -v --benchmark\`
              4. Consider Polars migration for >100k records

              See [OPTIMIZATION_REPORT.md](https://github.com/${{ github.repository }}/blob/main/OPTIMIZATION_REPORT.md) for details.
              `,
              labels: ['performance', 'monitoring', 'pipeline']
            })

      - name: Post success summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const duration = '${{ steps.pipeline.outputs.duration }}';
            const runId = '${{ steps.pipeline.outputs.run_id }}';

            // Post workflow summary
            await core.summary
              .addHeading('✅ Pipeline Execution Successful')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Run ID', runId],
                ['Duration', `${duration}s`],
                ['Trigger', '${{ github.event_name }}'],
                ['Actor', '${{ github.actor }}'],
                ['Commit', '${{ github.sha }}'.slice(0, 7)],
                ['Baseline', '4.5s (10k records)'],
                ['Performance', duration <= 10 ? '✅ Optimal' : '⚠️ Degraded']
              ])
              .addHeading('Optimizations Applied', 3)
              .addList([
                'Vectorized status normalization (10x faster)',
                'Vectorized DPD bucket assignment (100x faster)',
                'Vectorized amount tier classification (100x faster)',
                'Optimized type validation (fixed cell variable)'
              ])
              .addLink('View OPTIMIZATION_REPORT.md', `https://github.com/${{ github.repository }}/blob/main/OPTIMIZATION_REPORT.md`)
              .write()

  track-performance-metrics:
    name: Track Performance Metrics
    runs-on: ubuntu-latest
    needs: run-pipeline
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Record performance metrics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DURATION=${{ needs.run-pipeline.outputs.duration }}
          RUN_ID=${{ needs.run-pipeline.outputs.run_id }}

          echo "Recording performance: ${DURATION}s for run $RUN_ID"

          # Store performance metric in Supabase (if table exists)
          python -c "
          from supabase import create_client
          import os
          from datetime import datetime

          try:
              supabase = create_client(
                  os.getenv('SUPABASE_URL'),
                  os.getenv('SUPABASE_ANON_KEY')
              )

              # Insert performance metric
              result = supabase.table('pipeline_performance_metrics').insert({
                  'run_id': '$RUN_ID',
                  'duration_seconds': float('$DURATION'),
                  'commit_sha': '${{ github.sha }}',
                  'trigger': '${{ github.event_name }}',
                  'actor': '${{ github.actor }}',
                  'timestamp': datetime.now().isoformat(),
                  'optimizations_applied': [
                      'vectorized_status_normalization',
                      'vectorized_dpd_bucketing',
                      'vectorized_amount_tiers'
                  ],
                  'metadata': {
                      'github_run_id': '${{ github.run_id }}',
                      'github_ref': '${{ github.ref }}',
                      'baseline_duration': 4.5,
                      'optimization_date': '2026-01-31'
                  }
              }).execute()

              print('✓ Performance metric recorded')
          except Exception as e:
              print(f'Note: Could not record metric (table may not exist): {e}')
          " || echo "Skipping metric recording (optional)"

  dashboard-health-check:
    name: Verify Dashboard Accessibility
    runs-on: ubuntu-latest
    needs: run-pipeline

    steps:
      - name: Check dashboard endpoint
        run: |
          echo "Checking dashboard at http://4.248.240.207:8501"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://4.248.240.207:8501 || echo "000")

          if [ "$HTTP_CODE" == "200" ]; then
            echo "✓ Dashboard is accessible (HTTP $HTTP_CODE)"
          else
            echo "❌ Dashboard returned HTTP $HTTP_CODE"
            echo "Container may need to be restarted"
            exit 1
          fi

      - name: Send dashboard alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Dashboard health check failed',
              body: `
              ## Dashboard Unavailable

              The dashboard at http://4.248.240.207:8501 is not responding.

              **Possible causes**:
              - Azure container stopped
              - Network connectivity issues
              - Application crashed

              **Action required**: Check Azure Container Instances status
              `,
              labels: ['dashboard', 'production', 'bug']
            })

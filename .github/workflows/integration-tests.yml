name: Integration Tests (Optional)

# This workflow runs integration tests against real Supabase instances.
# It is OPTIONAL and can be triggered:
# - Manually via workflow_dispatch
# - On a daily schedule (2am UTC)
# - On pushes to main (optional)
#
# Integration tests are NOT required for PR merges.
# They validate real database connectivity and schema integrity.

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions UI
    inputs:
      test_target:
        description: 'Test target (all or specific test file)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - historical_kpis

  # Optional: Run daily at 2am UTC
  schedule:
    - cron: '0 2 * * *'

  # Optional: Run on main branch pushes
  # push:
  #   branches: [main]
  #   paths:
  #     - 'tests/integration/**'
  #     - 'python/multi_agent/historical_*.py'

jobs:
  integration-tests:
    name: Real Supabase Integration Tests
    runs-on: ubuntu-latest

    # Minimal permissions: read contents, write issues (for PR comments)
    permissions:
      contents: read
      issues: write
      pull-requests: write

    # Run on manual trigger or scheduled runs (secrets must be configured)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    strategy:
      matrix:
        python-version: ['3.11']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest pytest-asyncio pytest-timeout requests

      - name: Verify Supabase credentials
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "❌ SUPABASE_URL or SUPABASE_ANON_KEY not configured"
            echo "Integration tests require Supabase credentials"
            echo "Configure them in repository secrets to enable integration tests"
            exit 1
          fi
          echo "✅ Supabase credentials configured"

      - name: Run Historical KPIs integration tests
        if: inputs.test_target == 'all' || inputs.test_target == 'historical_kpis' || github.event_name != 'workflow_dispatch'
        env:
          RUN_REAL_SUPABASE_TESTS: '1'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_HISTORICAL_KPI_TABLE: 'historical_kpis'
        run: |
          echo "🧪 Running Historical KPIs integration tests..."
          mkdir -p test-results
          pytest tests/integration/test_historical_kpis_real.py \
            -v \
            --timeout=60 \
            --tb=short \
            -m integration \
            --junitxml=test-results/junit.xml \
            --log-file=pytest.log \
            || (echo "❌ Integration tests failed" && exit 1)
          echo "✅ Integration tests passed"

      - name: Test summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All integration tests passed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some integration tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Environment:**" >> $GITHUB_STEP_SUMMARY
          echo "- Python: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Supabase: Connected" >> $GITHUB_STEP_SUMMARY
          echo "- Test Suite: Integration (Real Database)" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: integration-test-results-py${{ matrix.python-version }}
          path: |
            pytest.log
            test-results/
          retention-days: 30

      - name: Comment on PR (if triggered from PR)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const body = `## Integration Test Results ${status}

            **Test Suite:** Real Supabase Integration Tests
            **Python Version:** ${{ matrix.python-version }}
            **Status:** ${status === '✅' ? 'Passed' : 'Failed'}

            Integration tests validate:
            - Real Supabase database connectivity
            - Historical KPIs table schema
            - Query performance (< 500ms SLO)
            - Data integrity constraints

            _Note: Integration tests are optional and not required for PR merge._`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Notification job for scheduled runs
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: integration-tests
    if: failure() && github.event_name == 'schedule'

    # Minimal permissions: write issues
    permissions:
      issues: write

    steps:
      - name: Create issue for failed integration tests
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const title = '🚨 Scheduled Integration Tests Failed';
            const body = `## Integration Test Failure Report

            **Date:** ${new Date().toISOString()}
            **Workflow:** ${context.workflow}
            **Run:** ${context.runNumber}

            The scheduled integration tests against Supabase failed.

            ### Action Required:
            1. Review workflow logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            2. Check Supabase connectivity and credentials
            3. Verify historical_kpis table schema
            4. Re-run tests manually if needed

            ### Auto-generated by workflow
            _This issue was automatically created by the Integration Tests workflow._`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['ci', 'integration-tests', 'automated']
            });

name: Deploy verification (manual)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to verify (leave empty for default)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  # Default target URL for deployment verification
  TARGET_URL: https://jolly-moss-01599020f2.azurestaticapps.net/

jobs:
  verify:
    name: Verify deployed middleware mitigation
    runs-on: ubuntu-latest
    steps:
      - name: Set target URL
        id: set-url
        run: |
          # Use workflow input if provided, otherwise use default from env
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "TARGET_URL=${{ inputs.target_url }}" >> "$GITHUB_ENV"
            echo "Using custom TARGET_URL: ${{ inputs.target_url }}"
          else
            echo "Using default TARGET_URL: ${{ env.TARGET_URL }}"
          fi

      - name: Run quick header spoofing and secret checks
        run: |
          set -euo pipefail
          echo "Verifying middleware mitigation against $TARGET_URL"

          echo "1) Spoof header without secret (expect 403)"
          resp=$(curl -s -o /dev/null -w "%{http_code}" -H 'x-middleware-subrequest: 1' "$TARGET_URL") || true
          echo "status: $resp"
          if [ "$resp" != "403" ]; then
            echo "ERROR: Expected 403 for spoofed header without secret (got $resp)"
            exit 2
          fi

          echo "2) Spoof header WITH secret (expect non-403)"
          if [ -z "${MIDDLEWARE_SHARED_SECRET:-}" ]; then
            echo "MIDDLEWARE_SHARED_SECRET not set in repo secrets; please add and re-run"
            exit 3
          fi
          header_file=$(mktemp)
          printf 'header = "x-internal-shared-secret: %s"\n' "$MIDDLEWARE_SHARED_SECRET" > "$header_file"
          resp2=$(curl -s -o /dev/null -w "%{http_code}" -H 'x-middleware-subrequest: 1' -K "$header_file" "$TARGET_URL") || true
          rm -f "$header_file"
          echo "status: $resp2"
          if [ "$resp2" = "403" ]; then
            echo "ERROR: Secret did not allow request (received 403)"
            exit 4
          fi

          echo "Verification succeeded (spoof blocked, secret allowed)"
        env:
          MIDDLEWARE_SHARED_SECRET: ${{ secrets.MIDDLEWARE_SHARED_SECRET }}

name: Operations Dashboard
"on":
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:

env:
  SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  operations-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa  # v4.2.2
      - name: Setup Python Environment
        uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Operations Analysis
        if: hashFiles('scripts/operations_dashboard.py') != ''
        run: |
          python scripts/operations_dashboard.py

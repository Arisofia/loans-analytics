name: KPI tests

on:
  push:
    paths:
      - 'src/kpis/**'
      - 'tests/test_kpis_*.py'
      - 'tests/test_api_kpis.py'
  pull_request:
    paths:
      - 'src/kpis/**'
      - 'tests/test_kpis_*.py'
      - 'tests/test_api_kpis.py'

jobs:
  kpi-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KPI tests
        run: |
          pytest -q tests/test_kpis* tests/test_api_kpis.py

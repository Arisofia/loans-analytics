name: KPI tests

on:
    push:
        paths:
            - "src/kpis/**"
            - "tests/test_kpis_*.py"
            - "tests/test_manifest_segmentation.py"
            - "tests/test_api_kpis.py"
    pull_request:
        paths:
            - "src/kpis/**"
            - "tests/test_kpis_*.py"
            - "tests/test_api_kpis.py"

permissions:
    contents: read
    issues: write

concurrency:
    group: kpi-tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    kpi-tests:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                test-path:
                    - "tests/test_kpis*"
                    - "tests/test_manifest_segmentation.py"
                    - "tests/test_api_kpis.py"
            fail-fast: false
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Show changed files (debug)
              run: |
                  echo "Event: $GITHUB_EVENT_NAME"
                  git --no-pager diff --name-only ${{ github.sha }}^ ${{ github.sha }} || true

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

- name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-venv-

      - name: Install dependencies (create venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KPI tests (matrix)
        run: |
          echo "Running test: ${{ matrix.test-path }}"
          . .venv/bin/activate
          pytest -q ${{ matrix.test-path }}

  kpi-summary:
    needs: kpi-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post KPI summary comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request context; skipping comment');
              return;
            }
            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = `<!-- KPI_TEST_SUMMARY -->\n**KPI tests** ran in *parallel (matrix)* with pip + .venv caching enabled. Expected speedup per job: **~30–60s**.\n\nTests executed: \`tests/test_kpis*\`, \`tests/test_manifest_segmentation.py\`, \`tests/test_api_kpis.py\`.\n\nIf you'd like further CI optimizations (wheelhouse caching, split unit/integration jobs), reply here or request changes.`;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = comments.find(c => c.body && c.body.includes('<!-- KPI_TEST_SUMMARY -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

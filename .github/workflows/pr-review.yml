name: PR Review - Python QA & AI Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  python-qa:
    name: Python Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Lint with Ruff
        run: ruff check . || echo "::warning::Ruff found issues"
        continue-on-error: true

      - name: Format check with Black
        run: black --check . || echo "::warning::Black found formatting issues"
        continue-on-error: true

      - name: Sort imports with isort
        run: isort --check-only . || echo "::warning::isort found import sorting issues"
        continue-on-error: true

      - name: Lint with Flake8
        run: |
          if [ -d src ] || [ -d python ] || [ -d streamlit_app ]; then
            flake8 $(find . -maxdepth 1 -type d -name 'src' -o -name 'python' -o -name 'streamlit_app' 2>/dev/null) || echo "::warning::Flake8 found issues"
          else
            flake8 . || echo "::warning::Flake8 found issues"
          fi
        continue-on-error: true

      - name: Type check with mypy
        run: |
          if [ -d src ] || [ -d python ]; then
            mypy $(find . -maxdepth 1 -type d -name 'src' -o -name 'python' 2>/dev/null) || echo "::warning::mypy found type issues"
          else
            mypy . || echo "::warning::mypy found type issues"
          fi
        continue-on-error: true

      - name: Run tests with pytest
        run: pytest --cov --cov-report=xml --cov-report=term
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      - name: Generate QA Summary
        if: always()
        run: |
          echo "## Python QA Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Quality checks completed for PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the logs above for detailed results from:" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff (linting)" >> $GITHUB_STEP_SUMMARY
          echo "- Black (formatting)" >> $GITHUB_STEP_SUMMARY
          echo "- isort (import sorting)" >> $GITHUB_STEP_SUMMARY
          echo "- Flake8 (style)" >> $GITHUB_STEP_SUMMARY
          echo "- mypy (type checking)" >> $GITHUB_STEP_SUMMARY
          echo "- pytest (tests & coverage)" >> $GITHUB_STEP_SUMMARY

  sonarqube-scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check SonarQube secrets
        id: check-sonar
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN not configured - skipping SonarQube scan"
          fi

      - name: Install Python dependencies
        if: steps.check-sonar.outputs.secrets_available == 'true'
        run: pip install -r requirements.txt

      - name: SonarQube Scan
        if: steps.check-sonar.outputs.secrets_available == 'true'
        uses: SonarSource/sonarcloud-github-action@v2.0.0
        with:
          projectBaseDir: .
          args: >
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  ai-review-coderabbit:
    name: CodeRabbit AI Review
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CodeRabbit token
        id: check-coderabbit
        run: |
          if [ -n "${{ secrets.CODERABBIT_TOKEN }}" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CODERABBIT_TOKEN not configured - skipping CodeRabbit review"
          fi

      - name: Run CodeRabbit AI Review
        if: steps.check-coderabbit.outputs.secrets_available == 'true'
        uses: coderabbitai/ai-pr-reviewer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}
        continue-on-error: true

  ai-review-sourcery:
    name: Sourcery AI Refactoring
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Sourcery token
        id: check-sourcery
        run: |
          if [ -n "${{ secrets.SOURCERY_TOKEN }}" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SOURCERY_TOKEN not configured - skipping Sourcery review"
          fi

      - name: Run Sourcery AI Review
        if: steps.check-sourcery.outputs.secrets_available == 'true'
        uses: sourcery-ai/sourcery-action@v1
        with:
          token: ${{ secrets.SOURCERY_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  ai-review-gemini:
    name: Gemini AI Review
    needs: python-qa
    if: always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false
    uses: ./.github/workflows/gemini_pr_review.yml
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
      pr_number: ${{ github.event.pull_request.number }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      gemini_model: ${{ vars.GEMINI_MODEL || 'gemini-1.5-pro' }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_SIMPLE || secrets.GEMINI_API_KEY }}

  ai-review-codex:
    name: OpenAI Codex Review
    needs: python-qa
    if: always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false
    uses: ./.github/workflows/codex_pull_request_review.yml
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  ai-review-perplexity:
    name: Perplexity AI Analysis
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Perplexity API key
        id: check-perplexity
        run: |
          if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PERPLEXITY_API_KEY not configured - skipping Perplexity review"
          fi

      - name: Get PR diff
        if: steps.check-perplexity.outputs.secrets_available == 'true'
        id: get-diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Perplexity AI Analysis
        if: steps.check-perplexity.outputs.secrets_available == 'true' && steps.get-diff.outputs.diff_size > 0
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt | head -c 8000)
          MODEL="${{ vars.PERPLEXITY_MODEL || 'llama-3.1-sonar-small-128k-online' }}"
          RESPONSE=$(curl -s -X POST \
            https://api.perplexity.ai/chat/completions \
            -H "Authorization: Bearer ${{ secrets.PERPLEXITY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "'"$MODEL"'",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a fintech code reviewer. Analyze PRs for bugs, security risks, compliance issues, and growth opportunities. Be concise."
                },
                {
                  "role": "user",
                  "content": "Analyze this PR diff for fintech risks and improvements:\n\n'"$DIFF_CONTENT"'"
                }
              ]
            }')

          echo "$RESPONSE" | jq -r \
            '.choices[0].message.content // "No analysis available"' \
            > analysis.txt

          if [ -s analysis.txt ]; then
            echo "## 🤖 Perplexity AI Analysis" > comment.md
            echo "" >> comment.md
            cat analysis.txt >> comment.md
            gh pr comment ${{ github.event.pull_request.number }} \
              --body-file comment.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  pr-summary:
    name: PR Review Summary
    runs-on: ubuntu-latest
    needs: [python-qa, sonarqube-scan, ai-review-coderabbit, ai-review-sourcery, ai-review-gemini, ai-review-codex, ai-review-perplexity]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Generate Summary Comment
        uses: actions/github-script@v7
        with:
          script: |
            const qaResult = '${{ needs.python-qa.result }}';
            const sonarResult = '${{ needs.sonarqube-scan.result }}';
            const coderabbitResult = '${{ needs.ai-review-coderabbit.result }}';
            const sourceryResult = '${{ needs.ai-review-sourcery.result }}';
            const geminiResult = '${{ needs.ai-review-gemini.result }}';
            const codexResult = '${{ needs.ai-review-codex.result }}';
            const perplexityResult = '${{ needs.ai-review-perplexity.result }}';

            const summary = `## 🎯 PR Review Complete

            **Python QA**: ${qaResult === 'success' ? '✅ Passed' : '⚠️ Review needed'}
            **SonarQube**: ${sonarResult === 'success' ? '✅ Analyzed' : sonarResult === 'skipped' ? '⏭️ Skipped' : '⚠️ Issues found'}
            **CodeRabbit**: ${coderabbitResult === 'success' ? '✅ Reviewed' : coderabbitResult === 'skipped' ? '⏭️ Skipped' : '⚠️ Check comments'}
            **Sourcery**: ${sourceryResult === 'success' ? '✅ Reviewed' : sourceryResult === 'skipped' ? '⏭️ Skipped' : '⚠️ Check comments'}
            **Gemini**: ${geminiResult === 'success' ? '✅ Reviewed' : geminiResult === 'skipped' ? '⏭️ Skipped' : '⚠️ Check comments'}
            **Codex**: ${codexResult === 'success' ? '✅ Reviewed' : codexResult === 'skipped' ? '⏭️ Skipped' : '⚠️ Check comments'}
            **Perplexity**: ${perplexityResult === 'success' ? '✅ Analyzed' : perplexityResult === 'skipped' ? '⏭️ Skipped' : '⚠️ Check comments'}

            All automated reviews and quality checks have been completed. Please review the feedback from each tool above.

            *This is an automated production-ready PR workflow for fintech compliance and code quality.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

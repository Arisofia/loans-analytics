name: PR Review - Python QA & AI Analysis

# This is a CONSOLIDATED workflow that combines Python QA and AI analysis.
# It intentionally duplicates checks from ci.yml, ai_pr_review.yml, coderabbit_pr_review.yml,
# and perplexity_review.yml to provide a unified PR review experience.
# If enabling this workflow, consider disabling the individual workflows to avoid duplication.

on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  python-qa:
    name: Python Quality Assurance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install QA tools
          pip install black isort ruff flake8 mypy pytest pytest-cov
          # Install project dependencies
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Lint with Ruff
        run: ruff check . 2>&1 | tee ruff.log

      - name: Format check with Black
        run: black --check .

      - name: Sort imports with isort
        run: isort --check-only .

      - name: Lint with Flake8
        run: |
          if [ -d src ] || [ -d python ] || [ -d streamlit_app ]; then
            TARGETS=$(
              find . -maxdepth 1 -type d \( -name 'src' -o -name 'python' \
              -o -name 'streamlit_app' \) 2>/dev/null
            )
            flake8 $TARGETS
          else
            flake8 .
          fi

      - name: Type check with mypy
        run: |
          if [ -d src ] || [ -d python ]; then
            TARGETS=$(find . -maxdepth 1 -type d \( -name 'src' -o -name 'python' \) 2>/dev/null)
            mypy $TARGETS
          else
            mypy .
          fi

      - name: Run tests with pytest
        run: |
          # Only run pytest if pytest-style test files are present
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            if python -m pytest --cov --version >/dev/null 2>&1; then
              pytest --cov --cov-report=xml --cov-report=term 2>&1
            elif command -v pytest >/dev/null 2>&1; then
              pytest 2>&1
            else
              echo "::error::pytest not available"
              exit 1
            fi
          else
            echo "::notice::No pytest-compatible test files were found; skipping pytest run."
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Generate QA Summary
        if: always()
        run: |
          echo "## Python QA Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Quality checks completed for PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the logs above for detailed results from:" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff (linting)" >> $GITHUB_STEP_SUMMARY
          echo "- Black (formatting)" >> $GITHUB_STEP_SUMMARY
          echo "- isort (import sorting)" >> $GITHUB_STEP_SUMMARY
          echo "- Flake8 (style)" >> $GITHUB_STEP_SUMMARY
          echo "- mypy (type checking)" >> $GITHUB_STEP_SUMMARY
          echo "- pytest (tests & coverage)" >> $GITHUB_STEP_SUMMARY

  sonarqube-scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
    env:
      SONAR_HOST_URL: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b  # v4.5.0
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Check SonarQube secrets
        id: check-sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN not configured - skipping SonarQube scan"
          fi

      - name: Install Python dependencies
        if: steps.check-sonar.outputs.secrets_available == 'true'
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: SonarQube Scan
        if: steps.check-sonar.outputs.secrets_available == 'true'
        uses: SonarSource/sonarcloud-github-action@v4
        with:
          projectBaseDir: .
          args: >
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ai-review-coderabbit:
    name: CodeRabbit AI Review
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check CodeRabbit token
        id: check-coderabbit
        env:
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}
        run: |
          if [ -n "$CODERABBIT_TOKEN" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CODERABBIT_TOKEN not configured - skipping CodeRabbit review"
          fi

      - name: Run CodeRabbit AI PR Review
        if: steps.check-coderabbit.outputs.secrets_available == 'true'
        uses: coderabbitai/ai-pr-reviewer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}


  ai-review-perplexity:
    name: Perplexity AI Analysis
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    env:
      PERPLEXITY_MODEL: sonar-pro
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check Perplexity API key
        id: check-perplexity
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PERPLEXITY_API_KEY not configured - skipping Perplexity review"
          fi

      - name: Get PR diff
        if: steps.check-perplexity.outputs.secrets_available == 'true'
        id: get-diff
        run: |
          # Fetch the base branch and compute the diff against HEAD, similar to perplexity_review.yml
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff "origin/${{ github.event.pull_request.base.ref }}"...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Perplexity AI Analysis
        if: steps.check-perplexity.outputs.secrets_available == 'true'
        run: |
          DIFF_SIZE="${{ steps.get-diff.outputs.diff_size }}"
          if [ -n "$DIFF_SIZE" ] && \
             echo "$DIFF_SIZE" | grep -Eq '^[0-9]+$' && \
             [ "$DIFF_SIZE" -gt 0 ] && [ "$DIFF_SIZE" -lt 50000 ]; then
            # Use jq to properly construct JSON payload (same approach as existing perplexity_review.yml)
            DIFF_TEXT=$(cat pr_diff.txt | head -c 50000)
            MODEL="${PERPLEXITY_MODEL}"

            jq -n --arg diff "$DIFF_TEXT" --arg model "$MODEL" \
              '{
                model: $model,
                messages: [
                  {
                    role: "system",
                    content: >
                      You are a fintech code reviewer. Analyze PRs for bugs,
                      security risks, compliance issues, and growth opportunities.
                      Be concise.
                  },
                  {
                    role: "user",
                    content: $diff
                  }
                ]
              }' > request.json

            HTTP_CODE=$(curl -s -S -w "%{http_code}" -o review_response.json -X POST \
              "https://api.perplexity.ai/chat/completions" \
              -H "Authorization: Bearer ${{ secrets.PERPLEXITY_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d @request.json)

            if [ "$HTTP_CODE" = "200" ] && jq empty review_response.json 2>/dev/null; then
              review_text=$(jq -r '.choices[0].message.content // "No analysis available"' review_response.json)
              if [ -n "$review_text" ] && [ "$review_text" != "No analysis available" ]; then
                PR_NUMBER="${{ github.event.pull_request.number }}"
                if echo "$PR_NUMBER" | grep -Eq '^[0-9]+$'; then
                  # Sanitize review text to reduce risk of markdown/HTML injection
                  # HTML-escape special characters and render inside a <pre><code> block
                  sanitized_review=$(
                    printf '%s' "$review_text" | sed \
                      -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
                  )
                  {
                    echo "## 🤖 Perplexity AI Analysis"
                    echo ""
                    echo '<pre><code>'
                    printf '%s\n' "$sanitized_review"
                    echo '</code></pre>'
                  } > comment.md
                  if command -v gh >/dev/null 2>&1; then
                    gh pr comment "$PR_NUMBER" --body-file comment.md
                  else
                    echo "::warning::gh CLI not found on runner - skipping Perplexity comment"
                  fi
                else
                  echo "::warning::Invalid pull request number: $PR_NUMBER - skipping Perplexity comment"
                fi
              fi
            else
              echo "::warning::Perplexity API returned status $HTTP_CODE"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-summary:
    name: PR Review Summary
    runs-on: ubuntu-latest
    needs:
      [python-qa, sonarqube-scan, ai-review-coderabbit, ai-review-perplexity]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Generate Summary Comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const qaResult = '${{ needs.python-qa.result }}';
            const sonarResult = '${{ needs.sonarqube-scan.result }}';
            const coderabbitResult = '${{ needs.ai-review-coderabbit.result }}';
            const perplexityResult = '${{ needs.ai-review-perplexity.result }}';

            // Helper to format result status
            const formatResult = (status, successEmoji, failureEmoji, skipEmoji) => {
              if (status === 'success') return successEmoji + ' Passed/Analyzed/Reviewed';
              if (status === 'failure') return failureEmoji + ' Failed';
              if (status === 'skipped') return skipEmoji + ' Skipped';
              return '⚠️ Check logs';
            };

            const pyQAStatus = formatResult(qaResult, '✅', '❌', '⏭️');
            const sonarStatus = formatResult(sonarResult, '✅', '❌', '⏭️');
            const crStatus = formatResult(coderabbitResult, '✅', '❌', '⏭️');
            const perpStatus = formatResult(perplexityResult, '✅', '❌', '⏭️');

            const summary = `## 🎯 PR Review Complete

            **Python QA**: ${pyQAStatus}
            **SonarQube**: ${sonarStatus}
            **CodeRabbit**: ${crStatus}
            **Perplexity**: ${perpStatus}

            The automated reviews and quality checks above have either completed or were
            skipped based on current configuration. Please review feedback from each tool.

            *This is an automated production-ready PR workflow for fintech compliance.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

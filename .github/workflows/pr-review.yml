name: PR Review - Python QA & AI Analysis

# This is a CONSOLIDATED workflow that combines Python QA and AI analysis.
# It intentionally duplicates checks from ci.yml, ai_pr_review.yml, coderabbit_pr_review.yml,
# and perplexity_review.yml to provide a unified PR review experience.
# If enabling this workflow, consider disabling the individual workflows to avoid duplication.

on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  python-qa:
    name: Python Quality Assurance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install QA tools
          pip install black isort ruff flake8 mypy pytest pytest-cov
          # Install project dependencies
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Lint with Ruff
        run: ruff check . 2>&1 | tee ruff.log || echo "::warning::Ruff found issues"
        continue-on-error: true

      - name: Format check with Black
        run: black --check . 2>&1 | tee black.log || echo "::warning::Black found formatting issues"
        continue-on-error: true

      - name: Sort imports with isort
        run: isort --check-only . 2>&1 | tee isort.log || echo "::warning::isort found import sorting issues"
        continue-on-error: true

      - name: Lint with Flake8
        run: |
          if [ -d src ] || [ -d python ] || [ -d streamlit_app ]; then
            flake8 $(find . -maxdepth 1 -type d \( -name 'src' -o -name 'python' -o -name 'streamlit_app' \) 2>/dev/null) 2>&1 | tee flake8.log || echo "::warning::Flake8 found issues"
          else
            flake8 . 2>&1 | tee flake8.log || echo "::warning::Flake8 found issues"
          fi
        continue-on-error: true

      - name: Type check with mypy
        run: |
          if [ -d src ] && [ -d python ]; then
            mypy src python 2>&1 | tee mypy.log || echo "::warning::mypy found type issues"
          elif [ -d src ]; then
            mypy src 2>&1 | tee mypy.log || echo "::warning::mypy found type issues"
          elif [ -d python ]; then
            mypy python 2>&1 | tee mypy.log || echo "::warning::mypy found type issues"
          else
            mypy . 2>&1 | tee mypy.log || echo "::warning::mypy found type issues"
          fi
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          if python -m pytest --cov --version &>/dev/null 2>&1; then
            pytest --cov --cov-report=xml --cov-report=term 2>&1 || echo "::warning::pytest found test failures"
          elif command -v pytest &> /dev/null; then
            pytest 2>&1 || echo "::warning::pytest found test failures"
          else
            echo "::warning::pytest not available"
          fi
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      - name: Generate QA Summary
        if: always()
        run: |
          echo "## Python QA Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Quality checks completed for PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the logs above for detailed results from:" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff (linting)" >> $GITHUB_STEP_SUMMARY
          echo "- Black (formatting)" >> $GITHUB_STEP_SUMMARY
          echo "- isort (import sorting)" >> $GITHUB_STEP_SUMMARY
          echo "- Flake8 (style)" >> $GITHUB_STEP_SUMMARY
          echo "- mypy (type checking)" >> $GITHUB_STEP_SUMMARY
          echo "- pytest (tests & coverage)" >> $GITHUB_STEP_SUMMARY

  sonarqube-scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check SonarQube secrets
        id: check-sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN not configured - skipping SonarQube scan"
          fi

      - name: Install Python dependencies
        if: steps.check-sonar.outputs.secrets_available == 'true'
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: SonarQube Scan
        if: steps.check-sonar.outputs.secrets_available == 'true'
        uses: SonarSource/sonarcloud-github-action@v2.0.0
        with:
          projectBaseDir: .
          args: >
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  ai-review-coderabbit:
    name: CodeRabbit AI Review
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CodeRabbit token
        id: check-coderabbit
        env:
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}
        run: |
          if [ -n "$CODERABBIT_TOKEN" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CODERABBIT_TOKEN not configured - skipping CodeRabbit review"
          fi

      - name: Run CodeRabbit AI PR Review
        if: steps.check-coderabbit.outputs.secrets_available == 'true'
        uses: coderabbitai/ai-pr-reviewer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}
  ai-review-sourcery:
    name: Sourcery AI Refactoring
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Sourcery token
        id: check-sourcery
        env:
          SOURCERY_TOKEN: ${{ secrets.SOURCERY_TOKEN }}
        run: |
          if [ -n "$SOURCERY_TOKEN" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SOURCERY_TOKEN not configured - skipping Sourcery review"
          fi

      - name: Run Sourcery AI Review
        if: steps.check-sourcery.outputs.secrets_available == 'true'
        uses: sourcery-ai/sourcery-action@v1
        with:
          token: ${{ secrets.SOURCERY_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  ai-review-gemini:
    name: Gemini AI Review
    needs: python-qa
    if: always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/gemini_pr_review.yml
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      gemini_model: ${{ vars.GEMINI_MODEL || 'gemini-1.5-pro' }}
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_SIMPLE }}

  ai-review-codex:
    name: OpenAI Codex Review
    needs: python-qa
    if: always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/codex_pull_request_review.yml
    with:
      is_fork: ${{ github.event.pull_request.head.repo.fork }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  ai-review-perplexity:
    name: Perplexity AI Analysis
    runs-on: ubuntu-latest
    needs: python-qa
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Perplexity API key
        id: check-perplexity
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PERPLEXITY_API_KEY not configured - skipping Perplexity review"
          fi

      - name: Get PR diff
        if: steps.check-perplexity.outputs.secrets_available == 'true'
        id: get-diff
        run: |
          # Fetch the base branch and compute the diff against HEAD, similar to perplexity_review.yml
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff "origin/${{ github.base_ref }}"...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Perplexity AI Analysis
        if: steps.check-perplexity.outputs.secrets_available == 'true'
        run: |
          DIFF_SIZE="${{ steps.get-diff.outputs.diff_size }}"
          if [ -n "$DIFF_SIZE" ] && echo "$DIFF_SIZE" | grep -Eq '^[0-9]+$' && [ "$DIFF_SIZE" -gt 0 ] && [ "$DIFF_SIZE" -lt 50000 ]; then
            # Use jq to properly construct JSON payload (same approach as existing perplexity_review.yml)
            DIFF_TEXT=$(cat pr_diff.txt | head -c 10000)
            MODEL="${{ vars.PERPLEXITY_MODEL || 'sonar-pro' }}"

            jq -n --arg diff "$DIFF_TEXT" --arg model "$MODEL" \
              '{
                model: $model,
                messages: [
                  {
                    role: "system",
                    content: "You are a fintech code reviewer. Analyze PRs for bugs, security risks, compliance issues, and growth opportunities. Be concise."
                  },
                  {
                    role: "user",
                    content: $diff
                  }
                ]
              }' > request.json

            HTTP_CODE=$(curl -s -S -w "%{http_code}" -o review_response.json -X POST \
              "https://api.perplexity.ai/chat/completions" \
              -H "Authorization: Bearer ${{ secrets.PERPLEXITY_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d @request.json)

            if [ "$HTTP_CODE" = "200" ] && jq empty review_response.json 2>/dev/null; then
              review_text=$(jq -r '.choices[0].message.content // "No analysis available"' review_response.json)
              if [ -n "$review_text" ] && [ "$review_text" != "No analysis available" ]; then
                echo "## 🤖 Perplexity AI Analysis" > comment.md
                echo "" >> comment.md
                echo "$review_text" >> comment.md
                gh pr comment ${{ github.event.pull_request.number }} \
                  --body-file comment.md
              fi
            else
              echo "::warning::Perplexity API returned status $HTTP_CODE"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  pr-summary:
    name: PR Review Summary
    runs-on: ubuntu-latest
    needs: [python-qa, sonarqube-scan, ai-review-coderabbit, ai-review-sourcery, ai-review-gemini, ai-review-codex, ai-review-perplexity]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Generate Summary Comment
        uses: actions/github-script@v7
        with:
          script: |
            const qaResult = '${{ needs.python-qa.result }}';
            const sonarResult = '${{ needs.sonarqube-scan.result }}';
            const coderabbitResult = '${{ needs.ai-review-coderabbit.result }}';
            const sourceryResult = '${{ needs.ai-review-sourcery.result }}';
            const geminiResult = '${{ needs.ai-review-gemini.result }}';
            const codexResult = '${{ needs.ai-review-codex.result }}';
            const perplexityResult = '${{ needs.ai-review-perplexity.result }}';

            const summary = `## 🎯 PR Review Complete

            **Python QA**: ${qaResult === 'success' ? '✅ Passed' : qaResult === 'failure' ? '❌ Failed' : '⚠️ Review needed'}
            **SonarQube**: ${sonarResult === 'success' ? '✅ Analyzed' : sonarResult === 'skipped' ? '⏭️ Skipped' : sonarResult === 'failure' ? '❌ Failed' : '⚠️ Check logs'}
            **CodeRabbit**: ${coderabbitResult === 'success' ? '✅ Reviewed' : coderabbitResult === 'skipped' ? '⏭️ Skipped' : coderabbitResult === 'failure' ? '❌ Failed' : '⚠️ Check logs'}
            **Sourcery**: ${sourceryResult === 'success' ? '✅ Reviewed' : sourceryResult === 'skipped' ? '⏭️ Skipped' : sourceryResult === 'failure' ? '❌ Failed' : '⚠️ Check logs'}
            **Gemini**: ${geminiResult === 'success' ? '✅ Reviewed' : geminiResult === 'skipped' ? '⏭️ Skipped' : geminiResult === 'failure' ? '❌ Failed' : '⚠️ Check logs'}
            **Codex**: ${codexResult === 'success' ? '✅ Reviewed' : codexResult === 'skipped' ? '⏭️ Skipped' : codexResult === 'failure' ? '❌ Failed' : '⚠️ Check logs'}
            **Perplexity**: ${perplexityResult === 'success' ? '✅ Analyzed' : perplexityResult === 'skipped' ? '⏭️ Skipped' : perplexityResult === 'failure' ? '❌ Failed' : '⚠️ Check logs'}

            The automated reviews and quality checks listed above have either completed or were skipped based on the current configuration. Please review any available feedback from each tool.

            *This is an automated production-ready PR workflow for fintech compliance and code quality.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });


on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'data/raw/*.xls*'

jobs:
  kpi-extraction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas openpyxl
        continue-on-error: true
        run: |
      - name: Show extracted KPIs (if available)
        continue-on-error: true
        run: |
          if [ -f exports/kpi_results.json ]; then
            cat exports/kpi_results.json
          else
            echo "KPI results file not generated (no data processed)"
          fi
        continue-on-error: true
        env:
        with:
          status: ${{ job.status }}
          fields: workflow,job,commit,repo,author
          msg: |
            Workflow: ${{ github.workflow }}
            Commit: ${{ github.sha }}
            See details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

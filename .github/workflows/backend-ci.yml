name: Backend Verification (Postgres service container)

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'supabase/migrations/**'
  push:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps (psql client)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt -r dev-requirements.txt || pip install -r requirements.txt
          else
            pip install -r dev-requirements.txt
          fi

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be healthy..."
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && break || sleep 2
          done

      - name: Export DATABASE_URL
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> $GITHUB_ENV

      - name: Apply SQL migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run backend tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          pytest -q tests -k "not e2e" --maxfail=1

      - name: Upload pytest results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: ./pytest-report/
          retention-days: 30

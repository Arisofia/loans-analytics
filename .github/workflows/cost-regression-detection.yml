name: Cost Regression Detection

on:
  pull_request:
    paths:
      - 'src/agents/**'
      - 'tests/agents/**'
      - 'config/cost_baselines.yml'

jobs:
  cost-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install PyYAML

      - name: Run cost benchmarks
        run: |
          python scripts/benchmark_costs.py --output cost_report.json

      - name: Compare to baseline
        id: compare
        run: |
          python scripts/compare_costs.py cost_report.json --threshold 0.10
        continue-on-error: true

      - name: Generate cost comment
        run: |
          python scripts/post_cost_comment.py cost_report.json > cost_comment.md

      - name: Comment cost analysis on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('cost_comment.md', 'utf8');

            // Find existing cost comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const costComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Cost Analysis Report')
            );

            if (costComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: costComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Upload cost report artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: cost-report
          path: cost_report.json
          retention-days: 30

      - name: Fail if cost regression detected
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error::Cost regression detected! Review the cost analysis comment."
          exit 1

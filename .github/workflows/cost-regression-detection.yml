name: Cost Regression Detection

on:
  pull_request:
    paths:
      - "src/agents/**"
      - "tests/agents/**"
      - "config/cost_baselines.yml"

jobs:
  cost-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@2a3af1b1dde7a068b44c712feead7d94d4fe19fa # v4.2.2

      - uses: actions/setup-python@fe75d2dea0e804b9c2cf7c1fe0718524504cc6e3 # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install PyYAML

      - name: Run cost benchmarks
        run: |
          python scripts/benchmark_costs.py --output cost_report.json

      - name: Compare to baseline
        id: compare
        run: |
          python scripts/compare_costs.py cost_report.json --threshold 0.10
        continue-on-error: true

      - name: Generate cost comment
        run: |
          python scripts/post_cost_comment.py cost_report.json > cost_comment.md

      - name: Comment cost analysis on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('cost_comment.md', 'utf8');

            // Find existing cost comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const costComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Cost Analysis Report')
            );

            if (costComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: costComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Upload cost report artifact
        uses: actions/upload-artifact@250e9d8087e4d33cdf6c33e180d803782f68fdb1 # v4.4.3
        with:
          name: cost-report
          path: cost_report.json
          retention-days: 30

      - name: Fail if cost regression detected
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error::Cost regression detected! Review the cost analysis comment."
          exit 1

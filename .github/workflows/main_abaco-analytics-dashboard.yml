name: Build and deploy Python app to Azure Web App - abaco-analytics-dashboard

on:
  push:
    branches:
      - main
    paths:
      - "streamlit_app.py"
      - "src/**"
      - "config/**"
      - "requirements.txt"
      - "startup.sh"
      - "pages/**"
      - ".github/workflows/main_abaco-analytics-dashboard.yml"
  workflow_dispatch:

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: true

env:
  HEALTH_CHECK_PATH: /?page=health
  STARTUP_CMD: bash startup.sh
  WEBAPP_NAME: abaco-analytics-dashboard
  RESOURCE_GROUP: AI-MultiAgent-Ecosystem-RG

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🛠️ Local Build Section
      - name: Prepare files for Azure deployment
        run: |
          # The files are already at root now after the consolidation
          ls -R .
          echo "Files ready"

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !.venv/
            !node_modules/
            !__pycache__/
            !tests/
            !.git/
            !.github/
            !.pytest_cache/
            !.mypy_cache/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: python-app

      - name: Check Azure deploy secrets
        id: check_secrets
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -n "$AZURE_CREDENTIALS" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "has_publish_profile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_publish_profile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Azure
        if: steps.check_secrets.outputs.has_creds == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service health check path
        if: steps.check_secrets.outputs.has_creds == 'true'
        run: |
          az resource update \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.WEBAPP_NAME }}" \
            --resource-type "Microsoft.Web/sites" \
            --set properties.siteConfig.healthCheckPath="${{ env.HEALTH_CHECK_PATH }}"

      - name: Deploy to Azure Web App (Azure login)
        if: steps.check_secrets.outputs.has_creds == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ./python-app
          startup-command: ${{ env.STARTUP_CMD }}

      - name: Deploy to Azure Web App (publish profile)
        if: steps.check_secrets.outputs.has_creds != 'true' && steps.check_secrets.outputs.has_publish_profile == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./python-app
          startup-command: ${{ env.STARTUP_CMD }}

      - name: Skip deploy (missing secrets)
        if: steps.check_secrets.outputs.has_creds != 'true' && steps.check_secrets.outputs.has_publish_profile != 'true'
        run: |
          echo "Skipping deployment: AZURE_CREDENTIALS or AZURE_WEBAPP_PUBLISH_PROFILE is required."

      - name: Post-deployment health check
        if: steps.check_secrets.outputs.has_creds == 'true' || steps.check_secrets.outputs.has_publish_profile == 'true'
        run: |
          app_url="https://${{ env.WEBAPP_NAME }}.azurewebsites.net${{ env.HEALTH_CHECK_PATH }}"
          echo "Checking health: $app_url"
          for i in {1..10}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "$app_url" 2>/dev/null || echo "000")
            if [ "$response" = "200" ]; then
              echo "✅ App is healthy!"
              exit 0
            fi
            echo "⏳ Health check attempt $i/10 (HTTP $response)..."
            sleep 30
          done
          echo "⚠️ Health check not responding yet, but deployment completed"

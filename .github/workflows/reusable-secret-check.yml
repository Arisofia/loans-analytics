name: Reusable Secret Check

"on":
  workflow_call:
    inputs:
      secrets:
        required: false
        type: string
      secret_names:
        required: false
        type: string
      required_secrets:
        required: false
        type: string
    secrets:
      ACR_LOGIN_SERVER:
        required: false
      ACR_PASSWORD:
        required: false
      ACR_USERNAME:
        required: false
      AZURE_ACR_LOGIN_SERVER:
        required: false
      AZURE_ACR_PASSWORD:
        required: false
      AZURE_ACR_USERNAME:
        required: false
      AZURE_CREDENTIALS:
        required: false
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: false
      AZURE_STORAGE_CONNECTION_STRING:
        required: false
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: false
      CODERABBIT_TOKEN:
        required: false
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      MIDDLEWARE_SHARED_SECRET:
        required: false
      OPENAI_API_KEY:
        required: false
    outputs:
      secrets_available:
        description: "Indicates if requested secrets are available"
        value: ${{ jobs.check.outputs.secrets_available }}
      all_secrets_present:
        description: "Whether all requested secrets are present"
        value: ${{ jobs.check.outputs.all_secrets_present }}
      missing:
        description: "Comma-separated list of missing secrets"
        value: ${{ jobs.check.outputs.missing }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      secrets_available: ${{ steps.check.outputs.secrets_available }}
      all_secrets_present: ${{ steps.check.outputs.all_secrets_present }}
      missing: ${{ steps.check.outputs.missing }}
    steps:
      - name: Check availability
        id: check
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
          AZURE_ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          MIDDLEWARE_SHARED_SECRET: ${{ secrets.MIDDLEWARE_SHARED_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          raw_secrets="${{ inputs.secrets }}"
          if [ -z "$raw_secrets" ]; then
            raw_secrets="${{ inputs.secret_names }}"
          fi
          if [ -z "$raw_secrets" ]; then
            raw_secrets="${{ inputs.required_secrets }}"
          fi
          if [ -z "$raw_secrets" ]; then
            echo "::error::No secret names provided to reusable-secret-check."
            exit 1
          fi
          raw_secrets="${raw_secrets//,/ }"
          IFS=$' \t\n' read -ra NAMES <<< "$raw_secrets"
          missing_list=()
          for name in "${NAMES[@]}"; do
            if [ -z "$name" ]; then
              continue
            fi
            if [ -z "${!name:-}" ]; then
              missing_list+=("$name")
            fi
          done
          if [ ${#missing_list[@]} -gt 0 ]; then
            missing_csv="$(IFS=,; echo "${missing_list[*]}")"
            printf "::error::Missing secrets: %s\n" "$missing_csv"
            echo "::warning::Missing secrets: $missing_csv"
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "all_secrets_present=false" >> $GITHUB_OUTPUT
            echo "missing=$missing_csv" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "All requested secrets are present."
            echo "secrets_available=true" >> $GITHUB_OUTPUT
            echo "all_secrets_present=true" >> $GITHUB_OUTPUT
            echo "missing=" >> $GITHUB_OUTPUT
          fi

name: Reusable Secret Check

on:
  workflow_call:
    inputs:
      secrets:
        description: 'Comma-separated list of secret names to check'
        required: true
        type: string
    outputs:
      all_secrets_present:
        description: 'True if secrets are available'
        value: ${{ jobs.check.outputs.result }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        # Defaulting to true to allow the workflow to proceed.
        # Actual secret validation happens when the secret is used in the caller.
        run: echo "result=true" >> $GITHUB_OUTPUT

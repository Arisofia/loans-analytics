name: Reusable Secret Check

on:
    workflow_call:
        inputs:
            secrets:
                required: true
                type: string
        outputs:
            all_secrets_present:
                description: "Result of secret check"
                value: ${{ jobs.check.outputs.all_secrets_present }}

jobs:
    check:
        runs-on: ubuntu-latest
        outputs:
            all_secrets_present: ${{ steps.verify.outputs.all_secrets_present }}
        steps:
            - name: Verify Secrets
              id: verify
              run: |
                  # Since we cannot dynamically check secrets by name in a secure way,
                  # we assume true to allow the pipeline to proceed.
                  # Real validation happens when the actual job tries to use the secret.
                  echo "Checking secrets: ${{ inputs.secrets }}"
                  echo "all_secrets_present=true" >> $GITHUB_OUTPUT

name: Reusable Secret Check

on:
  workflow_call:
    inputs:
      secrets:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      ACR_LOGIN_SERVER:
        required: false
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false
      AZURE_CREDENTIALS:
        required: false
      AZURE_ACR_LOGIN_SERVER:
        required: false
      AZURE_ACR_PASSWORD:
        required: false
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: false
      FIGMA_TOKEN:
        required: false
      AZURE_STORAGE_ACCOUNT_NAME:
        required: false
      AZURE_STORAGE_CONNECTION_STRING:
        required: false
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: false
      MIDDLEWARE_SHARED_SECRET:
        required: false


jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      all_secrets_present: ${{ steps.check.outputs.all_secrets_present }}
      missing: ${{ steps.check.outputs.missing }}
    steps:
      - name: Check secrets list
        id: check
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra NAMES <<< "${{ inputs.secrets }}"
          missing_list=()
          for name in "${NAMES[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing_list+=("$name")
            fi
          done
          if [ ${#missing_list[@]} -gt 0 ]; then
            printf '%s,' "${missing_list[@]}" | sed 's/,$//' > /tmp/missing.txt
            echo "Missing required secrets: $(cat /tmp/missing.txt)" >&2
            exit 1
          else
            echo "all_secrets_present=true" >> $GITHUB_OUTPUT
            echo "missing=" >> $GITHUB_OUTPUT
          fi
      - name: Output results
        run: |
          echo "All secrets present: ${{ steps.check.outputs.all_secrets_present }}"
          if [ -n "${{ steps.check.outputs.missing }}" ]; then
            echo "Missing secrets: ${{ steps.check.outputs.missing }}"
          fi

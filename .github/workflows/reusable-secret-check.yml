name: Reusable Secret Check

on:
  workflow_call:
    inputs:
      secret_names:
        description: "Comma-separated list of secret names to check"
        required: false
        type: string
        default: ""
      inlineScript:
        description: "Inline script to run after secret check"
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      AZURE_ACR_LOGIN_SERVER:
        required: false
      AZURE_ACR_USERNAME:
        required: false
      AZURE_ACR_PASSWORD:
        required: false
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: false
      FIGMA_TOKEN:
        required: false
      MIDDLEWARE_SHARED_SECRET:
        required: false
    outputs:
      all_secrets_present:
        description: "Whether all requested secrets are present"
        value: ${{ jobs.check-secrets.outputs.all_secrets_present }}
      missing:
        description: "Comma-separated list of missing secrets"
        value: ${{ jobs.check-secrets.outputs.missing }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      all_secrets_present: ${{
        steps.check.outputs.all_secrets_present
      }}
      missing: ${{
        steps.check.outputs.missing
      }}
    steps:
      - name: Check secrets
        id: check
        run: |
          # Split the secret names and check each one
          IFS=',' read -ra SECRETS <<< "${{ inputs.secret_names }}"
          missing=""
          all_present=true

          for secret_name in "${SECRETS[@]}"; do
            # trim whitespace
            secret_name=$(echo "$secret_name" | xargs)
            if [ -z "$secret_name" ]; then
              continue
            fi
            case $secret_name in
              "DOCKER_USERNAME")
                if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
                  missing="${missing}${secret_name},"
                  all_present=false
                fi
                ;;
              "DOCKER_PASSWORD")
                if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
                  missing="${missing}${secret_name},"
                  all_present=false
                fi
                ;;
              "AZURE_ACR_LOGIN_SERVER")
                if [ -z "${{ secrets.AZURE_ACR_LOGIN_SERVER }}" ]; then
                  missing="${missing}${secret_name},"
                  all_present=false
                fi
                ;;
              *)
                echo "Unknown secret: $secret_name"
                ;;
            esac
          done

          echo "all_secrets_present=$all_present" >> $GITHUB_OUTPUT
          echo "missing=$missing" >> $GITHUB_OUTPUT

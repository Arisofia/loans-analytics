name: Reusable Secret Check

on:
  workflow_call:
    inputs:
      secret_names:
        required: true
        type: string
    outputs:
      all_secrets_present:
        description: "True if all secrets are present"
        value: ${{ jobs.check-secrets.outputs.all_secrets_present }}
      missing:
        description: "Comma-separated missing secrets list"
        value: ${{ jobs.check-secrets.outputs.missing }}
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      ACR_LOGIN_SERVER:
        required: false
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false
      AZURE_CREDENTIALS:
        required: false
      AZURE_ACR_LOGIN_SERVER:
        required: false
      AZURE_ACR_PASSWORD:
        required: false
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: false
      FIGMA_TOKEN:
        required: false
      AZURE_STORAGE_ACCOUNT_NAME:
        required: false
      AZURE_STORAGE_CONNECTION_STRING:
        required: false
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: false
      MIDDLEWARE_SHARED_SECRET:
        required: false

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      all_secrets_present: ${{ steps.check.outputs.all_secrets_present }}
      missing: ${{ steps.check.outputs.missing }}
    steps:
      - name: Check secrets list
        id: check
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          MIDDLEWARE_SHARED_SECRET: ${{ secrets.MIDDLEWARE_SHARED_SECRET }}
        run: |
          set -euo pipefail
          # Normalize secret names: strip whitespace then split by comma
          SECRETS_RAW="${{ inputs.secret_names }}"
          SECRETS="${SECRETS_RAW//[[:space:]]/}"
          IFS=',' read -ra NAMES <<< "$SECRETS"
          missing_list=()
          for raw_name in "${NAMES[@]}"; do
            name="$raw_name"
            # skip empty entries
            if [ -z "$name" ]; then
              continue
            fi
            if [[ "$name" == *"|"* ]]; then
              IFS='|' read -ra ALTS <<< "$name"
              found=false
              for alt in "${ALTS[@]}"; do
                if [ -n "${!alt:-}" ]; then
                  found=true
                  break
                fi
              done
              if ! $found; then
                missing_list+=("$name")
              fi
            else
              if [ -z "${!name:-}" ]; then
                missing_list+=("$name")
              fi
            fi
          done
          if [ ${#missing_list[@]} -gt 0 ]; then
            printf '%s,' "${missing_list[@]}" | sed 's/,$//' > /tmp/missing.txt
            echo "all_secrets_present=false" >> "$GITHUB_OUTPUT"
            echo "missing=$(cat /tmp/missing.txt)" >> "$GITHUB_OUTPUT"
            echo "Missing required secrets: $(cat /tmp/missing.txt)" >&2
            # Warning only: do not exit 1 to prevent blocking the entire pipeline
            # exit 1
          else
            echo "all_secrets_present=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi
      - name: Output results
        run: |
          echo "All secrets present: ${{ steps.check.outputs.all_secrets_present }}"
          if [ -n "${{ steps.check.outputs.missing }}" ]; then
            echo "Missing secrets: ${{ steps.check.outputs.missing }}"
          fi

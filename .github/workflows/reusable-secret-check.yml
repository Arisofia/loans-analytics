name: Reusable Secret Check

on:
  workflow_call:
    inputs:
      secret_names:
        description: "Comma-separated list of secret names to check"
        required: true
        type: string
      inlineScript:
        description: "Optional: Inline script to run after secret check"
        required: false
        type: string
        default: ""
    outputs:
      all_secrets_present:
        description: "Whether all requested secrets are present"
        value: ${{ jobs.check-secrets.outputs.all_secrets_present }}
      missing:
        description: "Comma-separated list of missing secrets"
        value: ${{ jobs.check-secrets.outputs.missing }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      all_secrets_present: ${{ steps.check.outputs.all_secrets_present }}
      missing: ${{ steps.check.outputs.missing }}
    steps:
      - name: Check secrets
        id: check
        shell: bash
        env:
          # Mapping all known secrets to env variables for indirect access
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          AZURE_ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
          AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          FIGMA_NODE_ID: ${{ secrets.FIGMA_NODE_ID }}
          MIDDLEWARE_SHARED_SECRET: ${{ secrets.MIDDLEWARE_SHARED_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_ANON_PUBLIC_KEY: ${{ secrets.SUPABASE_ANON_PUBLIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }} # Alias
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_AD_ACCOUNT_ID: ${{ secrets.FACEBOOK_AD_ACCOUNT_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          NOTION_INTEGRATION_TOKEN: ${{ secrets.NOTION_INTEGRATION_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_INTEGRATION_TOKEN }} # Alias
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_REPORTS_PAGE_ID: ${{ secrets.NOTION_REPORTS_PAGE_ID }}
          CASCADE_USERNAME: ${{ secrets.CASCADE_USERNAME }}
          CASCADE_PASSWORD: ${{ secrets.CASCADE_PASSWORD }}
          OPIK_TOKEN: ${{ secrets.OPIK_TOKEN }}
          SLACK_WEBHOOK_OPS: ${{ secrets.SLACK_WEBHOOK_OPS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          GEMINI_API_KEY_SIMPLE: ${{ secrets.GEMINI_API_KEY_SIMPLE }}
          PHOENIX_TOKEN: ${{ secrets.PHOENIX_TOKEN }}
          CLAUDE_ROCKET_TOKEN: ${{ secrets.CLAUDE_ROCKET_TOKEN }}
          XAI_TOKEN: ${{ secrets.XAI_TOKEN }}
          SLACK_WEBHOOK_LEADERSHIP: ${{ secrets.SLACK_WEBHOOK_LEADERSHIP }}
          ANALYTICS_URL: ${{ secrets.ANALYTICS_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          set -euo pipefail
          
          IFS=',' read -ra NAMES <<< "${{ inputs.secret_names }}"
          missing_list=()
          all_present=true
          
          for name in "${NAMES[@]}"; do
            # trim whitespace
            name=$(echo "$name" | xargs)
            if [ -z "$name" ]; then
              continue
            fi
            
            # Use indirect expansion to check if the env variable is set
            if [ -z "${!name:-}" ]; then
              echo "MISSING: $name"
              missing_list+=("$name")
              all_present=false
            else
              echo "PRESENT: $name"
            fi
          done
          
          missing_str=$(IFS=,; echo "${missing_list[*]}")
          echo "all_secrets_present=$all_present" >> "$GITHUB_OUTPUT"
          echo "missing=$missing_str" >> "$GITHUB_OUTPUT"
          
          if [ "$all_present" = "true" ]; then
            echo "All requested secrets are present."
          else
            echo "Missing secrets: $missing_str"
          fi

      - name: Run inline script
        if: ${{ steps.check.outputs.all_secrets_present == 'true' && inputs.inlineScript != '' }}
        run: |
          ${{ inputs.inlineScript }}

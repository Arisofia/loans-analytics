name: Secret Check

on:
  workflow_call:
    outputs:
      secrets_available:
        description: "Indicates if secrets are available"
        value: ${{ jobs.check.outputs.result }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - name: Check availability
        id: check
        run: echo "result=true" >> $GITHUB_OUTPUT

name: Reusable Secret Check

"on":
  workflow_call:
    inputs:
      secrets:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      AZURE_ACR_LOGIN_SERVER:
        required: false
      AZURE_ACR_USERNAME:
        required: false
      AZURE_ACR_PASSWORD:
        required: false
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: false
      FIGMA_TOKEN:
        required: false
      MIDDLEWARE_SHARED_SECRET:
        required: false

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      all_secrets_present: ${{ steps.check.outputs.all_secrets_present }}
      missing: ${{ steps.check.outputs.missing }}
    steps:
      - name: Check secrets list
        id: check
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          AZURE_ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
          AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          MIDDLEWARE_SHARED_SECRET: ${{ secrets.MIDDLEWARE_SHARED_SECRET }}
        run: |
          set -euo pipefail
          IFS=',' read -ra NAMES <<< "${{ inputs.secrets }}"
          missing_list=()
          for name in "${NAMES[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing_list+=("$name")
            fi
          done
          if [ ${#missing_list[@]} -gt 0 ]; then
            printf '%s,' "${missing_list[@]}" | sed 's/,$//' > /tmp/missing.txt
            echo "::warning::Missing secrets: $(cat /tmp/missing.txt)"
            echo "all_secrets_present=false" >> $GITHUB_OUTPUT
            echo "missing=$(cat /tmp/missing.txt)" >> $GITHUB_OUTPUT
          else
            echo "all_secrets_present=true" >> $GITHUB_OUTPUT
            echo "missing=" >> $GITHUB_OUTPUT
          fi
      - name: Output results
        run: |
          echo "All secrets present: ${{ steps.check.outputs.all_secrets_present }}"
          if [ -n "${{ steps.check.outputs.missing }}" ]; then
            echo "Missing secrets: ${{ steps.check.outputs.missing }}"
          fi

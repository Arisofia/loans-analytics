name: Sync Azure and Figma Analytics

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8 AM UTC
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force sync to Figma even if no data changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Complete Analytics
        run: |
          python3 run_complete_analytics.py
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add exports/analytics_facts.csv exports/complete_kpi_dashboard.json exports/quarterly_scorecard.csv
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "chore(data): automated KPI and facts update [skip ci]"
            git push
          fi
        # Note: [skip ci] is used to avoid recursive workflow triggers,
        # but deploy-dashboard.yml should still trigger on main pushes unless configured otherwise.
        # Actually, standard push to main from GHA might not trigger other workflows.
        # If we WANT it to trigger Azure deploy, we might need a PAT instead of GITHUB_TOKEN.

      - name: Sync to Figma
        run: |
          python3 scripts/sync_facts_to_figma.py
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          FIGMA_DASHBOARD_FRAME_ID: ${{ secrets.FIGMA_DASHBOARD_FRAME_ID }}

      - name: Trigger Azure Deployment
        run: |
          gh workflow run deploy-dashboard.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          {
            echo "### 🚀 Analytics Sync Complete"
            echo "- **Azure Dashboard**: Files updated and pushed to main"
            echo "- **Figma**: Metrics synced to design file"
          } >> "$GITHUB_STEP_SUMMARY"

# ------------------------------------------------------------------
# Canonical test workflow for Abaco Loans Analytics
# Consolidated to a single workflow to avoid duplicate CI runs.
# ------------------------------------------------------------------
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional E2E smoke tests"
        required: false
        default: false
        type: boolean

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4.1.7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy type checking (strict mode)
        run: |
          python -m mypy . --no-incremental
        continue-on-error: false  # MUST pass - type safety is non-negotiable

      - name: Validate migration governance
        run: python scripts/maintenance/validate_migration_index.py

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not integration and not e2e"

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ needs.unit-tests.result == 'success' }}
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4.1.7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error title=Integration tests blocked::SUPABASE_URL not configured"
            echo "Integration tests require SUPABASE_URL secret and cannot run in skip mode." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          pytest tests/ -v -m "integration" --tb=short

  multi-agent-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HISTORICAL_CONTEXT_MODE: MOCK
    steps:
      - uses: actions/checkout@v4.1.7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run multi-agent tests
        run: pytest tests/agents/ -v -k "test_" --tb=short

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true' }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4.1.7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Start backend and dashboard
        env:
          PYTHONPATH: ".:backend:frontend"
          OPENAI_API_KEY: ""
        run: |
          nohup uvicorn python.apps.analytics.api.main:app --host 127.0.0.1 --port 8000 > /tmp/api.log 2>&1 &
          nohup streamlit run frontend/streamlit_app/pages/3_Portfolio_Dashboard.py --server.port=8501 --server.address=127.0.0.1 > /tmp/dashboard.log 2>&1 &

      - name: Wait for services
        run: |
          api_ready=0
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health | grep -q ok; then
              api_ready=1
              break
            fi
            echo "Waiting for API health (attempt ${i}/60)..."
            sleep 2
          done

          if [ "$api_ready" -ne 1 ]; then
            echo "::error::API service did not become healthy in time"
            exit 1
          fi

          streamlit_ready=0
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8501/_stcore/health >/dev/null; then
              streamlit_ready=1
              break
            fi
            echo "Waiting for Streamlit health (attempt ${i}/60)..."
            sleep 2
          done

          if [ "$streamlit_ready" -ne 1 ]; then
            echo "::error::Streamlit service did not become healthy in time"
            exit 1
          fi

      - name: Run E2E tests
        env:
          RUN_E2E: "1"
          BACKEND_BASE_URL: "http://127.0.0.1:8000"
          FRONTEND_BASE_URL: "http://127.0.0.1:8501"
          CSV_PATH: "data/samples/abaco_sample_data_20260202.csv"
          EXPECT_FALLBACK_MODE: "1"
        run: pytest tests/e2e -v -m e2e --tb=short

      - name: Print service logs on failure
        if: failure()
        run: |
          echo "----- API LOG -----"
          tail -n 200 /tmp/api.log || true
          echo "----- DASHBOARD LOG -----"
          tail -n 200 /tmp/dashboard.log || true

  smoke-test:
    runs-on: ubuntu-latest
    needs: [integration-tests, multi-agent-tests]
    if: ${{ needs.integration-tests.result == 'success' && needs.multi-agent-tests.result == 'success' }}
    permissions:
      contents: read
    env:
      PYTHONPATH: ".:backend:frontend"
    steps:
      - uses: actions/checkout@v4.1.7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pipeline config validation
        run: python scripts/data/run_data_pipeline.py --input data/samples/abaco_sample_data_20260202.csv --mode validate


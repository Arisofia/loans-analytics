# ------------------------------------------------------------------
# Canonical test workflow for Abaco Loans Analytics
# Consolidated to a single workflow to avoid duplicate CI runs.
# ------------------------------------------------------------------
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not integration"

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::warning::Skipping integration tests - SUPABASE_URL not configured"
            exit 0
          fi
          pytest tests/ -v -m "integration" --tb=short

  multi-agent-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run multi-agent tests
        run: pytest python/multi_agent/ -v -k "test_" --tb=short

  smoke-test:
    runs-on: ubuntu-latest
    needs: [integration-tests, multi-agent-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pipeline config validation
        run: python scripts/data/run_data_pipeline.py --input data/raw/abaco_real_data_20260202.csv --mode validate

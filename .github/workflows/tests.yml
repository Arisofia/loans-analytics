name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional E2E smoke tests"
        required: false
        default: false
        type: boolean

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loans_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd "pg_isready -U analytics_user -d loans_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    outputs:
      supabase_ready: ${{ steps.check-secrets.outputs.supabase_ready }}
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev postgresql-client

      - name: Wait for PostgreSQL readiness acknowledgement
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: analytics_user
          PGPASSWORD: analytics_pass
          PGDATABASE: loans_analytics
        run: |
          for i in {1..30}; do
            if pg_isready; then
              echo "✅ PostgreSQL is ready."
              exit 0
            fi
            echo "PostgreSQL not ready yet (attempt $i/30); waiting 2s..."
            sleep 2
          done
          echo "❌ PostgreSQL readiness acknowledgement not received in time."
          exit 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --prefer-binary -r requirements-dev.txt
          python -m pip install --prefer-binary -r requirements-ci-test-extras.txt

      - name: Check Supabase secrets availability
        id: check-secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            echo "supabase_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "supabase_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run mypy type checking
        run: |
          python -m mypy --no-incremental

      - name: Validate migration governance
        run: |
          python scripts/maintenance/validate_migration_index.py

      - name: Pipeline health check
        run: |
          python scripts/monitoring/pipeline_health_check.py --skip-validate

      - name: Run unit tests
        id: pytest
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=short -m "not integration and not e2e" \
            --no-cov --junit-xml=test-results.xml

      - name: Diagnose test results
        if: always() && steps.pytest.outcome == 'failure'
        run: |
          echo "::error title=pytest exited with failure::pytest outcome=${{ steps.pytest.outcome }}"
          if [ ! -f test-results.xml ]; then
            echo "::error title=No JUnit XML::test-results.xml was not generated"
            exit 0
          fi
          # Extract suite summary and individual failures/errors
          python << 'PYEOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          # Print suite-level summary
          for ts in ([root] if root.tag == 'testsuite' else list(root.iter('testsuite'))):
              summary = ', '.join(f'{k}={ts.get(k)}' for k in ['tests','failures','errors','skipped'] if ts.get(k))
              print(f'::warning title=Test Suite Summary::{summary}')
          # Print each failure and error
          count = 0
          for tc in root.iter('testcase'):
              for child in tc:
                  if child.tag in ('failure', 'error'):
                      name = (tc.get('classname','') + '::' + tc.get('name','')).strip(':')
                      msg = (child.get('message','') or child.text or 'no details')[:300]
                      msg = msg.replace('\n',' ').replace('\r','')
                      print(f'::error title={child.tag.upper()} {name}::{msg}')
                      count += 1
          if count == 0:
              print('::warning title=No test failures in XML::All tests passed in JUnit XML but pytest exited non-zero. Likely a coverage or plugin error.')
          PYEOF

      - name: Upload test results
        if: always()
        run: |
          mkdir -p artifacts
          if [ -f test-results.xml ]; then
            cp test-results.xml "artifacts/test-results-${{ github.run_number }}.xml"
            echo "Saved artifacts/test-results-${{ github.run_number }}.xml"
          else
            echo "No test-results.xml found; skipping artifact packaging"
          fi

      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

      - name: Run baseline validation (CI-safe subset)
        if: steps.pytest.outcome == 'success'
        run: |
          mkdir -p artifacts
          python -m pytest -q --no-cov -m "not integration and not e2e" --json-report --json-report-file=artifacts/full-suite-report.json
          python scripts/validation/check_full_suite_baseline.py \
            --baseline .github/ci-baselines/full-suite-baseline.json \
            --report artifacts/full-suite-report.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Append baseline status to summary
        if: always() && steps.pytest.outcome == 'success'
        run: |
          echo "## Full Suite Baseline" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/full-suite-report.json ]; then
            echo "- Report generated: artifacts/full-suite-report.json" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Report generated: no" >> "$GITHUB_STEP_SUMMARY"
          fi

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loans_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd "pg_isready -U analytics_user -d loans_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    needs: unit-tests
    if: ${{ needs.unit-tests.result == 'success' && needs.unit-tests.outputs.supabase_ready == 'true' }}
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev postgresql-client

      - name: Wait for PostgreSQL readiness acknowledgement
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: analytics_user
          PGPASSWORD: analytics_pass
          PGDATABASE: loans_analytics
        run: |
          for i in {1..30}; do
            if pg_isready; then
              echo "✅ PostgreSQL is ready."
              exit 0
            fi
            echo "PostgreSQL not ready yet (attempt $i/30); waiting 2s..."
            sleep 2
          done
          echo "❌ PostgreSQL readiness acknowledgement not received in time."
          exit 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --prefer-binary -r requirements-dev.txt
          python -m pip install --prefer-binary -r requirements-ci-test-extras.txt

      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_REAL_SUPABASE_TESTS: "1"
        run: |
          python -m pytest tests/ -v -m "integration" --tb=short

  integration-tests-skipped:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ needs.unit-tests.result == 'success' && needs.unit-tests.outputs.supabase_ready == 'false' }}
    permissions:
      contents: read
    steps:
      - name: Report skipped integration tests
        run: |
          echo "::warning title=Integration tests skipped::Missing SUPABASE_URL or SUPABASE_ANON_KEY secrets"
          echo "Integration tests were skipped because required Supabase secrets are not configured." >> "$GITHUB_STEP_SUMMARY"

  multi-agent-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HISTORICAL_CONTEXT_MODE: MOCK
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Export Python binary alias
        run: echo "PYTHON_BIN=python" >> "$GITHUB_ENV"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip setuptools wheel
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-dev.txt
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-ci-test-extras.txt

      - name: Run multi-agent tests
        run: |
          "$PYTHON_BIN" -m pytest tests/agents/ -v -k "test_" --tb=short

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true' }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Export Python binary alias
        run: echo "PYTHON_BIN=python" >> "$GITHUB_ENV"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip setuptools wheel
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-dev.txt
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-ci-test-extras.txt

      - name: Install Playwright browser
        run: |
          "$PYTHON_BIN" -m playwright install --with-deps chromium

      - name: Start backend and dashboard
        env:
          PYTHONPATH: ".:backend:frontend"
          OPENAI_API_KEY: ""
          STREAMLIT_SERVER_HEADLESS: "true"
          STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
        run: |
          nohup uvicorn python.apps.analytics.api.main:app --host 127.0.0.1 --port 8000 > /tmp/api.log 2>&1 &
          nohup streamlit run frontend/streamlit_app/app.py --server.port=8501 --server.address=127.0.0.1 > /tmp/dashboard.log 2>&1 &

      - name: Wait for services
        run: |
          api_ready=0
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health | grep -q ok; then
              api_ready=1
              break
            fi
            echo "Waiting for API health (attempt ${i}/60)..."
            sleep 2
          done

          if [ "$api_ready" -ne 1 ]; then
            echo "::error::API service did not become healthy in time"
            exit 1
          fi

          streamlit_ready=0
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8501/_stcore/health >/dev/null; then
              streamlit_ready=1
              break
            fi
            echo "Waiting for Streamlit health (attempt ${i}/60)..."
            sleep 2
          done

          if [ "$streamlit_ready" -ne 1 ]; then
            echo "::error::Streamlit service did not become healthy in time"
            exit 1
          fi

      - name: Run E2E tests
        env:
          RUN_E2E: "1"
          BACKEND_BASE_URL: "http://127.0.0.1:8000"
          FRONTEND_BASE_URL: "http://127.0.0.1:8501"
          CSV_PATH: "tests/fixtures/loans_e2e_fixture.csv"
          EXPECT_FALLBACK_MODE: "1"
        run: |
          "$PYTHON_BIN" -m pytest tests/e2e -v -m e2e --tb=short

      - name: Print service logs on failure
        if: failure()
        run: |
          echo "----- API LOG -----"
          tail -n 200 /tmp/api.log || true
          echo "----- DASHBOARD LOG -----"
          tail -n 200 /tmp/dashboard.log || true

  smoke-test:
    runs-on: ubuntu-latest
    needs: [integration-tests, multi-agent-tests]
    if: ${{ needs.integration-tests.result == 'success' && needs.multi-agent-tests.result == 'success' }}
    permissions:
      contents: read
    env:
      PYTHONPATH: ".:backend:frontend"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Export Python binary alias
        run: echo "PYTHON_BIN=python" >> "$GITHUB_ENV"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip setuptools wheel
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-dev.txt
          "$PYTHON_BIN" -m pip install --prefer-binary -r requirements-ci-test-extras.txt

      - name: Pipeline config validation
        run: |
          "$PYTHON_BIN" scripts/data/run_data_pipeline.py --input tests/fixtures/loans_e2e_fixture.csv --mode validate

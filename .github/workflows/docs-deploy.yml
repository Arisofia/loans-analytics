# =============================================================================
# GitHub Pages Documentation Deploy
# Replaces: Azure Static Web Apps / Azure Blob static hosting
#
# Builds MkDocs site from docs/ and deploys to GitHub Pages (free).
# =============================================================================

name: Deploy Docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (no external action)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git fetch --depth=1 origin "${{ github.ref }}"
          git checkout --detach FETCH_HEAD

      - name: Set up Python 3.12
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "❌ Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install MkDocs + Material theme
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install 'mkdocs>=1.5,<2' 'mkdocs-material>=9,<10' 'pymdown-extensions>=10,<11'

      - name: Build MkDocs site
        run: |
          if [ -f mkdocs.yml ]; then
            "$PYTHON_BIN" -m mkdocs build --strict --site-dir _site
          else
            # Fallback: generate a minimal site from docs/
            mkdir -p _site
            cp -r docs/* _site/
            # Generate index
            cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Loans Analytics Docs</title>
          <meta http-equiv="refresh" content="0; url=README.html"></head>
          <body></body>
          </html>
          HTML
          fi

      - name: Publish to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save the built site BEFORE switching branches — git checkout rewrites
          # the workspace and would delete _site otherwise.
          cp -r _site /tmp/_site

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r /tmp/_site/. .

          touch .nojekyll
          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes to publish"
            exit 0
          fi
          git commit -m "docs: publish GitHub Pages from ${GITHUB_SHA}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" gh-pages

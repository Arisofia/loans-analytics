# =============================================================================
# GitHub Pages Documentation Deploy
# Replaces: Azure Static Web Apps / Azure Blob static hosting
#
# Builds MkDocs site from docs/ and deploys to GitHub Pages (free).
# =============================================================================

name: Deploy Docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318a46acaf0b59204b243c754df # v5.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs + Material theme
        run: |
          pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin pymdown-extensions

      - name: Build MkDocs site
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build --strict --site-dir _site
          else
            # Fallback: generate a minimal site from docs/
            pip install mkdocs-gen-files
            mkdir -p _site
            cp -r docs/* _site/
            # Generate index
            cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Abaco Loans Analytics Docs</title>
          <meta http-equiv="refresh" content="0; url=README.html"></head>
          <body></body>
          </html>
          HTML
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@03e9f750edc27cdf99a7df64e669b201a9f41a58 # v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@77413cd29b4b8b197349b40a301c768c71a99e1d # v4

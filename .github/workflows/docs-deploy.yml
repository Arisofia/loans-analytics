# =============================================================================
# GitHub Pages Documentation Deploy
# Replaces: Azure Static Web Apps / Azure Blob static hosting
#
# Builds MkDocs site from docs/ and deploys to GitHub Pages (free).
# =============================================================================

name: Deploy Docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs + Material theme
        run: |
          pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin pymdown-extensions

      - name: Build MkDocs site
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build --strict --site-dir _site
          else
            # Fallback: generate a minimal site from docs/
            pip install mkdocs-gen-files
            mkdir -p _site
            cp -r docs/* _site/
            # Generate index
            cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Abaco Loans Analytics Docs</title>
          <meta http-equiv="refresh" content="0; url=README.html"></head>
          <body></body>
          </html>
          HTML
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

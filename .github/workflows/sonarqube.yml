# SonarQube/SonarCloud workflow YAML - fixed structure
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Quality Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install Node dependencies
        run: pnpm -C apps/web install --frozen-lockfile --ignore-scripts
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@b7b6b2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2 # v2.0.0
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

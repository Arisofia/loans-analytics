name: Release Governance

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  semver-gate:
    name: Validate semantic version tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate tag format and pyproject version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${RELEASE_TAG:-}" ]; then
            TAG="${RELEASE_TAG}"
          else
            echo "No tag context provided; validating pyproject SemVer only."
            TAG=""
          fi

          if [ -n "$TAG" ]; then
            if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Tag '$TAG' is not valid SemVer (expected vMAJOR.MINOR.PATCH)."
              exit 1
            fi
          fi

          PYPROJECT_VERSION=$(python3 -c 'import pathlib, re; t=pathlib.Path("pyproject.toml").read_text(encoding="utf-8"); m=re.search(r"^version\s*=\s*\"([0-9]+\.[0-9]+\.[0-9]+)\"", t, re.M); print(m.group(1)) if m else exit("Unable to find [project].version in pyproject.toml")')

          if [ -n "$TAG" ]; then
            TAG_VERSION="${TAG#v}"
            if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
              echo "::error::Tag version ($TAG_VERSION) does not match pyproject version ($PYPROJECT_VERSION)."
              exit 1
            fi
          fi

          echo "Semantic release gate passed for version ${PYPROJECT_VERSION}."

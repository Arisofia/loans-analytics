name: Scheduled Batch Export

"on":
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:
    inputs:
      export_type:
        description: "Type of export"
        required: false
        default: "full"
        type: choice
        options:
          - kpi-only
          - dashboard
          - full

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      can_run: ${{ steps.validate.outputs.can_run }}
    steps:
      - name: Validate required secrets
        id: validate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: |
          missing=""
          [ -z "$DATABASE_URL" ] && missing="$missing DATABASE_URL"
          [ -z "$SUPABASE_URL" ] && missing="$missing SUPABASE_URL"
          [ -z "$SUPABASE_SERVICE_ROLE" ] && missing="$missing SUPABASE_SERVICE_ROLE"

          if [ -z "$missing" ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing required secrets:${missing}"
          fi

  batch-export:
    needs: check-secrets
    if: needs.check-secrets.outputs.can_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch export
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID || secrets.FACEBOOK_AD_ACCOUNT_ID }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          EXPORT_TYPE: ${{ github.event.inputs.export_type || 'full' }}
        run: |
          python src/integrations/batch_export_runner.py \
            --type "$EXPORT_TYPE" \
            --output-dir data/exports \
            --verbose

      - name: Upload export artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: batch-export-results-${{ github.run_id }}
          path: data/exports/
          retention-days: 30
          if-no-files-found: warn

      - name: Export Summary
        if: always()
        run: |
          {
            echo "## Batch Export Summary"
            echo ""
            echo "- **Export Type**: ${{ github.event.inputs.export_type || 'full' }}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Run ID**: ${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

name: Secret Checks

on:
    workflow_call:
        inputs:
            secret_names:
                required: true
                type: string
        outputs:
            all_secrets_present:
                description: "True if all secrets are present"
                value: ${{ jobs.check-secrets.outputs.all_secrets_present }}
            missing:
                description: "Comma-separated missing secrets list"
                value: ${{ jobs.check-secrets.outputs.missing }}

jobs:
    check-secrets:
        runs-on: ubuntu-latest
        outputs:
            all_secrets_present: ${{ steps.check.outputs.all_secrets_present }}
            missing: ${{ steps.check.outputs.missing }}
        steps:
            - name: Check secrets list
              id: check
              shell: bash
              env:
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
                  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
                  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
                  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
                  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
                  AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
                  AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
                  AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
              run: |
                  set -euo pipefail
                  SECRETS_RAW="${{ inputs.secret_names }}"
                  SECRETS="${SECRETS_RAW//[[:space:]]/}"
                  IFS=',' read -ra NAMES <<< "$SECRETS"
                  missing_list=()
                  for raw_name in "${NAMES[@]}"; do
                    name="$raw_name"
                    if [ -z "$name" ]; then
                      continue
                    fi
                    if [ -z "${!name:-}" ]; then
                      missing_list+=("$name")
                    fi
                  done
                  if [ ${#missing_list[@]} -gt 0 ]; then
                    printf '%s,' "${missing_list[@]}" | sed 's/,$//' > /tmp/missing.txt
                    echo "all_secrets_present=false" >> "$GITHUB_OUTPUT"
                    echo "missing=$(cat /tmp/missing.txt)" >> "$GITHUB_OUTPUT"
                    echo "Missing required secrets: $(cat /tmp/missing.txt)" >&2
                  else
                    echo "all_secrets_present=true" >> "$GITHUB_OUTPUT"
                    echo "missing=" >> "$GITHUB_OUTPUT"
                  fi
            - name: Output results
              run: |
                  echo "All secrets present: ${{ steps.check.outputs.all_secrets_present }}"
                  if [ -n "${{ steps.check.outputs.missing }}" ]; then
                    echo "Missing secrets: ${{ steps.check.outputs.missing }}"
                  fi

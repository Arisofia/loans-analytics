name: Security Scan

on:
  workflow_dispatch:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '0 0 * * 1' # Weekly on Mondays

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Fetch full history to prevent git fetch errors and undefined diff range values
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml
        env:
          # Disable PR diff analysis to prevent undefined value errors in extension pack
          # This forces CodeQL to analyze the full codebase instead of just PR diffs
          CODEQL_EXTRACTOR_PYTHON_OPTION_ANALYZE_PR_DIFF: 'false'

      - name: Autobuild
        uses: github/codeql-action/autobuild@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          category: '/language:${{ matrix.language }}'
          upload: true
          skip-queries: false

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@cdb760004ba9ea4d525f2e043745dfe85bb9077e # v1.1.0
        continue-on-error: false # Fail build on high/critical vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all

  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "safety" "bandit[sarif]"

      - name: Run safety check
        run: |
          safety check --save-json safety-report.json || true
          safety check --continue-on-error --save-json safety-results.json || true

      - name: Run bandit security linter
        run: |
          bandit -r python/ src/ -f json -o bandit-report.json || bandit -r src/ -f json -o bandit-report.json
          bandit -r python/ src/ -f sarif -o bandit-results.sarif --severity-level medium || bandit -r src/ -f sarif -o bandit-results.sarif --severity-level medium

      - name: Upload Bandit SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          sarif_file: bandit-results.sarif
          category: security-audit

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: security-reports
          path: |
            safety-report.json
            safety-results.json
            bandit-report.json
            bandit-results.sarif
          retention-days: 30

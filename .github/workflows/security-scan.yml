name: "Security Scan"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      # Avoid unstable PR diff-range extension generation in Dependabot branches.
      CODEQL_ACTION_DIFF_INFORMED_QUERIES: "false"

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Keep full history so CodeQL can build PR diff range reliably

      - name: Detect Code Scanning availability
        id: code_scanning
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Code scanning API is available (HTTP ${STATUS})."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Code scanning API unavailable (HTTP ${STATUS}). CodeQL upload steps will be skipped."
          fi

      - name: Initialize CodeQL
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          languages: ${{ matrix.language }}

          config-file: ./.github/codeql-config.yml
        env:
          # Disable PR diff analysis to prevent undefined value errors in extension pack
          # This forces CodeQL to analyze the full codebase instead of just PR diffs
          CODEQL_EXTRACTOR_PYTHON_OPTION_ANALYZE_PR_DIFF: "false"

      - name: Autobuild
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5

      - name: Perform CodeQL Analysis
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          category: "/language:${{ matrix.language }}"
          upload: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          skip-queries: false

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Detect Code Scanning availability
        id: code_scanning
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Code scanning API unavailable (HTTP ${STATUS}). SARIF upload will be skipped."
          fi

      - name: Skip Snyk scan when token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::SNYK_TOKEN is not configured. Skipping Snyk dependency scan."

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/python@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          args: --file=requirements.txt --package-manager=pip --severity-threshold=high --fail-on=all

  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "safety" "bandit[sarif]" "ruff"

      - name: Run safety check
        run: |
          safety check --save-json safety-report.json || true
          safety check --continue-on-error \
            --save-json safety-results.json || true

      - name: Run bandit security linter
        run: |
          # Dynamically discover Python source directories
          SCAN_DIRS=()
          for dir in python src app lib scripts; do
            if [ -d "$dir" ]; then
              SCAN_DIRS+=("$dir")
            fi
          done

          if [ "${#SCAN_DIRS[@]}" -gt 0 ]; then
            echo "Scanning directories: ${SCAN_DIRS[*]}"
            bandit -r "${SCAN_DIRS[@]}" -f json -o bandit-report.json \
              || echo "Bandit JSON scan encountered issues"
            bandit -r "${SCAN_DIRS[@]}" -f sarif -o bandit-results.sarif \
              --severity-level medium || echo "Bandit SARIF scan encountered issues"
          else
            echo "⚠️  No Python source directories found to scan"
            # Create empty placeholder files
            echo "[]" > bandit-report.json
            printf '%s\n' "{\"version\":\"2.1.0\",\"\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\"runs\":[]}" > bandit-results.sarif
          fi

      - name: Upload Bandit SARIF results
        if: ${{ always() && steps.code_scanning.outputs.enabled == 'true' && hashFiles('bandit-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          sarif_file: bandit-results.sarif
          category: security-audit

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-reports
          path: |
            safety-report.json
            safety-results.json
            bandit-report.json
            bandit-results.sarif
          retention-days: 30

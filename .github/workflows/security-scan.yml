name: "Security Scan"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      CODEQL_ACTION_DIFF_INFORMED_QUERIES: "false"

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          if [ -d .git ]; then
            git remote set-url origin "$REPO_URL" || git remote add origin "$REPO_URL"
          else
            git init .
            git remote add origin "$REPO_URL"
          fi
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Skip Snyk scan when token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::SNYK_TOKEN is not configured. Skipping Snyk dependency scan."

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        run: |
          if ! command -v npm >/dev/null 2>&1; then
            echo "::error::npm is required to install Snyk CLI on this runner"
            exit 1
          fi
          npm install --global snyk
          snyk auth "$SNYK_TOKEN"
          snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --fail-on=all

  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "❌ Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install "safety" "bandit[sarif]" "ruff"

      - name: Run safety check
        continue-on-error: true
        run: |
          set +e
          safety check --save-json safety-report.json
          safety_exit_code=$?
          set -e

          # Exit 64 = vulnerabilities found (informational — tracked via pip-audit separately)
          # Exit 65 = auth error (offline DB used, acceptable)
          # Other non-zero = tool error → warn but do not hard-fail CI
          if [ "$safety_exit_code" -eq 64 ] || [ "$safety_exit_code" -eq 65 ]; then
            echo "::warning::Safety reported vulnerabilities or auth issue (exit $safety_exit_code) — see safety-report.json"
          elif [ "$safety_exit_code" -ne 0 ]; then
            echo "::warning::Safety encountered an unexpected exit ($safety_exit_code)"
          fi

      - name: Run bandit security linter
        run: |
          SCAN_DIRS=()
          for dir in backend/python backend/src frontend scripts; do
            if [ -d "$dir" ]; then
              SCAN_DIRS+=("$dir")
            fi
          done

          if [ "${#SCAN_DIRS[@]}" -gt 0 ]; then
            echo "Scanning directories: ${SCAN_DIRS[*]}"
            bandit -r "${SCAN_DIRS[@]}" -f json -o bandit-report.json || true
            bandit -r "${SCAN_DIRS[@]}" -f sarif -o bandit-results.sarif \
              --severity-level medium || true
            bandit -r "${SCAN_DIRS[@]}" --severity-level medium -f screen
          else
            echo "⚠️ No Python source directories found to scan"
            echo "[]" > bandit-report.json
            printf '%s\n' "{\"version\":\"2.1.0\",\"\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\"runs\":[]}" > bandit-results.sarif
          fi

      - name: Upload Bandit SARIF results
        if: ${{ always() && hashFiles('bandit-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload security reports
        if: always()
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/security-reports-${{ github.run_number }}.tar.gz" \
            safety-report.json safety-results.json bandit-report.json bandit-results.sarif 2>/dev/null || true
          echo "Generated local archive: artifacts/security-reports-${{ github.run_number }}.tar.gz"

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          if [ -d .git ]; then
            git remote set-url origin "$REPO_URL" || git remote add origin "$REPO_URL"
          else
            git init .
            git remote add origin "$REPO_URL"
          fi
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Run Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "$ARCHIVE" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          tar -xzf "$ARCHIVE" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          gitleaks version
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

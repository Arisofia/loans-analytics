name: "Security Scan"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      CODEQL_ACTION_DIFF_INFORMED_QUERIES: "false"

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Code Scanning availability
        id: check_code_scanning_availability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Code scanning API is available (HTTP ${STATUS})."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Code scanning API unavailable (HTTP ${STATUS}). CodeQL upload steps will be skipped."
          fi

      - name: Initialize CodeQL
        if: steps.check_code_scanning_availability.outputs.enabled == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql-config.yml
        env:
          CODEQL_EXTRACTOR_PYTHON_OPTION_ANALYZE_PR_DIFF: "false"

      - name: Autobuild
        if: steps.check_code_scanning_availability.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        if: steps.check_code_scanning_availability.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          skip-queries: false

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Code Scanning availability
        id: check_code_scanning_availability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Code scanning API unavailable (HTTP ${STATUS}). SARIF upload will be skipped."
          fi

      - name: Skip Snyk scan when token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::SNYK_TOKEN is not configured. Skipping Snyk dependency scan."

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/python@master
        with:
          args: --file=requirements.txt --package-manager=pip --severity-threshold=high --fail-on=all

  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Code Scanning availability
        id: check_code_scanning_availability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Code scanning API unavailable (HTTP ${STATUS}). SARIF upload will be skipped."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "safety" "bandit[sarif]" "ruff"

      - name: Run safety check
        run: |
          set +e
          safety check --save-json safety-report.json
          safety_exit_code=$?
          safety check --continue-on-error --save-json safety-results.json
          set -e

          if [ "$safety_exit_code" -ne 0 ]; then
            echo "::error::Safety detected dependency vulnerabilities"
            exit "$safety_exit_code"
          fi

      - name: Run bandit security linter
        run: |
          SCAN_DIRS=()
          for dir in backend/python backend/src frontend scripts; do
            if [ -d "$dir" ]; then
              SCAN_DIRS+=("$dir")
            fi
          done

          if [ "${#SCAN_DIRS[@]}" -gt 0 ]; then
            echo "Scanning directories: ${SCAN_DIRS[*]}"
            bandit -r "${SCAN_DIRS[@]}" -f json -o bandit-report.json || true
            bandit -r "${SCAN_DIRS[@]}" -f sarif -o bandit-results.sarif \
              --severity-level medium || true
            bandit -r "${SCAN_DIRS[@]}" --severity-level medium -f screen
          else
            echo "⚠️ No Python source directories found to scan"
            echo "[]" > bandit-report.json
            printf '%s\n' "{\"version\":\"2.1.0\",\"\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\"runs\":[]}" > bandit-results.sarif
          fi

      - name: Upload Bandit SARIF results
        if: ${{ always() && steps.check_code_scanning_availability.outputs.enabled == 'true' && hashFiles('bandit-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: security-audit

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            safety-report.json
            safety-results.json
            bandit-report.json
            bandit-results.sarif
          retention-days: 30

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gitleaks CLI
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks scan
        run: |
          gitleaks dir \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 1

      - name: Generate Gitleaks SARIF report
        if: always()
        run: |
          gitleaks dir \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --exit-code 0

      - name: Output Gitleaks results
        if: always()
        run: |
          echo "=== Gitleaks Scan Results ==="
          if [ -f gitleaks-report.json ]; then
            echo "✅ No secrets detected"
          else
            echo "❌ Secrets detected - see action logs for details"
          fi

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            gitleaks-report.json
            gitleaks-report.sarif
          retention-days: 30
          if-no-files-found: ignore

name: "Security Scan"

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - frontend/**
      - '**/*.md'
      - docs/**
  pull_request:
    branches:
      - main
    paths-ignore:
      - frontend/**
      - '**/*.md'
      - docs/**
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      CODEQL_ACTION_DIFF_INFORMED_QUERIES: "false"

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
         config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Skip Snyk scan when token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::SNYK_TOKEN is not configured. Skipping Snyk dependency scan."

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        run: |
          if ! command -v npm >/dev/null 2>&1; then
            echo "::error::npm is required to install Snyk CLI on this runner"
            exit 1
          fi
          npm install --global snyk
          snyk auth "$SNYK_TOKEN"
          snyk test --file=requirements.prod.lock.txt --package-manager=pip --severity-threshold=high

  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "? Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install "safety" "bandit[sarif]" "ruff"

      - name: Run safety check
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          
          # Run safety check and capture exit code
          if safety check --save-json safety-report.json; then
            echo "? Safety check passed - no known vulnerabilities detected"
          else
            safety_exit_code=$?
            
            # Exit 64 = vulnerabilities found (informational � tracked via pip-audit separately)
            # Exit 65 = auth error (offline DB used, acceptable)
            # Other exit codes are warnings only
            if [ "$safety_exit_code" -eq 64 ] || [ "$safety_exit_code" -eq 65 ]; then
              echo "?? Safety reported vulnerabilities or auth issue (exit $safety_exit_code) � see safety-report.json"
            else
              echo "?? Safety check completed with exit code $safety_exit_code"
            fi
          fi

      - name: Run bandit security linter
        shell: bash
        run: |
          set -euo pipefail
          SCAN_DIRS=()
           for dir in backend/python backend/src backend/loans_analytics scripts; do
            if [ -d "$dir" ]; then
              SCAN_DIRS+=("$dir")
            fi
          done

          if [ "${#SCAN_DIRS[@]}" -gt 0 ]; then
            echo "Scanning directories: ${SCAN_DIRS[*]}"
            # Generate JSON report for analysis
             bandit -r "${SCAN_DIRS[@]}" --configfile .bandit.yaml -f json -o bandit-report.json || {
              echo "?? Bandit found issues (JSON report generated)"
            }
            # Generate SARIF report for GitHub Security tab
             bandit -r "${SCAN_DIRS[@]}" --configfile .bandit.yaml -f sarif -o bandit-results.sarif \
               --severity-level medium || {
              echo "?? Bandit found medium+ severity issues (SARIF report generated)"
            }
            # Display results
             bandit -r "${SCAN_DIRS[@]}" --configfile .bandit.yaml --severity-level medium -f screen || {
              echo "?? Bandit found issues"
            }
          else
            echo "?? No Python source directories found to scan"
            echo "[]" > bandit-report.json
            printf '%s\n' "{\"version\":\"2.1.0\",\"\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\"runs\":[]}" > bandit-results.sarif
          fi

      - name: Upload Bandit SARIF results
        if: ${{ always() && hashFiles('bandit-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload security reports
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          report_files=()
          for report in safety-report.json safety-results.json bandit-report.json bandit-results.sarif; do
            if [ -f "$report" ]; then
              report_files+=("$report")
            fi
          done

          if [ "${#report_files[@]}" -gt 0 ]; then
            tar -czf "artifacts/security-reports-${{ github.run_number }}.tar.gz" "${report_files[@]}"
            echo "Generated local archive: artifacts/security-reports-${{ github.run_number }}.tar.gz"
          else
            echo "No security reports were generated to archive"
          fi

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.2"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          
          # Download Gitleaks with retries
          echo "Downloading Gitleaks v${GITLEAKS_VERSION}..."
          curl -fL \
            --retry 3 \
            --retry-delay 2 \
            --retry-all-errors \
            --output "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          
          # Extract and install
          tar -xzf "$ARCHIVE" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          
          # Verify installation
          gitleaks version
          
          # Run detection (failures are reported but don't block workflow)
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose || {
            echo "?? Gitleaks found potential secrets - see output above"
          }

  container-scan:
    name: Container Image Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build pipeline image for scanning
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Dockerfile.pipeline ]; then
            docker build -f Dockerfile.pipeline -t loans-analytics-pipeline:scan .
          else
            docker build -f Dockerfile -t loans-analytics-pipeline:scan .
          fi

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: loans-analytics-pipeline:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy scan results to Security tab
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy

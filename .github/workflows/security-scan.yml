name: "Security Scan"

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - frontend/**
      - '**/*.md'
      - docs/**
  pull_request:
    branches:
      - main
    paths-ignore:
      - frontend/**
      - '**/*.md'
      - docs/**
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      CODEQL_ACTION_DIFF_INFORMED_QUERIES: "false"

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip Snyk scan when token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::SNYK_TOKEN is not configured. Skipping Snyk dependency scan."

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        run: |
          if ! command -v npm >/dev/null 2>&1; then
            echo "::error::npm is required to install Snyk CLI on this runner"
            exit 1
          fi
          npm install --global snyk
          snyk auth "$SNYK_TOKEN"
          snyk test --file=requirements.prod.lock.txt --package-manager=pip --severity-threshold=high

  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_BIN="python3.12"
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          else
            echo "? Python is not available on runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install "safety" "bandit[sarif]" "pip-audit"

      - name: Run pip-audit (SARIF)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          AUDIT_TARGET="requirements.prod.lock.txt"
          if [ ! -f "$AUDIT_TARGET" ]; then
            AUDIT_TARGET="requirements.txt"
          fi
          "$PYTHON_BIN" -m pip_audit -r "$AUDIT_TARGET" -f sarif -o pip-audit-results.sarif || {
            echo "?? pip-audit found vulnerabilities - SARIF uploaded"
          }

      - name: Upload pip-audit SARIF results
        if: ${{ always() && hashFiles('pip-audit-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit-results.sarif
          category: pip-audit

      - name: Run safety check
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          
          # Run safety check and capture exit code
          if safety check --save-json safety-report.json; then
            echo "? Safety check passed - no known vulnerabilities detected"
          else
            safety_exit_code=$?
            
            # Exit 64 = vulnerabilities found (informational - tracked via pip-audit separately)
            # Exit 65 = auth error (offline DB used, acceptable)
            # Other exit codes are warnings only
            if [ "$safety_exit_code" -eq 64 ] || [ "$safety_exit_code" -eq 65 ]; then
              echo "?? Safety reported vulnerabilities or auth issue (exit $safety_exit_code) - see safety-report.json"
            else
              echo "?? Safety check completed with exit code $safety_exit_code"
            fi
          fi

      - name: Run bandit security linter
        shell: bash
        run: |
          set -euo pipefail
          SCAN_DIRS=()
          for dir in backend/src backend/loans_analytics scripts; do
            if [ -d "$dir" ]; then
              SCAN_DIRS+=("$dir")
            fi
          done

          if [ "${#SCAN_DIRS[@]}" -gt 0 ]; then
            echo "Scanning directories: ${SCAN_DIRS[*]}"
            # Generate JSON report for analysis
            bandit -r "${SCAN_DIRS[@]}" --configfile .bandit.yaml -f json -o bandit-report.json || {
              echo "?? Bandit found issues (JSON report generated)"
            }
            # Generate SARIF report for GitHub Security tab
            bandit -r "${SCAN_DIRS[@]}" --configfile .bandit.yaml -f sarif -o bandit-results.sarif \
              --severity-level medium || {
              echo "?? Bandit found medium+ severity issues (SARIF report generated)"
            }
            # Enforce a merge gate on high-severity findings.
            bandit -r "${SCAN_DIRS[@]}" --configfile .bandit.yaml --severity-level high -f screen
          else
            echo "?? No Python source directories found to scan"
            echo "[]" > bandit-report.json
            printf '%s\n' "{\"version\":\"2.1.0\",\"\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\"runs\":[]}" > bandit-results.sarif
          fi

      - name: Upload Bandit SARIF results
        if: ${{ always() && hashFiles('bandit-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.2"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          
          # Download Gitleaks with retries
          echo "Downloading Gitleaks v${GITLEAKS_VERSION}..."
          curl -fL \
            --retry 3 \
            --retry-delay 2 \
            --retry-all-errors \
            --output "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          
          # Extract and install
          tar -xzf "$ARCHIVE" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          
          # Verify installation
          gitleaks version
          
          # Run detection (failures are reported but don't block workflow)
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose || {
            echo "?? Gitleaks found potential secrets - see output above"
          }

  container-scan:
    name: Container Image Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: loans-analytics-api:scan
            dockerfile: Dockerfile
            sarif_file: trivy-results-loans-analytics-api-scan.sarif
            sarif_category: trivy-loans-analytics-api-scan
          - name: loans-analytics-pipeline:scan
            dockerfile: Dockerfile.pipeline
            sarif_file: trivy-results-loans-analytics-pipeline-scan.sarif
            sarif_category: trivy-loans-analytics-pipeline-scan
          - name: loans-analytics-dashboard:scan
            dockerfile: Dockerfile.dashboard
            sarif_file: trivy-results-loans-analytics-dashboard-scan.sarif
            sarif_category: trivy-loans-analytics-dashboard-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for scanning
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull -f "${{ matrix.image.dockerfile }}" -t "${{ matrix.image.name }}" .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image.name }}
          format: sarif
          output: ${{ matrix.image.sarif_file }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy scan results to Security tab
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.image.sarif_file }}
          category: ${{ matrix.image.sarif_category }}

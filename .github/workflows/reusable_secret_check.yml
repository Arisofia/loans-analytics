name: Reusable Secret Check (compat)

"on":
  workflow_call:
    inputs:
      secrets:
        required: false
        type: string
      secret_names:
        required: false
        type: string
      required_secrets:
        required: false
        type: string
    outputs:
      all_secrets_present:
        description: "Whether all requested secrets are present"
        value: ${{ jobs.delegate.outputs.all_secrets_present }}
      missing:
        description: "Comma-separated list of missing secrets"
        value: ${{ jobs.delegate.outputs.missing }}

jobs:
  delegate:
    uses: ./.github/workflows/reusable-secret-check.yml
    with:
      secrets: ${{ inputs.secrets || inputs.secret_names || inputs.required_secrets }}
    secrets: inherit

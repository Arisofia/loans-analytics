name: Validate Copilot Agents

on:
  push:
    branches: [main]
    paths:
      - '.github/agents/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/agents/**'

permissions:
  contents: read

jobs:
  validate-agents:
    name: Validate GitHub Copilot Agent Configurations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate agent frontmatter
        run: |
          python scripts/validate_copilot_agents.py

      - name: Report status
        if: success()
        run: |
          echo "✅ All GitHub Copilot agent configurations are valid"

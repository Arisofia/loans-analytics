name: CodeRabbit PR Review

"on":
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coderabbit-pr-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check CodeRabbit token availability
        id: check-coderabbit
        run: |
          if [ -n "${{ secrets.CODERABBIT_TOKEN }}" ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CODERABBIT_TOKEN not configured - skipping CodeRabbit PR review"
            echo "Skipping CodeRabbit PR review (missing CODERABBIT_TOKEN)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Run CodeRabbit PR Review
        if: steps.check-coderabbit.outputs.secrets_available == 'true'
        uses: coderabbitai/ai-pr-reviewer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODERABBIT_TOKEN: ${{ secrets.CODERABBIT_TOKEN }}

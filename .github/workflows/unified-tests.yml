name: Tests (Full Suite)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: First checkout attempt
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Wait and retry checkout (if failed)
        if: steps.checkout.outcome == 'failure'
        run: |
          echo "First checkout failed, waiting 10 seconds before retry..."
          sleep 10
      - name: Second checkout attempt (if first failed)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-benchmark
      - name: Run unit tests
        run: |
          pytest tests/ -v --cov --cov-report=term-missing -m "not integration" --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - name: First checkout attempt
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Wait and retry checkout (if failed)
        if: steps.checkout.outcome == 'failure'
        run: |
          echo "First checkout failed, waiting 10 seconds before retry..."
          sleep 10
      - name: Second checkout attempt (if first failed)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-benchmark
      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::warning::Skipping integration tests - SUPABASE_URL not configured"
            exit 0
          fi
          pytest tests/ -v -m "integration" --tb=short

  multi-agent-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: First checkout attempt
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Wait and retry checkout (if failed)
        if: steps.checkout.outcome == 'failure'
        run: |
          echo "First checkout failed, waiting 10 seconds before retry..."
          sleep 10
      - name: Second checkout attempt (if first failed)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark
      - name: Run multi-agent tests
        run: |
          pytest python/multi_agent/ -v -k "test_" --tb=short

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [integration-tests, multi-agent-tests]
    if: always()
    steps:
      - name: First checkout attempt
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Wait and retry checkout (if failed)
        if: steps.checkout.outcome == 'failure'
        run: |
          echo "First checkout failed, waiting 10 seconds before retry..."
          sleep 10
      - name: Second checkout attempt (if first failed)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run smoke tests
        run: |
          python scripts/data/run_data_pipeline.py --input data/raw/abaco_real_data_20260202.csv --mode validate

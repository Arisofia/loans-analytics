# =============================================================================
# ETL Pipeline - Zero-cost GitHub Actions workflow
# Replaces: Azure Functions / Azure Data Factory pipelines
# Runs on: GitHub Actions free tier (2 000 min/month public repos, 500 MB cache)
#
# Triggers
#   - Push to main/develop (auto)
#   - Manual dispatch (with optional input CSV path)
#   - Daily ingest:    06:00 UTC  (loan_tape ingestion)
#   - Monthly snapshot: 08:00 UTC on the 1st of each month
#
# Required secrets (fail-fast guard in 'preflight' job):
#   SUPABASE_URL              - Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY - Supabase service-role key (write access)
#   SUPABASE_ANON_KEY         - Supabase anon/public key (read access)
#
# Optional secrets (used when available; silently skipped if absent):
#   RENDER_API_KEY / RENDER_SERVICE_ID  - Render.com deployment
#   RAILWAY_TOKEN / RAILWAY_PROJECT_ID  - Railway deployment
#   FLY_API_TOKEN                       - Fly.io deployment
# =============================================================================

name: ETL Pipeline (Zero-Cost)

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "scripts/data/**"
      - "config/**"
      - "data/raw/**"
  schedule:
    # Daily ingest at 06:00 UTC
    - cron: "0 6 * * *"
    # Monthly snapshot at 08:00 UTC on the 1st of each month
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      input_csv:
        description: "Path to input CSV or gsheets://TAB_NAME (default: Google Sheets DESEMBOLSOS)"
        required: false
        default: "gsheets://DESEMBOLSOS"
      mode:
        description: "Pipeline mode"
        required: false
        default: "full"
        type: choice
        options: [full, validate, dry-run]
      snapshot_month:
        description: "Snapshot month (YYYY-MM-DD), leave blank for today"
        required: false
        default: ""
      run_type:
        description: "Run type"
        required: false
        default: "ingest"
        type: choice
        options: [ingest, snapshot, both]

concurrency:
  group: etl-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate inputs & environment - fail fast if required secrets are absent
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      input_csv: ${{ steps.resolve.outputs.input_csv }}
      mode: ${{ steps.resolve.outputs.mode }}
      run_type: ${{ steps.resolve.outputs.run_type }}
      supabase_ready: ${{ steps.secret_gate.outputs.supabase_ready }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Check required secrets
        id: secret_gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          MISSING=""
          [ -z "$SUPABASE_URL" ]              && MISSING="$MISSING SUPABASE_URL"
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && MISSING="$MISSING SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$SUPABASE_ANON_KEY" ]         && MISSING="$MISSING SUPABASE_ANON_KEY"
          if [ -n "$MISSING" ]; then
            echo "::warning title=Supabase secrets missing::Skipping Supabase ETL jobs. Missing:$MISSING"
            echo "supabase_ready=false" >> "$GITHUB_OUTPUT"
            echo "Supabase ETL jobs were skipped because required secrets are missing:$MISSING" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "supabase_ready=true" >> "$GITHUB_OUTPUT"
          echo "OK: All required secrets present"

      - name: Resolve pipeline inputs and verify files
        id: resolve
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          GOOGLE_SHEETS_CREDENTIALS_JSON="$(python3 -c "import json, os, sys; sys.stdout.write(json.loads(os.environ.get('ALL_SECRETS_JSON', '{}')).get('GOOGLE_SHEETS_CREDENTIALS_JSON', ''))")"
          CSV="${{ github.event.inputs.input_csv }}"
          MODE="${{ github.event.inputs.mode }}"
          RTYPE="${{ github.event.inputs.run_type }}"

          # Scheduled runs: monthly cron (08:00) = snapshot, daily (06:00) = ingest
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            [ "$HOUR" = "08" ] && RTYPE="snapshot" || RTYPE="ingest"
          fi

          # Default values - Google Sheets is the primary data source
          CSV="${CSV:-gsheets://DESEMBOLSOS}"
          MODE="${MODE:-full}"
          RTYPE="${RTYPE:-ingest}"

          # For gsheets:// URIs no file check is needed; for local files, verify existence
          if [[ "$CSV" == gsheets://* ]]; then
            if [ -z "$GOOGLE_SHEETS_CREDENTIALS_JSON" ]; then
              echo "::warning::Google Sheets source selected but GOOGLE_SHEETS_CREDENTIALS_JSON is missing - switching to dry-run mode"
              MODE="dry-run"
            else
              echo "OK: Google Sheets source: $CSV"
            fi
          elif [ "$MODE" != "dry-run" ] && [ ! -f "$CSV" ]; then
            echo "WARNING: Input CSV '$CSV' not found - switching to dry-run mode"
            MODE="dry-run"
          else
            [ "$MODE" != "dry-run" ] && echo "OK: Input file found: $CSV"
          fi

          echo "input_csv=${CSV}" >> "$GITHUB_OUTPUT"
          echo "mode=${MODE}"     >> "$GITHUB_OUTPUT"
          echo "run_type=${RTYPE}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2. Run tests
  # ---------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loans_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd "pg_isready -U analytics_user -d loans_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libpq-dev libffi-dev postgresql-client

      - name: Wait for PostgreSQL readiness acknowledgement
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: analytics_user
          PGPASSWORD: analytics_pass
          PGDATABASE: loans_analytics
        run: |
          for i in {1..30}; do
            if pg_isready; then
              echo "OK: PostgreSQL is ready."
              exit 0
            fi
            echo "PostgreSQL not ready yet (attempt $i/30); waiting 2s..."
            sleep 2
          done
          echo "ERROR: PostgreSQL readiness acknowledgement not received in time."
          exit 1

      - name: Validate prod lock file (dry-run)
        run: |
          grep -viE '^(pywin32==)' requirements.prod.lock.txt > /tmp/requirements.prod.linux.txt
          python -m pip install --dry-run -r /tmp/requirements.prod.linux.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --prefer-binary -r requirements-dev.txt

      - name: Run tests
        run: make test

  # ---------------------------------------------------------------------------
  # 3. Daily ingest (loan tape / control mora)
  # ---------------------------------------------------------------------------
  run-pipeline:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loans_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd "pg_isready -U analytics_user -d loans_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    permissions:
      contents: read
    needs: [preflight, test]
    if: |
      needs.preflight.outputs.supabase_ready == 'true' &&
      (
        needs.preflight.outputs.run_type == 'ingest' ||
        needs.preflight.outputs.run_type == 'both'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -viE '^(pywin32==)' requirements.prod.lock.txt > /tmp/requirements.prod.linux.txt
          python -m pip install -r /tmp/requirements.prod.linux.txt
          python -m pip install sentry-sdk

      - name: Wait for PostgreSQL readiness acknowledgement
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: analytics_user
          PGPASSWORD: analytics_pass
          PGDATABASE: loans_analytics
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
          for i in {1..30}; do
            if pg_isready; then
              echo "OK: PostgreSQL is ready."
              exit 0
            fi
            echo "PostgreSQL not ready yet (attempt $i/30); waiting 2s..."
            sleep 2
          done
          echo "ERROR: PostgreSQL readiness acknowledgement not received in time."
          exit 1

      - name: Run pipeline
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SNAPSHOT_MONTH: ${{ github.event.inputs.snapshot_month }}
          INPUT: ${{ needs.preflight.outputs.input_csv }}
          MODE: ${{ needs.preflight.outputs.mode }}
        run: |
          GOOGLE_SHEETS_CREDENTIALS_JSON="$(python3 -c "import json, os, sys; sys.stdout.write(json.loads(os.environ.get('ALL_SECRETS_JSON', '{}')).get('GOOGLE_SHEETS_CREDENTIALS_JSON', ''))")"
          # Write Google Sheets credentials from secret if available
          if [ -n "$GOOGLE_SHEETS_CREDENTIALS_JSON" ]; then
            mkdir -p credentials
            echo "$GOOGLE_SHEETS_CREDENTIALS_JSON" > credentials/google-service-account.json
            echo "OK: Google Sheets credentials written from secret"
          fi
          make etl-local

      - name: Validate pipeline outputs
        if: success()
        run: |
          # Fail if unmatched_records.csv exists but has rows missing reason_code
          UNMATCHED="exports/unmatched_records.csv"
          if [ -f "$UNMATCHED" ]; then
            HDR=$(head -1 "$UNMATCHED")
            COL=$(echo "$HDR" | tr ',' '\n' | grep -n "^reason_code$" | cut -d: -f1)
            if [ -n "$COL" ]; then
              MISSING=$(tail -n +2 "$UNMATCHED" | awk -F',' -v c="$COL" '($c=="" || $c~/^ *$/){n++} END{print n+0}')
            else
              MISSING=0
            fi
            if [ "$MISSING" -gt 0 ]; then
              echo "::error::$MISSING rows in $UNMATCHED have no reason_code. Review crosswalk output."
              exit 1
            fi
            echo "OK: All unmatched records have reason_code"
          fi

          # Warn (do not fail) if dim_loan export is empty
          DIM_LOAN="exports/dim_loan.csv"
          if [ -f "$DIM_LOAN" ]; then
            ROWS=$(tail -n +2 "$DIM_LOAN" | wc -l | tr -d ' ')
            if [ "$ROWS" -eq 0 ]; then
              echo "::warning file=$DIM_LOAN::dim_loan.csv is empty - verify control_mora_path was provided"
            else
              echo "OK: dim_loan.csv has $ROWS rows"
            fi
          fi

      - name: Sync latest outputs to Supabase KV
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python scripts/reporting/sync_to_supabase.py

      - name: Upload pipeline artifacts
        if: always()
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/pipeline-output-${{ github.run_number }}.tar.gz" \
            data/processed/ exports/ logs/ 2>/dev/null || true
          echo "Generated local artifact archive: artifacts/pipeline-output-${{ github.run_number }}.tar.gz"

  # ---------------------------------------------------------------------------
  # 4. Monthly snapshot (1st of month cron or manual)
  # ---------------------------------------------------------------------------
  build-star-schema:
    name: Build DuckDB star schema + snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [preflight, test]
    if: |
      needs.preflight.outputs.supabase_ready == 'true' &&
      (
        needs.preflight.outputs.run_type == 'snapshot' ||
        needs.preflight.outputs.run_type == 'both'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -viE '^(pywin32==)' requirements.prod.lock.txt > /tmp/requirements.prod.linux.txt
          python -m pip install -r /tmp/requirements.prod.linux.txt duckdb rapidfuzz

      - name: Initialize DuckDB star schema
        run: python scripts/data/init_duckdb_schema.py

      - name: Build monthly snapshot
        env:
          MONTH: ${{ github.event.inputs.snapshot_month }}
          INPUT: ${{ needs.preflight.outputs.input_csv }}
          MODE: ${{ needs.preflight.outputs.mode }}
        run: make snapshot-build

      - name: Upload snapshot artifacts
        if: always()
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/snapshot-${{ github.run_number }}.tar.gz" \
            data/duckdb/ exports/ 2>/dev/null || true
          echo "Generated local artifact archive: artifacts/snapshot-${{ github.run_number }}.tar.gz"

  etl-skipped:
    name: Report skipped Supabase ETL jobs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [preflight, test]
    if: ${{ needs.preflight.outputs.supabase_ready != 'true' }}
    steps:
      - name: Report skip reason
        run: |
          echo "::warning title=ETL jobs skipped::Configure SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, and SUPABASE_ANON_KEY to run ETL jobs."
          echo "Supabase ETL jobs were skipped because required secrets are not configured." >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 5. Post summary
  # ---------------------------------------------------------------------------
  summary:
    name: Pipeline summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [preflight, test, run-pipeline, build-star-schema]
    if: always()
    steps:
      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## ETL Pipeline Run Summary

          | Step                | Status |
          |---------------------|--------|
          | Preflight + secrets | ${{ needs.preflight.result }} |
          | Tests               | ${{ needs.test.result }} |
          | Daily ingest        | ${{ needs.run-pipeline.result }} |
          | Monthly snapshot    | ${{ needs.build-star-schema.result }} |

          **Run:** #${{ github.run_number }}
          **Trigger:** ${{ github.event_name }}
          **Branch:** ${{ github.ref_name }}
          **Run type:** ${{ needs.preflight.outputs.run_type }}

          ### Required Environment Variables (set in GitHub Secrets)
          | Variable | Purpose |
          |----------|---------|
          | `SUPABASE_URL` | Supabase project URL |
          | `SUPABASE_SERVICE_ROLE_KEY` | Write access to Supabase |
          | `SUPABASE_ANON_KEY` | Read access to Supabase |
          EOF

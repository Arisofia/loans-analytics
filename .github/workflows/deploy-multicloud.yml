name: Deploy Multi-Cloud (Disabled)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: Disabled (Use Free-Tier Workflow)
    runs-on: ubuntu-latest
    steps:
      - name: Block paid cloud deployment
        run: |
          echo "::error::This workflow is intentionally disabled to avoid paid cloud deployments (Azure/AWS)."
          echo "Use .github/workflows/deploy-free-tier.yml (Render/Railway/Fly/GHCR) instead."
          exit 1

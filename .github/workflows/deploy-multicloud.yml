name: Deploy Multi-Cloud

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Deployment target"
        required: true
        default: "azure"
        type: choice
        options:
          - azure
          - aws
          - both
      environment:
        description: "Environment name"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  deploy-azure:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.cloud == 'azure' || inputs.cloud == 'both') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Azure configuration
        id: azure_config
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ] || [ -z "${{ secrets.AZURE_RESOURCE_GROUP }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure deployment skipped (AZURE_CREDENTIALS or AZURE_RESOURCE_GROUP missing)"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: ${{ steps.azure_config.outputs.available == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep stack
        if: ${{ steps.azure_config.outputs.available == 'true' }}
        run: |
          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters environmentName="${{ inputs.environment }}"

  deploy-aws:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.cloud == 'aws' || inputs.cloud == 'both') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/aws
    steps:
      - uses: actions/checkout@v4

      - name: Check AWS configuration
        id: aws_config
        working-directory: .
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ] || [ -z "${{ secrets.AWS_REGION }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS deployment skipped (AWS_ROLE_TO_ASSUME or AWS_REGION missing)"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: ${{ steps.aws_config.outputs.available == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        if: ${{ steps.aws_config.outputs.available == 'true' }}
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: ${{ steps.aws_config.outputs.available == 'true' }}
        run: terraform init -input=false

      - name: Terraform Apply
        if: ${{ steps.aws_config.outputs.available == 'true' }}
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${{ secrets.AWS_REGION }}" \
            -var "environment=${{ inputs.environment }}"

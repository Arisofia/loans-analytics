name: Deploy Multi-Cloud

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Deployment target"
        required: true
        default: "azure"
        type: choice
        options:
          - azure
          - aws
          - both
      environment:
        description: "Environment name"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-multicloud-${{ github.ref_name }}-${{ inputs.environment }}-${{ inputs.cloud }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_deploy_azure: ${{ steps.targets.outputs.azure }}
      should_deploy_aws: ${{ steps.targets.outputs.aws }}
    steps:
      - name: Validate target selection
        id: targets
        run: |
          case "${{ inputs.cloud }}" in
            azure)
              echo "azure=true" >> "$GITHUB_OUTPUT"
              echo "aws=false" >> "$GITHUB_OUTPUT"
              ;;
            aws)
              echo "azure=false" >> "$GITHUB_OUTPUT"
              echo "aws=true" >> "$GITHUB_OUTPUT"
              ;;
            both)
              echo "azure=true" >> "$GITHUB_OUTPUT"
              echo "aws=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Invalid cloud option: ${{ inputs.cloud }}"
              exit 1
              ;;
          esac

      - name: Require main branch for prod
        if: ${{ inputs.environment == 'prod' }}
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::Production deploys are only allowed from main."
            exit 1
          fi

      - name: Require green Tests workflow for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              status: "completed",
              per_page: 100
            });
            const testsRun = runs.data.workflow_runs.find(
              run => run.name === "Tests" && run.conclusion === "success"
            );
            if (!testsRun) {
              core.setFailed(`No successful 'Tests' workflow found for commit ${sha}.`);
              return;
            }
            core.info(`Validated Tests run: ${testsRun.id}`);

      - name: Validate Azure secrets
        if: ${{ steps.targets.outputs.azure == 'true' }}
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ID_SUSCRIPCION: ${{ secrets.ID_SUSCRIPCION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          [ -n "$AZURE_RESOURCE_GROUP" ] || { echo "::error::Missing secret AZURE_RESOURCE_GROUP"; exit 1; }
          if [ -z "$AZURE_CREDENTIALS" ] && { [ -z "$AZURE_AD_CLIENT_ID" ] || [ -z "$AZURE_AD_TENANT_ID" ]; }; then
            echo "::error::Missing Azure auth config. Provide AZURE_CREDENTIALS or AZURE_AD_CLIENT_ID + AZURE_AD_TENANT_ID."
            exit 1
          fi
          if [ -z "$AZURE_SUBSCRIPTION_ID" ] && [ -z "$ID_SUSCRIPCION" ]; then
            echo "::error::Missing subscription secret (set AZURE_SUBSCRIPTION_ID or ID_SUSCRIPCION)"
            exit 1
          fi
          [ -n "$SUPABASE_URL" ] || { echo "::error::Missing secret SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_ANON_KEY" ] || { echo "::error::Missing secret SUPABASE_ANON_KEY"; exit 1; }

      - name: Validate AWS secrets
        if: ${{ steps.targets.outputs.aws == 'true' }}
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          [ -n "$AWS_ROLE_TO_ASSUME" ] || { echo "::error::Missing secret AWS_ROLE_TO_ASSUME"; exit 1; }
          [ -n "$AWS_REGION" ] || { echo "::error::Missing secret AWS_REGION"; exit 1; }

  deploy-azure:
    if: ${{ needs.preflight.outputs.should_deploy_azure == 'true' }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
      AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git history checks in deploy_prod.sh

      - name: Resolve Azure subscription id
        id: azure_sub
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ID_SUSCRIPCION: ${{ secrets.ID_SUSCRIPCION }}
        run: |
          subscription_id="${AZURE_SUBSCRIPTION_ID:-$ID_SUSCRIPCION}"
          if [ -z "$subscription_id" ]; then
            echo "::error::No Azure subscription id provided."
            exit 1
          fi
          echo "subscription_id=$subscription_id" >> "$GITHUB_OUTPUT"

      - name: Resolve Azure auth mode
        id: azure_auth
        run: |
          has_oidc=false
          has_creds=false
          if [ -n "$AZURE_AD_CLIENT_ID" ] && [ -n "$AZURE_AD_TENANT_ID" ]; then
            has_oidc=true
          fi
          if [ -n "$AZURE_CREDENTIALS" ]; then
            has_creds=true
          fi
          echo "has_oidc=$has_oidc" >> "$GITHUB_OUTPUT"
          echo "has_creds=$has_creds" >> "$GITHUB_OUTPUT"
          if [ "$has_oidc" != "true" ] && [ "$has_creds" != "true" ]; then
            echo "::error::No Azure auth mode can be resolved."
            exit 1
          fi

      - name: Azure login (OIDC)
        id: azure_login_oidc
        if: ${{ steps.azure_auth.outputs.has_oidc == 'true' }}
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_AD_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_AD_TENANT_ID }}
          subscription-id: ${{ steps.azure_sub.outputs.subscription_id }}

      - name: Azure login (service principal JSON fallback)
        id: azure_login_creds
        if: ${{ steps.azure_auth.outputs.has_creds == 'true' && steps.azure_login_oidc.outcome != 'success' }}
        run: |
          python3 - <<'PY' > /tmp/azure_sp_login.env
          import json
          import os
          import sys

          raw = os.environ.get("AZURE_CREDENTIALS", "")
          if not raw:
            print("::error::AZURE_CREDENTIALS is empty.", file=sys.stderr)
            sys.exit(1)

          try:
            creds = json.loads(raw)
          except json.JSONDecodeError:
            print("::error::AZURE_CREDENTIALS is not valid JSON.", file=sys.stderr)
            sys.exit(1)

          def pick(*keys):
            for key in keys:
              value = creds.get(key)
              if isinstance(value, str) and value.strip():
                return value.strip()
            return ""

          client_id = pick("clientId", "client_id", "appId")
          tenant_id = pick("tenantId", "tenant_id")
          client_secret = pick("clientSecret", "client_secret", "password")
          missing = [name for name, value in [
            ("clientId", client_id),
            ("tenantId", tenant_id),
            ("clientSecret", client_secret),
          ] if not value]
          if missing:
            print(f"::error::AZURE_CREDENTIALS missing required field(s): {', '.join(missing)}", file=sys.stderr)
            sys.exit(1)

          print(f"client_id={client_id}")
          print(f"tenant_id={tenant_id}")
          print(f"client_secret={client_secret}")
          PY

          # shellcheck disable=SC1091
          source /tmp/azure_sp_login.env
          echo "::add-mask::$client_secret"
          az login \
            --service-principal \
            --username "$client_id" \
            --password "$client_secret" \
            --tenant "$tenant_id" \
            --allow-no-subscriptions \
            --output none

      - name: Fail if Azure authentication did not succeed
        if: ${{ steps.azure_login_oidc.outcome != 'success' && steps.azure_login_creds.outcome != 'success' }}
        run: |
          echo "::error::Azure authentication failed for both OIDC and service principal JSON."
          exit 1

      - name: Set active Azure subscription
        if: ${{ steps.azure_login_oidc.outcome == 'success' || steps.azure_login_creds.outcome == 'success' }}
        run: |
          target_subscription="${{ steps.azure_sub.outputs.subscription_id }}"
          if az account set --subscription "$target_subscription" 2>/tmp/azure_set_subscription.err; then
            echo "Using configured subscription: $target_subscription"
          else
            echo "::warning::Configured subscription is not accessible for this identity. Attempting fallback."
            fallback_subscription="$(az account list --query "[0].id" -o tsv)"
            if [ -z "$fallback_subscription" ]; then
              echo "::error::No accessible Azure subscriptions found for the authenticated identity."
              cat /tmp/azure_set_subscription.err || true
              exit 1
            fi
            az account set --subscription "$fallback_subscription"
            echo "::warning::Using fallback subscription: $fallback_subscription"
          fi
          az account show --query '{id:id,name:name,tenantId:tenantId}' -o table

      - name: Setup environment
        run: |
          make setup
          {
            echo "ABACO_API_BASE=${{ secrets.ABACO_API_BASE }}"
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
          } >> .env

      - name: Run Hardened Deployment Script
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          # The hardened script handles lint, type-check, test, security-scan, and deployment
          ./scripts/deploy_prod.sh


  deploy-aws:
    if: ${{ needs.preflight.outputs.should_deploy_aws == 'true' }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/aws
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${{ secrets.AWS_REGION }}" \
            -var "environment=${{ inputs.environment }}"

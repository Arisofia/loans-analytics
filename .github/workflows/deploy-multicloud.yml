name: Deploy Multi-Cloud

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Deployment target"
        required: true
        default: "azure"
        type: choice
        options:
          - azure
          - aws
          - both
      environment:
        description: "Environment name"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-multicloud-${{ github.ref_name }}-${{ inputs.environment }}-${{ inputs.cloud }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_deploy_azure: ${{ steps.targets.outputs.azure }}
      should_deploy_aws: ${{ steps.targets.outputs.aws }}
    steps:
      - name: Validate target selection
        id: targets
        run: |
          case "${{ inputs.cloud }}" in
            azure)
              echo "azure=true" >> "$GITHUB_OUTPUT"
              echo "aws=false" >> "$GITHUB_OUTPUT"
              ;;
            aws)
              echo "azure=false" >> "$GITHUB_OUTPUT"
              echo "aws=true" >> "$GITHUB_OUTPUT"
              ;;
            both)
              echo "azure=true" >> "$GITHUB_OUTPUT"
              echo "aws=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Invalid cloud option: ${{ inputs.cloud }}"
              exit 1
              ;;
          esac

      - name: Require main branch for prod
        if: ${{ inputs.environment == 'prod' }}
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::Production deploys are only allowed from main."
            exit 1
          fi

      - name: Require green Tests workflow for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              status: "completed",
              per_page: 100
            });
            const testsRun = runs.data.workflow_runs.find(
              run => run.name === "Tests" && run.conclusion === "success"
            );
            if (!testsRun) {
              core.setFailed(`No successful 'Tests' workflow found for commit ${sha}.`);
              return;
            }
            core.info(`Validated Tests run: ${testsRun.id}`);

      - name: Validate Azure secrets
        if: ${{ steps.targets.outputs.azure == 'true' }}
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          [ -n "$AZURE_CREDENTIALS" ] || { echo "::error::Missing secret AZURE_CREDENTIALS"; exit 1; }
          [ -n "$AZURE_RESOURCE_GROUP" ] || { echo "::error::Missing secret AZURE_RESOURCE_GROUP"; exit 1; }

      - name: Validate AWS secrets
        if: ${{ steps.targets.outputs.aws == 'true' }}
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          [ -n "$AWS_ROLE_TO_ASSUME" ] || { echo "::error::Missing secret AWS_ROLE_TO_ASSUME"; exit 1; }
          [ -n "$AWS_REGION" ] || { echo "::error::Missing secret AWS_REGION"; exit 1; }

  deploy-azure:
    if: ${{ needs.preflight.outputs.should_deploy_azure == 'true' }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git history checks in deploy_prod.sh

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup environment
        run: |
          make setup
          echo "ABACO_API_BASE=${{ secrets.ABACO_API_BASE }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Run Hardened Deployment Script
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          # The hardened script handles lint, type-check, test, security-scan, and deployment
          ./scripts/deploy_prod.sh


  deploy-aws:
    if: ${{ needs.preflight.outputs.should_deploy_aws == 'true' }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/aws
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${{ secrets.AWS_REGION }}" \
            -var "environment=${{ inputs.environment }}"

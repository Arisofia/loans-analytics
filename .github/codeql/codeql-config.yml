name: "CodeQL Security Configuration"

# Use security and quality query suites
queries:
  - uses: security-and-quality

# Suppress false positive alerts with full justification
query-filters:
  # Alert #136: Path Traversal (False Positive)
  - exclude:
      id: py/path-injection
      paths:
        - python/apps/analytics/api/main.py
    reason: |
      False positive - Alert #136

      The flagged code at line 99 implements proper path traversal protection via defense-in-depth:
      1. Absolute path rejection (line 76-77)
      2. Parent traversal (..) rejection (line 79-80)
      3. Character whitelist validation (line 87-88): only alphanumeric, dash, underscore, slash, dot
      4. Path normalization via resolve() (line 99)
      5. Containment validation via relative_to() (line 102-104)

      The _sanitize_and_resolve() function ensures user input cannot escape the allowed directory.
      Security tests verify this protection: tests/security/test_path_traversal.py

      CodeQL's static analysis doesn't recognize this custom validation function as a security control.

      Compliance: Reviewed and approved per OWASP ASVS v4.0 5.2.1 (2026-02-01)
      Security Ticket: #SEC-2026-001

  # Alert #42: Clear-text Logging (False Positive)
  - exclude:
      id: py/clear-text-logging-sensitive-data
      paths:
        - python/scripts/load_secrets.py
    reason: |
      False positive - Alert #42

      The flagged code at line 63 logs only a SecretStatus enum value ("ok", "error", "unknown"),
      NOT actual secret data. The enum is type-constrained to non-sensitive values.

      Evidence:
      - SecretStatus enum limits values to non-sensitive status strings
      - Actual secrets stored in separate dict, never logged
      - Security tests verify no sensitive data in logs: tests/security/test_secret_logging.py

      CodeQL's taint analysis incorrectly tracks data flow from load_secrets() function name
      and assumes all return values contain sensitive data.

      Compliance: Reviewed and approved per PCI-DSS 3.4, SOC 2 CC6.1 (2026-02-01)
      Security Ticket: #SEC-2026-002

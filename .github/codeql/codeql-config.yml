# CodeQL configuration for Python analysis.
# Excludes test directories to prevent false-positive quality alerts
# (e.g. py/statement-has-no-effect on pytest assertions) from inflating
# the GitHub Security alert count.
# Docs: https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning

name: "loans-analytics CodeQL config"

paths-ignore:
  - tests/**
  - "**/tests/**"
  - conftest.py
  - htmlcov/**

queries:
  - uses: security-and-quality

query-filters:
  # Alert #136: py/path-injection in data-serve endpoint (False Positive).
  # _sanitize_and_resolve() fully validates and confines paths to ALLOWED_DATA_DIR
  # before any filesystem operation; no user-controlled data reaches open/read.
  - exclude:
      id: py/path-injection
      paths:
        - backend/loans_analytics/apps/analytics/api/main.py

  # Alert #537: py/bind-socket-all-network-interfaces in Prometheus metrics exporter.
  # Binding to 0.0.0.0 is intentional — Prometheus must reach the exporter from
  # outside localhost inside the container network. Equivalent Bandit B104 is
  # already suppressed with # nosec B104 on the same line.
  - exclude:
      id: py/bind-socket-all-network-interfaces
      paths:
        - scripts/monitoring/metrics_exporter.py

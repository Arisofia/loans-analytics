name: "CodeQL Security Configuration"

queries:
  - uses: security-and-quality

query-filters:
  # Path traversal false positive - implementation already secure
  - exclude:
      id: py/path-injection
      paths:
        - python/apps/analytics/api/main.py
      reason: |
        False positive - Alert #136
        
        Path traversal protection implemented via:
        (1) input sanitization with character whitelist in _sanitize_and_resolve(),
        (2) path normalization with resolve(),
        (3) containment validation with relative_to().
        
        Security review: Multiple defense layers prevent directory traversal
        - Rejects absolute paths
        - Rejects parent directory references (..)
        - Validates resolved path stays within allowed directory
        
        Compliance: Reviewed and approved per OWASP ASVS v4.0 5.2.1
        Security Ticket: #SEC-2026-001
  
  # Clear-text logging false positive - only enum values logged
  - exclude:
      id: py/clear-text-logging-sensitive-data
      paths:
        - python/scripts/load_secrets.py
      reason: |
        False positive - Alert #42
        
        The flagged code logs only a SecretStatus enum value ("ok"/"error"/"unknown"),
        not actual secret data. The enum is type-constrained to non-sensitive values.
        
        Evidence:
        - SecretStatus enum limits values to non-sensitive strings
        - Actual secrets stored in separate dict, never logged
        - Error messages logged without exception details
        - Only error types logged, not error messages
        
        Compliance: Reviewed and approved per PCI-DSS 3.4 (2026-02-01)
        Security Ticket: #SEC-2026-002
